  storyNodes: [
    S("sy_y_001", 1279, 10, 18, "元朝消灭南宋残余势力，完成了全国的大统一。忽必烈建立了一个疆域空前辽阔的大帝国。但作为'南人'（原南宋统治区的百姓），你的地位在四等人中最低。", [
      O("虽然元朝统一了天下，但民族不平等的政策令人愤慨。我要通过读书改变命运。", [F("literacy", 6), F("politics", 4)], 2, "你发奋读书。"),
      O("天下统一，丝绸之路畅通，这是经商的大好时机。", [F("commerce", 6), F("wealth", 5)], 1, "你开始经商。"),
      O("元朝的统治虽然残酷，但我可以利用行省制度在地方上有所作为。", [F("politics", 5), F("literacy", 3)], 3, "你试图在体制内发展。"),
      O("四等人制度让我备受屈辱，总有一天我要推翻这种不公！", [F("martial", 5), F("reputation", 3)], 0, "你心中埋下了反抗的种子。")
    ], "sc_y_001"),

    S("sy_y_002", 1280, 11, 19, "忽必烈推行行省制度，在中央设中书省，在地方设十个行中书省（简称行省）。行省制度加强了中央对地方的控制，成为中国省制的开端。", [
      O("行省制度是政治制度的重大创新，有利于国家的统一和管理。", [F("politics", 6), F("literacy", 4)], 3, "你深入研究了行省制度。"),
      O("行省制度虽然加强了中央集权，但也给了地方官更多的权力。", [F("politics", 5), F("literacy", 3)], 2, "你看到了行省制度的两面性。"),
      O("行省制度有利于统一市场，对商业发展有利。", [F("commerce", 4), F("wealth", 3)], 1, "你看到了行省制度的经济价值。"),
      O("行省制度再好，也改变不了四等人制度的本质。", [F("martial", 3), F("politics", 3)], 0, "你仍然对元朝不满。")
    ], "sc_y_002"),

    S("sy_y_003", 1285, 16, 24, "元朝定都大都（今北京），大规模建设新都城。大都成为当时世界上最繁华的城市之一，人口超过百万。各国商人、使节云集于此。", [
      O("大都是世界性的大都市，这里汇聚了来自世界各地的人才和文化。", [F("literacy", 5), F("commerce", 4)], 2, "你前往大都寻求发展。"),
      O("大都是商业中心，我要在这里开拓市场。", [F("commerce", 6), F("wealth", 5)], 1, "你在大都开设了商铺。"),
      O("大都的建设消耗了大量人力物力，百姓的负担很重。", [F("politics", 4), F("literacy", 3)], 2, "你关注着百姓的疾苦。"),
      O("大都是元朝统治的象征，但对我来说，这里充满了屈辱。", [F("martial", 3), F("reputation", 2)], 0, "你对元朝的统治感到不满。")
    ], null),

    S("sy_y_004", 1290, 20, 28, "马可波罗来到中国，在中国游历了十七年。他游历了大都、杭州、泉州等地，对元朝的繁荣和文明程度赞叹不已。他的游记后来在欧洲引起轰动。", [
      O("马可波罗的游记向世界展示了中国的高度文明，这是中华文化的骄傲。", [F("literacy", 6), F("reputation", 5)], 3, "你与马可波罗交流了文化。"),
      O("马可波罗是重要的商业伙伴，通过他我了解了欧洲的市场需求。", [F("commerce", 6), F("wealth", 5)], 1, "你与马可波罗建立了商业关系。"),
      O("马可波罗对元朝的赞美说明，元朝在某些方面确实取得了成就。", [F("politics", 4), F("literacy", 3)], 2, "你客观地评价了元朝。"),
      O("马可波罗看到的是元朝的表面繁荣，他看不到四等人制度下的苦难。", [F("literacy", 5), F("politics", 4)], 3, "你希望世界了解真相。")
    ], "sc_y_004"),

    S("sy_y_005", 1294, 24, 32, "忽必烈驾崩，元朝开始走向衰落。此后皇位更迭频繁，宫廷政变不断，政治日益混乱。同时，各地天灾频发，百姓生活困苦。", [
      O("忽必烈是元朝最有作为的皇帝，他去世后元朝迅速衰落。", [F("politics", 5), F("literacy", 4)], 2, "你分析了元朝衰落的原因。"),
      O("皇位更迭频繁说明元朝的继承制度有问题，这是游牧民族的通病。", [F("politics", 5), F("literacy", 3)], 2, "你从制度层面分析了问题。"),
      O("政治混乱影响商业环境，我要更加谨慎。", [F("commerce", 3), F("wealth", 2)], 1, "你开始保守经营。"),
      O("元朝衰落是汉族翻身的机会，但时机尚未成熟。", [F("martial", 4), F("politics", 3)], 0, "你耐心等待时机。")
    ], null),

    S("sy_y_006", 1300, 28, 36, "元朝中期，权臣铁木迭儿专权，朝政腐败。各地蒙古贵族兼并土地，汉族农民大量沦为佃户。社会矛盾日益尖锐。", [
      O("权臣专权，朝政腐败，百姓苦不堪言。元朝的统治已经失去了合法性。", [F("politics", 6), F("literacy", 4)], 2, "你对元朝的统治彻底失望。"),
      O("蒙古贵族兼并土地，农民失去生计，这是社会动荡的根源。", [F("literacy", 5), F("politics", 4)], 3, "你分析了社会矛盾。"),
      O("社会动荡对商业不利，但乱世也可能带来机遇。", [F("commerce", 4), F("wealth", 3)], 1, "你在动荡中寻找商机。"),

    S("sy_y_007", 1310, 35, 43, "元武宗即位后，试图改革弊政，但效果有限。与此同时，元朝的纸币'交钞'大量发行，导致严重的通货膨胀，物价飞涨。", [
      O("纸币贬值是朝廷搜刮民财的手段，百姓的积蓄化为乌有。", [F("wealth", -5), F("politics", 4)], 1, "你深受通胀之害。"),
      O("元朝的货币政策完全失败，这说明蒙古统治者不懂经济。", [F("politics", 5), F("commerce", 4)], 2, "你批评了元朝的经济政策。"),
      O("通胀时期，实物比纸币更可靠。我要囤积粮食和物资。", [F("wealth", 3), F("commerce", 4)], 1, "你将纸币换成了实物。"),

      O("科举的歧视政策进一步激化了民族矛盾。", [F("politics", 5), F("literacy", 3)], 2, "你分析了政策的影响。"),

    S("sy_y_009", 1320, 42, 50, "元朝中期，各地水旱灾害频发。黄河多次决口，淹没大量农田。朝廷征发大量民夫修筑黄河堤坝，百姓苦不堪言。", [
      O("黄河泛滥是天灾，但朝廷的腐败加重了人祸。修河的民夫得不到足够的粮食和报酬。", [F("politics", 5), F("literacy", 4)], 2, "你揭露了治河中的腐败。"),
      O("黄河治理需要大量物资，这是商业机会。", [F("commerce", 4), F("wealth", 4)], 1, "你参与了治河物资的供应。"),
      O("百姓在治河中受尽苦难，这会成为起义的导火索。", [F("martial", 4), F("politics", 4)], 0, "你预感到起义即将爆发。"),
      O("我要帮助受灾的百姓，尽我所能减轻他们的痛苦。", [F("reputation", 5), F("wealth", -3)], 1, "你救济了灾民。")
    ], null),

    S("sy_y_010", 1330, 48, 56, "元顺帝即位，他是元朝的最后一位皇帝。此时元朝已经危机四伏：朝廷内部争权夺利，地方官员贪污腐败，各地起义此起彼伏。", [
      O("元顺帝虽然试图改革，但积重难返，元朝的灭亡只是时间问题。", [F("politics", 6), F("literacy", 4)], 2, "你判断元朝即将崩溃。"),
      O("元朝的统治已经摇摇欲坠，我应该为未来的变局做好准备。", [F("politics", 5), F("military", 3)], 3, "你开始规划未来。"),
      O("社会动荡不安，商业风险加大，我要更加谨慎。", [F("commerce", 3), F("wealth", 2)], 1, "你收缩了业务。"),
      O("元朝气数已尽，新的时代即将到来。", [F("martial", 5), F("reputation", 3)], 0, "你期待着变革。")
    ], null),

    S("sy_y_011", 1335, 52, 60, "元朝权臣伯颜专权，他甚至建议杀尽汉族的张、王、刘、李、赵五姓之人。虽然这个建议未被采纳，但它反映了元朝统治者的极端恐惧和仇恨。", [
      O("伯颜的建议令人发指！这种极端的民族压迫只会加速元朝的灭亡。", [F("politics", 6), F("literacy", 5), F("reputation", 4)], 3, "你愤怒地谴责了伯颜。"),
      O("伯颜的言论说明元朝统治者已经失去了理智，他们害怕汉族的力量。", [F("politics", 5), F("martial", 4)], 0, "你从伯颜的恐惧中看到了希望。"),
      O("这种极端政策会让社会更加动荡，对商业极为不利。", [F("commerce", 3), F("wealth", -3)], 1, "你的生意受到了影响。"),
      O("伯颜的建议虽然未被采纳，但它极大地激化了民族矛盾。", [F("literacy", 5), F("politics", 4)], 2, "你分析了民族矛盾的根源。")
    ], null),

    S("sy_y_012", 1340, 55, 63, "元朝末年，各地秘密宗教组织蓬勃发展。白莲教在民间广泛传播，以'弥勒下生，明王出世'为号召，吸引了大量不满元朝统治的百姓。", [
      O("白莲教的传播说明民间的不满已经到了临界点。革命的风暴即将来临。", [F("martial", 5), F("politics", 5)], 0, "你预感到起义即将爆发。"),
      O("白莲教虽然以宗教为号召，但其本质是百姓对元朝统治的反抗。", [F("literacy", 5), F("politics", 4)], 3, "你分析了白莲教的社会背景。"),
      O("社会动荡对商业不利，但革命成功后可能带来新的秩序。", [F("commerce", 3), F("politics", 3)], 1, "你观望局势。"),
      O("白莲教的活动越来越频繁，我是否应该加入？", [F("martial", 4), F("reputation", 3)], 0, "你考虑加入反抗力量。")
    ], null),

    S("sy_y_013", 1345, 58, 66, "黄河再次决口，朝廷征发十五万民夫修筑堤坝。民夫们在工地上受尽苦难，怨声载道。有人开始在河道中埋下刻有'莫道石人一只眼，挑动黄河天下反'的石人。", [
      O("'莫道石人一只眼'——这是起义的信号！革命即将爆发！", [F("martial", 6), F("reputation", 5)], 0, "你意识到起义即将到来。"),
      O("修河的民夫是起义的主力，一旦他们揭竿而起，势不可挡。", [F("politics", 6), F("military", 4)], 2, "你分析了起义的力量对比。"),
      O("社会即将大变，我要保护好家人和财产。", [F("wealth", 3), F("commerce", 3)], 1, "你为变局做准备。"),
      O("这个预言会迅速传播，点燃百姓心中的怒火。", [F("literacy", 5), F("reputation", 4)], 3, "你记录了这个历史时刻。")
    ], null),

    S("sy_y_014", 1351, 62, 70, "红巾军起义爆发！刘福通在颍州首举义旗，起义军头裹红巾，故称'红巾军'。徐寿辉在蕲州起义，郭子兴在濠州起义。各地纷纷响应，元朝的统治摇摇欲坠。", [
      O("终于等到了这一天！我要加入红巾军，推翻元朝的暴政！", [F("martial", 8), F("military", 6), F("reputation", 6)], 0, "你加入了红巾军。"),
      O("红巾军起义是元朝暴政的必然结果，百姓已经忍无可忍。", [F("literacy", 5), F("politics", 5), F("reputation", 4)], 3, "你支持起义。"),
      O("天下大乱，我要保护好家人和财产，等待局势明朗。", [F("wealth", 3), F("commerce", 3)], 1, "你选择自保。"),
      O("红巾军虽然声势浩大，但能否成功还是未知数。", [F("politics", 5), F("military", 3)], 2, "你理性地分析了局势。")
    ], "sc_y_014"),

    S("sy_y_015", 1352, 63, 71, "一个名叫朱元璋的年轻人加入了郭子兴的红巾军。他出身贫寒，当过和尚，但作战勇敢，很快崭露头角。与此同时，各地起义军开始割据一方。", [
      O("朱元璋虽然出身低微，但此人胸怀大志，将来必成大器。", [F("politics", 6), F("military", 4), F("reputation", 4)], 2, "你注意到了朱元璋的才能。"),
      O("各地起义军割据一方，需要有人来统一领导。", [F("military", 5), F("politics", 4)], 0, "你思考着统一的问题。"),
      O("天下大乱，商路中断，生意越来越难做了。", [F("wealth", -3), F("commerce", 2)], 1, "你的生意受到了严重影响。"),
      O("朱元璋的故事说明，英雄不问出处。在乱世中，每个人都有机会改变命运。", [F("literacy", 5), F("reputation", 4)], 3, "你从朱元璋身上看到了希望。")
    ], "sc_y_015"),

    S("sy_y_016", 1355, 65, 73, "朱元璋率领红巾军渡过长江，攻占集庆（今南京），改名应天府，作为自己的根据地。他实行'高筑墙，广积粮，缓称王'的策略，稳步发展。", [
      O("朱元璋'高筑墙，广积粮，缓称王'的策略非常明智，不急于称帝，先打好基础。", [F("politics", 6), F("military", 5)], 2, "你赞赏朱元璋的战略。"),
      O("朱元璋占领应天后，开始建立自己的政权体系。他善于用人，礼贤下士。", [F("politics", 5), F("literacy", 4)], 3, "你分析了朱元璋的成功之道。"),
      O("应天府成为新的政治中心，商业机会将随之而来。", [F("commerce", 4), F("wealth", 3)], 1, "你看到了新的商机。"),
      O("朱元璋的军队纪律严明，不扰百姓，这是真正的王者之师。", [F("martial", 4), F("military", 4), F("reputation", 3)], 0, "你加入了朱元璋的队伍。")
    ], null),

    S("sy_y_017", 1358, 67, 75, "朱元璋的势力不断壮大，先后消灭了陈友谅、张士诚等竞争对手。元朝朝廷内部也在争权夺利，无暇顾及南方的起义。", [
      O("朱元璋消灭陈友谅是关键性的胜利，他已经成为最有可能统一天下的人。", [F("politics", 6), F("military", 5)], 2, "你判断朱元璋将赢得天下。"),
      O("元朝内部争权夺利，已经无力镇压起义。元朝的灭亡只是时间问题。", [F("politics", 5), F("literacy", 3)], 2, "你分析了元朝的处境。"),
      O("天下即将统一，商业将迎来新的繁荣。", [F("commerce", 5), F("wealth", 4)], 1, "你对未来充满期待。"),
      O("朱元璋统一天下后，会善待百姓吗？", [F("literacy", 4), F("politics", 3)], 3, "你思考着未来的治理问题。")
    ], null),

    S("sy_y_018", 1363, 70, 78, "鄱阳湖之战爆发，朱元璋以二十万兵力击败陈友谅的六十万大军。这是中国历史上规模最大的水战之一，也是朱元璋统一天下的关键战役。", [
      O("鄱阳湖之战以少胜多，朱元璋展现了卓越的军事才能！", [F("military", 6), F("politics", 5), F("reputation", 4)], 0, "你在鄱阳湖之战中作战。"),
      O("陈友谅虽然兵多，但骄傲轻敌。朱元璋以弱胜强，靠的是智慧和策略。", [F("politics", 5), F("literacy", 4)], 2, "你分析了战争胜负的原因。"),
      O("天下大势已定，朱元璋将建立新的王朝。", [F("politics", 5), F("commerce", 3)], 1, "你预见到新时代的到来。"),
      O("鄱阳湖之战将改变中国的命运，我要记录这段历史。", [F("literacy", 5), F("craft", 4), F("reputation", 4)], 3, "你记录了鄱阳湖之战的经过。")
    ], "sc_y_018"),

    S("sy_y_019", 1367, 73, 81, "朱元璋派徐达、常遇春率二十五万大军北伐。北伐军势如破竹，一路攻入山东、河南。元朝军队节节败退，元顺帝准备逃往草原。", [
      O("北伐成功在望！百年屈辱即将终结！", [F("martial", 5), F("military", 5), F("reputation", 5)], 0, "你激动万分。"),
      O("朱元璋的北伐策略非常正确，先取山东，再下河南，最后直取大都。", [F("politics", 6), F("military", 4)], 2, "你赞赏北伐的战略。"),
      O("天下即将统一，新的商业秩序将建立。", [F("commerce", 4), F("wealth", 3)], 1, "你为新时代做好了准备。"),
      O("元朝的灭亡是历史的必然，但近百年的历史也有值得借鉴之处。", [F("literacy", 5), F("politics", 4)], 3, "你客观地总结了元朝的历史。")
    ], null),

    S("sy_y_020", 1368, 74, 82, "朱元璋在应天府称帝，建立明朝，年号洪武。同年，徐达率军攻入大都，元顺帝北逃。元朝在全国的统治结束。你回顾在元朝的这一生。", [
      O("元朝虽然灭亡了，但它推行了行省制度，促进了民族交融，这些贡献不应被遗忘。", [F("literacy", 6), F("politics", 5)], 3, "你客观地评价了元朝。"),
      O("朱元璋建立明朝，汉族终于重新掌握了政权。百年屈辱终于终结！", [F("reputation", 6), F("martial", 4)], 0, "你激动万分。"),
      O("天下太平了，我可以安心做生意了。", [F("commerce", 5), F("wealth", 4)], 1, "你对未来充满期待。"),
      O("我这一生经历了元朝的兴衰，见证了从统一到灭亡的全过程。这段历史值得被记录。", [F("literacy", 6), F("craft", 4), F("reputation", 5)], 3, "你开始撰写回忆录。")
    ], "sc_y_020"),

    S("sy_y_t01", 1295, 25, 33, "[天赋·文才] 你在元朝的科举考试中名列前茅，虽然受到民族歧视，但你的才学赢得了广泛尊重。", [

      O("科举入仕后，利用官职收集信息，为将来的变革做准备。", [F("politics", 6), F("literacy", 4), F("reputation", 4)], 2, "你暗中积蓄力量。")
    ], null, { talent: "literature" }),

    S("sy_y_t02", 1290, 20, 28, "[天赋·经商] 你与马可波罗建立了密切的商业合作关系，通过他将中国商品销往欧洲，获利丰厚。", [
      O("扩大与马可波罗的合作，垄断中欧贸易。", [F("commerce", 10), F("wealth", 10), F("reputation", 5)], 1, "你成为了丝路贸易巨头。"),
      O("利用利润在各地建立商馆，构建商业网络。", [F("commerce", 8), F("wealth", 8)], 1, "你建立了庞大的商业网络。")
    ], null, { talent: "commerce" }),

    S("sy_y_t03", 1340, 55, 63, "[天赋·政治] 你在行省任职多年，积累了丰富的行政经验，在地方上颇有声望。红巾军起义后，你被推举为地方领袖。", [
      O("带领地方军民起义，响应红巾军。", [F("politics", 8), F("military", 6), F("reputation", 8)], 2, "你成为了起义领袖之一。"),
      O("保护地方百姓，维持秩序，等待朱元璋的到来。", [F("politics", 6), F("reputation", 6), F("wealth", 3)], 3, "你成为了地方的保护者。")
    ], null, { talent: "politics" }),

    S("sy_y_t04", 1351, 62, 70, "[天赋·武勇] 红巾军起义爆发后，你凭借出色的武艺和领导才能，迅速成为起义军的重要将领。", [
      O("追随朱元璋南征北战，为建立新朝立下汗马功劳。", [F("martial", 10), F("military", 8), F("reputation", 8)], 0, "你成为了开国功臣。"),

    ], null, { talent: "martial" })
  ],

      id: "kp_y_01", title: "元朝的统一与行省制度",
      content: "1279年，元朝消灭南宋残余势力，完成了全国的大统一。元朝疆域空前辽阔。为了有效管理庞大的帝国，忽必烈推行行省制度：在中央设中书省（掌管全国政务），在地方设十个行中书省（简称行省）。行省制度加强了中央对地方的控制，是中国省制的开端，对后世行政区划产生了深远影响。此外，元朝还在中央设宣政院管理西藏地区，设澎湖巡检司管辖澎湖和琉球（台湾），加强了边疆管理。",

      yearlyEvents: [
        {year:1567,text:"穆宗即位，隆庆开关。"},{year:1568,text:"高拱担任内阁首辅。"},{year:1569,text:"张居正进入内阁。"},{year:1570,text:"俺答汗请求互市，隆庆和议。"},{year:1571,text:"海禁开放，海上贸易蓬勃发展。"},{year:1572,text:"穆宗驾崩，神宗即位。张居正担任内阁首辅。"},{year:1573,text:"万历元年，张居正开始全面改革。"},{year:1574,text:"推行考成法，整顿吏治。"},{year:1575,text:"清丈土地开始。"},{year:1576,text:"一条鞭法在部分地区试行。"},{year:1577,text:"张居正父亲去世，张居正'夺情'留任。"},{year:1578,text:"全国清丈土地。"},{year:1579,text:"改革取得显著成效。"},{year:1580,text:"一条鞭法在全国推广。"},{year:1581,text:"国库充盈，太仓存粮够用十年。"},{year:1582,text:"张居正病逝。万历帝开始清算张居正。"},{year:1583,text:"张居正被追夺官秩，家产被查抄。"},{year:1584,text:"改革措施被逐步废除。"},{year:1585,text:"万历帝不上朝。"},{year:1586,text:"国库开始空虚。"},{year:1587,text:"海瑞去世。戚继光被弹劾罢官。"},{year:1588,text:"社会矛盾加剧。"},{year:1589,text:"万历帝长期不理朝政。"},{year:1590,text:"努尔哈赤开始统一建州女真。"},{year:1591,text:"日本丰臣秀吉准备入侵朝鲜。"},{year:1592,text:"万历朝鲜之役爆发。明军入朝参战。平壤大捷。"},{year:1593,text:"碧蹄馆之战。明军与日军僵持。"},{year:1594,text:"宋应星出生。"},{year:1595,text:"明军与日军议和。"},{year:1596,text:"议和破裂，战争再起。"},{year:1597,text:"日军再次大举入侵朝鲜。"},{year:1598,text:"丰臣秀吉死亡，日军撤退。朝鲜之役结束。"},{year:1599,text:"努尔哈赤统一建州女真。"},{year:1600,text:"利玛窦到达北京。"},{year:1601,text:"利玛窦向万历帝进呈自鸣钟等物品。"},{year:1602,text:"利玛窦绘制《坤舆万国全图》。"},{year:1603,text:"万历帝依然不上朝。"},{year:1604,text:"利玛窦与徐光启合译《几何原本》。"},{year:1605,text:"努尔哈赤势力壮大。"},{year:1606,text:"明朝内部矛盾加剧。"},{year:1607,text:"努尔哈赤击败海西女真。"},{year:1608,text:"各地自然灾害频发。"},{year:1609,text:"利玛窦在北京传教。"},{year:1610,text:"利玛窦去世。"},{year:1611,text:"努尔哈赤统一女真各部。"},{year:1612,text:"辽东局势紧张。"},{year:1613,text:"努尔哈赤迁都赫图阿拉。"},{year:1614,text:"明朝加征辽饷。"},{year:1615,text:"努尔哈赤建立八旗制度。"},{year:1616,text:"努尔哈赤建立后金。"},{year:1617,text:"后金与明朝关系恶化。"},{year:1618,text:"努尔哈赤以'七大恨'告天，对明朝宣战。抚顺失陷。"},{year:1619,text:"萨尔浒之战，明军大败。"},{year:1620,text:"万历帝驾崩，泰昌帝即位不久驾崩。天启帝即位。"}

1,text:"康熙帝恢复太子。"},{year:1712,text:"太子再次被废。"},{year:1713,text:"储位之争加剧。"},{year:1714,text:"康熙帝年事已高。"},{year:1715,text:"朝局因储位之争而分裂。"},{year:1716,text:"社会矛盾加剧。"},{year:1717,text:"准噶尔部入侵西藏。"},{year:1718,text:"清朝出兵西藏。"},{year:1719,text:"社会问题增多。"},{year:1720,text:"清朝收复西藏。"},{year:1721,text:"康熙帝健康状况恶化。"},{year:1722,text:"康熙帝驾崩。雍正帝即位。"}

    description: "道光二十年，鸦片战争的炮声打破了天朝上国的迷梦。此后七十年间，太平天国运动席卷半壁江山，洋务运动试图师夷长技以制夷，甲午战争惨败令举国震惊，戊戌变法百日而夭，八国联军侵华更是将中国推向深渊。你将亲历这段内忧外患、救亡图存的屈辱与抗争交织的历史，在民族危亡中做出你的抉择。",
    identities: [
      { id: "lq_official", name: "朝廷官员", description: "出身官宦世家，在朝为官，亲历清廷的内忧外患与改革挣扎", bonuses: { politics: 12, literacy: 8, wealth: 8 } },
      { id: "lq_scholar", name: "新式知识分子", description: "接受新旧教育，目睹国耻，立志变法图强", bonuses: { literacy: 15, morality: 8, reputation: 5 } },
      { id: "lq_merchant", name: "买办商人", description: "通晓中外贸易，在洋务运动中崛起，亦官亦商", bonuses: { wealth: 15, politics: 5, literacy: 5 } },
      { id: "lq_commoner", name: "普通百姓", description: "饱受战乱与苛捐杂税之苦，在乱世中艰难求生", bonuses: { health: 12, morality: 8, martial: 5 } }
    ],
    storyNodes: [
      S("lq_01",1840,14,22,"道光二十年，英国以林则徐虎门销烟为借口，派遣远征军入侵中国。鸦片战争的炮声在广东沿海响起，这是中国近代史的开端。你正值少年，面对这前所未有的变局，将如何抉择？",
        [O("关心时事，研读中外消息",[F("literacy",10),F("politics",5)],3,"你开始关注外面的世界，阅读各种中外报刊，对局势有了初步认识。"),
         O("跟随长辈学习传统经史",[F("literacy",8),F("morality",5)],2,"你在长辈的指导下研读四书五经，为将来科举做准备。"),
         O("在民间感受百姓疾苦",[F("morality",8),F("health",3)],1,"你深入民间，亲眼看到了鸦片对百姓的危害。")],
        SC("是故中国之弱，由于鸦片。","林则徐奏折","鸦片战争的起因")),
      S("lq_02",1842,16,24,"鸦片战争以清政府的失败告终。中英签订《南京条约》，割让香港岛，开放广州、厦门、福州、宁波、上海五口通商，赔款两千一百万银元。这是中国近代史上第一个不平等条约。消息传来，举国震惊。",
        [O("痛心国耻，立志救国",[F("morality",10),F("literacy",5),FL("lq_patriot",true)],2,"你深感国耻之痛，暗下决心要为国家的富强贡献力量。"),
         O("认为应学习西方技术以自强",[F("literacy",8),F("politics",5),FL("lq_western_learn",true)],2,"你认为中国必须学习西方的长处才能抵御外侮。"),
         O("继续埋头读书，准备科举",[F("literacy",8),F("politics",3)],2,"你认为只有通过科举入仕才能改变现状。")],
        SC("流毒于天下，则为害甚巨，法当从严。若犹泄泄视之，是使数十年后，中原几无可以御敌之兵，且无可以充饷之银。","林则徐上道光帝奏折","鸦片对中国的危害")),
      S("lq_03",1843,17,25,"五口通商后，外国商品大量涌入中国市场。广州、上海等地出现了买办商人，他们为外国洋行服务，从中获利。传统手工业受到严重冲击，大量工匠失业。",
        [O("到通商口岸了解新事物",[F("literacy",8),F("wealth",5),FL("lq_treaty_port",true)],1,"你来到上海，亲眼看到了中西交汇的景象。"),
         O("在家乡经营传统产业",[F("wealth",5),F("health",3)],0,"你在家乡经营传统产业，虽然受到冲击，但仍努力维持。"),
         O("研究中外贸易的利弊",[F("literacy",10),F("politics",5)],2,"你仔细研究中外贸易的格局，思考中国经济的出路。")],null),
      S("lq_04",1851,25,33,"洪秀全在广西金田村发动起义，建号太平天国。太平军一路北上，势如破竹，攻克永安、全州、道州，直逼长沙。这场中国历史上规模最大的农民起义拉开了序幕。",
        [O("支持太平天国，加入起义军",[F("martial",10),F("morality",5),FL("lq_taiping",true)],0,"你被太平天国的理想所吸引，加入了起义军。"),
         O("组织团练，保卫家乡",[F("martial",8),F("politics",5),FL("lq_tuanlian",true)],0,"你组织乡勇团练，抵御太平军的进攻。"),
         O("避难他乡，静观其变",[F("health",5),F("literacy",3)],0,"你带着家人避难他乡，在乱世中保全自身。")],
        SC("天下多男人，尽是兄弟之辈；天下多女子，尽是姊妹之群。","《天朝田亩制度》","太平天国的理想")),
      S("lq_05",1853,27,35,"太平军攻克南京，改名天京，定都于此。太平天国颁布《天朝田亩制度》，提出'有田同耕，有饭同食，有衣同穿，有钱同使'的理想社会方案。与此同时，曾国藩在湖南组建湘军，开始围剿太平天国。",
        [O("前往天京，参与太平天国建设",[F("politics",8),F("literacy",5),FL("lq_taiping",true)],0,"你来到天京，参与了太平天国的各项建设。"),
         O("投奔曾国藩，加入湘军",[F("martial",8),F("politics",5),FL("lq_xiangjun",true)],0,"你投奔曾国藩，成为湘军的一员。"),
         O("在江南记录这场大动荡",[F("literacy",10),F("morality",5)],2,"你以旁观者的身份记录了这场改变中国命运的大动荡。")],
        SC("师夷长技以制夷。","魏源《海国图志》","师夷长技以制夷的思想")),
      S("lq_06",1856,30,38,"天京事变爆发！太平天国领导层内部发生严重内讧，东王杨秀清被杀，北王韦昌辉被处死，翼王石达开出走。太平天国由盛转衰。你亲历了这场惨烈的内乱。",
        [O("在天京事变中保护无辜百姓",[F("morality",10),F("reputation",5)],1,"你在混乱中尽力保护无辜的百姓。"),
         O("趁机脱离太平天国",[F("health",5),F("politics",3)],0,"你看清了太平天国的本质，选择离开。"),
         O("继续留在太平天国，试图挽救",[F("morality",5),F("politics",3)],0,"你选择留下，希望太平天国能改正错误。")],null),
      S("lq_07",1858,32,40,"英法联军攻陷大沽炮台，逼近天津。清政府被迫签订《天津条约》，增开通商口岸，允许外国传教士深入内地传教，允许外国公使驻京。国家主权进一步丧失。",
        [O("上书朝廷，力主抵抗",[F("morality",8),F("politics",5),F("reputation",3)],1,"你上书朝廷，强烈反对签订不平等条约。"),
         O("认为应先自强再谈抵抗",[F("literacy",8),F("politics",5),FL("lq_self_strong",true)],2,"你认识到中国必须先自强才能与列强抗衡。"),
         O("暗中联络有识之士，图谋变革",[F("politics",8),F("literacy",3)],1,"你秘密联络志同道合的人，商讨救国之道。")],
        SC("此乃千古未有之变局。","李鸿章","对时局的判断")),
      S("lq_08",1860,34,42,"英法联军攻入北京，火烧圆明园！这座举世闻名的皇家园林被付之一炬，无数珍贵文物被洗劫一空。咸丰帝逃往承德避暑山庄。这是中国近代史上最屈辱的事件之一。",
        [O("在北京沦陷时救助百姓",[F("morality",10),F("health",-5),F("reputation",5)],1,"你在英法联军的暴行中尽力救助无辜百姓。"),
         O("记录圆明园被毁的经过",[F("literacy",10),F("morality",5)],3,"你详细记录了圆明园被毁的经过，留下历史的见证。"),
         O("痛定思痛，决心推动变革",[F("morality",8),F("literacy",5),FL("lq_reform",true)],2,"你痛定思痛，决心投身于国家的变革事业。")],
        SC("圆明园之被毁，实为吾国文化之浩劫。","历史记载","圆明园之劫")),
      S("lq_09",1861,35,43,"咸丰帝驾崩于承德，慈禧太后联合恭亲王奕訢发动辛酉政变，夺取了朝廷大权。慈禧太后开始了她长达近半个世纪的垂帘听政。与此同时，恭亲王奕訢主张学习西方，推动洋务运动。",
        [O("支持恭亲王推行洋务",[F("politics",8),F("literacy",5),FL("lq_yangwu",true)],2,"你支持恭亲王的改革主张，积极参与洋务运动。"),
         O("对慈禧太后掌权感到担忧",[F("politics",5),F("morality",3)],1,"你对慈禧太后的专权深感忧虑，但无力改变。"),
         O("在地方推行务实政策",[F("politics",8),F("reputation",5)],1,"你在地方推行务实政策，努力改善百姓生活。")],null),
      S("lq_10",1864,38,46,"曾国藩率领湘军攻破天京，太平天国运动失败。这场持续十四年的农民起义造成了数千万人死亡，给中国社会带来了巨大的创伤。然而，它也沉重打击了清王朝的统治。",
        [O("参与战后重建工作",[F("politics",8),F("morality",5),F("reputation",5)],2,"你参与江南地区的战后重建，帮助百姓恢复生产。"),
         O("总结太平天国失败的教训",[F("literacy",10),F("politics",5)],3,"你深入分析了太平天国失败的原因。"),
         O("认为必须从根本上改革制度",[F("literacy",8),F("morality",8),FL("lq_system_reform",true)],2,"你认为太平天国的失败说明仅靠农民起义无法救国，必须进行制度变革。")],
        SC("太平天国运动是中国农民战争的最高峰。","历史评价","太平天国的历史地位")),
      S("lq_11",1866,40,48,"洋务运动进入高潮。曾国藩设立安庆内军械所，李鸿章创办江南制造总局，左宗棠创办福州船政局，崇厚创办天津机器局。一批近代军事工业和民用工业相继建立。'师夷长技以自强'成为时代的口号。",
        [O("进入洋务企业工作",[F("literacy",10),F("politics",5),FL("lq_yangwu",true)],2,"你进入一家洋务企业，学习西方的技术和管理。"),
         O("出国留学，学习先进技术",[F("literacy",12),F("politics",5),FL("lq_study_abroad",true)],3,"你获得机会出国留学，亲眼看到了西方的先进文明。"),
         O("在民间宣传洋务思想",[F("reputation",8),F("literacy",5)],1,"你在民间宣传学习西方的重要性。")],
        SC("中国文武制度，事事远出西人之上，独火器万不能及。","李鸿章致曾国藩书","洋务运动的指导思想")),
      S("lq_12",1870,44,52,"天津教案爆发。天津民众因不满外国传教士的所作所为，冲击教堂，打死法国领事丰大业。曾国藩受命处理此事，被迫向法国赔礼道歉，引起朝野上下的强烈不满。曾国藩因此声名大损。",
        [O("支持曾国藩的妥协处理，认为应避免战争",[F("politics",5),F("morality",-3)],1,"你认为曾国藩的妥协虽然屈辱，但避免了更大的灾难。"),
         O("强烈反对向列强低头",[F("morality",8),F("reputation",5)],1,"你强烈反对向列强妥协，认为这只会助长其气焰。"),
         O("认为应从根本上改革外交制度",[F("literacy",8),F("politics",5)],2,"你主张建立近代外交制度，以国际法维护国家权益。")],null),
      S("lq_13",1876,50,58,"郭嵩焘被任命为驻英公使，成为中国第一位驻外使臣。他出使英国后，对西方的民主制度和工业文明赞叹不已，主张中国应全面学习西方。然而他的言论遭到朝中保守派的猛烈攻击，最终被召回国内。",
        [O("支持郭嵩焘的改革主张",[F("literacy",8),F("politics",5),FL("lq_western_learn",true)],2,"你赞同郭嵩焘的观点，认为中国应全面学习西方。"),
         O("认为郭嵩焘过于崇洋媚外",[F("morality",5),F("politics",-3)],1,"你认为郭嵩焘走得太远，不应全盘西化。"),
         O("主张有选择地学习西方",[F("literacy",8),F("politics",5)],2,"你主张取其精华、去其糟粕，有选择地学习西方。")],
        SC("西洋政教、制造，无不出于学。","郭嵩焘《使西纪程》","向西方学习的思想")),
      S("lq_14",1884,58,66,"中法战争爆发。法国入侵越南南部，威胁中国西南边疆。冯子材在镇南关大败法军，取得了近代中国抗击外来侵略的一次重大胜利。然而清政府却在胜利后签订了不平等的《天津条约》，承认法国对越南的保护权。'中国不败而败，法国不胜而胜'。",
        [O("为镇南关大捷欢欣鼓舞",[F("morality",8),F("reputation",5)],1,"你为冯子材的胜利感到自豪，认为中国人完全可以打败外国侵略者。"),
         O("对朝廷的软弱外交深感失望",[F("morality",5),F("politics",-3)],1,"你对清政府在胜利后仍然妥协感到极度失望。"),
         O("认识到制度变革的重要性",[F("literacy",8),F("politics",5),FL("lq_system_reform",true)],2,"你深刻认识到，仅靠军事胜利无法改变中国的命运，必须进行制度变革。")],
        SC("法国不胜而胜，中国不败而败。","历史评价","中法战争的结果")),
      S("lq_15",1894,68,76,"甲午战争爆发！日本蓄谋已久，挑起战争。北洋水师在黄海海战中与日本联合舰队激战，致远舰管带邓世昌壮烈殉国。然而由于清政府的腐败无能，北洋水师最终在威海卫全军覆没。中国惨败于曾经的学生——日本。",
        [O("为邓世昌等殉国将士悲痛",[F("morality",10),F("reputation",5)],1,"你为邓世昌等英雄的壮烈牺牲深感悲痛。"),
         O("痛斥朝廷的腐败无能",[F("morality",8),F("politics",5),F("reputation",3)],1,"你痛斥朝廷的腐败导致了这场惨败。"),
         O("认识到洋务运动的局限性",[F("literacy",10),F("politics",8),FL("lq_system_reform",true)],3,"你深刻认识到，仅靠学习西方技术而不改革制度，无法真正富强。")],
        SC("此日漫挥天下泪，有公足壮海军威。","光绪帝挽邓世昌联","甲午海战")),
      S("lq_16",1895,69,77,"中日签订《马关条约》，割让台湾及澎湖列岛，赔偿白银两亿两，开放沙市、重庆、苏州、杭州为商埠。消息传来，举国悲愤。康有为联合在京会试的举人发起'公车上书'，要求拒和、迁都、变法。",
        [O("支持公车上书，参与变法运动",[F("morality",10),F("politics",8),FL("lq_reform",true)],2,"你积极参与公车上书，支持变法图强。"),
         O("为台湾被割让而痛心疾首",[F("morality",10),F("reputation",5)],1,"你为台湾的割让深感痛心，发誓要收复失地。"),
         O("认为必须进行更深层次的改革",[F("literacy",10),F("politics",8),FL("lq_system_reform",true)],3,"你认为《马关条约》的屈辱说明必须从根本上改革政治制度。")],
        SC("四万万人齐下泪，天涯何处是神州。","谭嗣同","甲午战败后的悲愤")),
      S("lq_17",1898,72,80,"光绪帝颁布《明定国是诏》，戊戌变法正式开始。康有为、梁启超、谭嗣同等维新派推动了一系列改革措施：废除八股、设立京师大学堂、训练新军、鼓励实业。然而变法触动了以慈禧太后为首的保守派的利益。",
        [O("积极参与变法，提出改革建议",[F("politics",10),F("literacy",8),FL("lq_wuxu",true)],2,"你积极参与变法，为改革出谋划策。"),
         O("在地方推行新政",[F("politics",8),F("reputation",5)],1,"你在地方积极推行新政，取得了一定成效。"),
         O("对变法的前景感到担忧",[F("literacy",5),F("politics",3)],1,"你担心变法过于激进，可能招致反扑。")],
        SC("各国变法，无不从流血而成，今中国未闻有因变法而流血者，此国之所以不昌也。","谭嗣同","变法的决心")),
      S("lq_18",1898,72,80,"戊戌政变！慈禧太后发动政变，囚禁光绪帝于中南海瀛台，废除大部分新政法令。谭嗣同拒绝逃亡，慷慨就义：'我自横刀向天笑，去留肝胆两昆仑。'戊戌变法仅维持了一百零三天便宣告失败。",
        [O("为谭嗣同等维新志士的牺牲而悲痛",[F("morality",10),F("reputation",8)],2,"你为谭嗣同的壮烈牺牲深感悲痛，他的精神激励着你继续前行。"),
         O("认识到和平变法之路行不通",[F("literacy",8),F("politics",8),FL("lq_revolution",true)],2,"你认识到在顽固势力的阻挠下，和平变法已经走不通了。"),
         O("暗中保护维新人士",[F("morality",8),F("politics",3)],1,"你冒着风险暗中帮助一些维新人士逃脱追捕。")],

      S("lq_19",1900,74,82,"义和团运动在北方兴起，打出'扶清灭洋'的旗号。慈禧太后向十一国宣战，八国联军攻陷北京，再次火烧抢掠。慈禧太后携光绪帝仓皇西逃。中国陷入了空前的民族危机。",

    knowledgePoints: [
      {id:"kp_lq_1",title:"鸦片战争",content:"1840年，英国以林则徐虎门销烟为借口发动侵华战争。1842年，清政府战败，被迫签订《南京条约》，割让香港岛、赔款、五口通商。鸦片战争是中国近代史的开端，中国开始沦为半殖民地半封建社会。",competency:"时空观念"},
      {id:"kp_lq_2",title:"太平天国运动",content:"1851年，洪秀全在广西金田村发动起义，建立太平天国。太平天国颁布《天朝田亩制度》，提出'有田同耕'的理想社会方案。1864年，曾国藩率湘军攻破天京，太平天国运动失败。它是中国农民战争的最高峰，沉重打击了清朝统治和外国侵略势力。",competency:"唯物史观"},
      {id:"kp_lq_3",title:"洋务运动",content:"19世纪60年代到90年代，以曾国藩、李鸿章、左宗棠、张之洞为代表的洋务派，以'自强''求富'为口号，推行了一系列学习西方技术的改革。创办了江南制造总局、福州船政局等近代军事工业和民用工业，建立了新式海军。洋务运动虽然没有使中国富强，但引进了西方先进技术，培养了一批近代人才。",competency:"历史解释"},
      {id:"kp_lq_4",title:"甲午中日战争",content:"1894年，日本蓄意挑起甲午战争。北洋水师在黄海海战中损失惨重，1895年全军覆没于威海卫。清政府被迫签订《马关条约》，割让台湾及澎湖列岛，赔偿白银两亿两。甲午战争的惨败标志着洋务运动的失败，大大加深了中国的半殖民地化程度。",competency:"史料实证"}
    ],

    }

      { id: "aw_teacher", name: "教育工作者", description: "以教育救国为己任，在各地办学授徒，传播新思想新文化", bonuses: { literacy: 12, morality: 10, reputation: 5 } }

    storyNodes: [
      S("aw_01",1890,10,16,"你出生在一个普通的家庭。1890年前后，你开始接受教育。此时正值晚清，甲午战争即将爆发，国家内忧外患。你虽然年幼，但已经能感受到时代的风云变幻。",
        [O("入私塾读书，接受传统教育",[F("literacy",10),F("morality",5)],2,"你在私塾中刻苦攻读四书五经，打下了扎实的文化基础。"),
         O("进入新式学堂，接触新知识",[F("literacy",8),F("politics",5),FL("aw_new_school",true)],2,"你进入一所新式学堂，开始接触西方科学和思想。"),
         O("帮助家里干活，在劳动中成长",[F("health",8),F("morality",5)],0,"你在劳动中锻炼了身体，也体会到了百姓的艰辛。")],
        SC("少年智则国智，少年强则国强。","梁启超《少年中国说》","少年的使命")),
      S("aw_02",1894,14,20,"甲午战争爆发！中国惨败于日本的消息传来，举国震惊。你虽然年少，但已经能感受到深深的国耻。康有为、梁启超等人的变法思想开始在知识分子中传播。",
        [O("关心时事，阅读报刊了解局势",[F("literacy",8),F("politics",5)],2,"你开始阅读《时务报》等报刊，对国家大事有了初步了解。"),
         O("在学堂中与同学讨论救国之策",[F("literacy",5),F("politics",5),F("morality",3)],1,"你和同学们热烈讨论如何救国，虽然年幼，但已经心怀天下。"),
         O("立志好好读书，将来报效国家",[F("literacy",8),F("morality",5)],2,"你暗下决心，要好好读书，将来为国家的富强贡献力量。")],
        SC("四万万人齐下泪，天涯何处是神州。","谭嗣同","甲午战败的悲愤")),
      S("aw_03",1898,18,24,"戊戌变法！光绪帝在康有为、梁启超等人的辅佐下推行变法。然而仅一百零三天后，慈禧太后发动政变，囚禁光绪帝，杀害谭嗣同等'戊戌六君子'。变法以失败告终。",
        [O("为谭嗣同等人的牺牲感到悲愤",[F("morality",10),F("politics",5)],1,"谭嗣同'我自横刀向天笑'的壮烈深深震撼了你。"),

      S("aw_04",1900,20,26,"义和团运动兴起，八国联军攻陷北京。慈禧太后仓皇西逃，《辛丑条约》签订。国家主权沦丧殆尽，民族危机空前严重。你正值青年，面对亡国灭种的威胁，心中充满了愤怒与焦虑。",

      S("aw_06",1908,28,34,"光绪帝和慈禧太后先后驾崩，年仅三岁的溥仪即位。清政府推行'预备立宪'，但暴露出虚伪面目。革命形势日益成熟，各地暗潮涌动。你感到一场大变革即将来临。",

      S("aw_07",1911,31,37,"武昌起义爆发！1911年10月10日，新军中的革命党人在武昌率先发难，攻占总督衙门。各省纷纷响应，宣布独立。你亲历了这个翻天覆地的历史时刻——两千多年的封建帝制即将终结！",

         O("用笔记录这一伟大时刻",[F("literacy",10),F("reputation",5)],3,"你用笔详细记录了武昌起义和各省独立的经过。")],
        SC("革命尚未成功，同志仍须努力。","孙中山","辛亥革命的意义")),
      S("aw_08",1912,32,38,"中华民国成立！孙中山在南京就任临时大总统，亚洲第一个民主共和国诞生。然而，袁世凯凭借手中的军权，迫使孙中山让位。革命的果实被窃取，民主共和的道路充满坎坷。",

         O("继续追随孙中山，坚持革命理想",[F("politics",8),F("morality",8),FL("aw_follow_sun",true)],2,"你坚定地追随孙中山，继续为民主共和而奋斗。"),

      S("aw_09",1915,35,41,"袁世凯公然复辟帝制，改中华民国为'中华帝国'。蔡锷在云南发动护国战争，全国掀起反袁浪潮。袁世凯在全国的唾骂声中被迫取消帝制，不久病死。然而，中国陷入了军阀割据的混乱局面。",

        SC("万户涕泪，一人冠冕，其心尚有'共和'二字存耶？","梁启超《异哉所谓国体问题者》","反对帝制复辟")),
      S("aw_10",1915,35,41,"陈独秀在上海创办《青年杂志》（后改名《新青年》），新文化运动拉开序幕。陈独秀、李大钊、胡适、鲁迅等人高举'民主'与'科学'两面大旗，猛烈抨击封建旧道德、旧文化，提倡新道德、新文化。这是一场深刻的思想解放运动。",
        [O("积极投身新文化运动",[F("literacy",12),F("politics",8),FL("aw_new_culture",true)],3,"你积极投身新文化运动，在《新青年》上发表文章，传播新思想。"),

      S("aw_11",1917,37,43,"俄国十月革命爆发！布尔什维克在列宁的领导下推翻了资产阶级临时政府，建立了世界上第一个社会主义国家。'十月革命一声炮响，给我们送来了马克思列宁主义。'这个消息在中国知识界引起了巨大反响。",

      S("aw_12",1919,39,45,"五四运动爆发！巴黎和会上，中国作为战胜国却遭受屈辱——列强将德国在山东的权益转让给日本。5月4日，北京三千多名学生在天安门前集会游行，高呼'外争主权，内除国贼'。运动迅速蔓延全国，工人罢工、商人罢市。这是中国新民主主义革命的开端。",
        [O("积极参加五四运动，上街游行示威",[F("morality",10),F("politics",10),F("reputation",8),FL("aw_wusi",true)],2,"你积极参加了五四运动，在游行中高呼'外争主权，内除国贼'。"),

        SC("外争主权，内除国贼！","五四运动口号","五四运动的精神")),
      S("aw_13",1920,40,46,"五四运动后，马克思主义在中国广泛传播。李大钊在北京、陈独秀在上海分别组织了马克思主义研究会。《共产党宣言》的中文全译本出版。各地相继建立了共产党早期组织。中国革命的面貌即将发生根本性的改变。",

      S("aw_14",1921,41,47,"中国共产党第一次全国代表大会在上海召开！十三位代表代表全国五十多名党员出席了会议。中国共产党正式成立！这是开天辟地的大事变，中国革命的面貌从此焕然一新。",

        SC("自从有了中国共产党，中国革命的面貌就焕然一新了。","毛泽东","中国共产党的成立")),

      S("aw_20",1931,51,57,"九一八事变！日本关东军蓄意炸毁南满铁路，嫁祸中国军队，随即攻占沈阳。在蒋介石'不抵抗'政策下，东北三省沦陷。三千万东北同胞沦为亡国奴。你深感亡国之痛。",

      S("aw_21",1934,54,60,"由于王明'左'倾错误路线的指导，中央红军第五次反'围剿'失败，被迫进行战略转移——长征。红军历经千难万险，跨越万水千山，开始了人类历史上最伟大的远征。",

// ==================== 界面控制 ====================
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  GS.currentScreen=id;
  window.scrollTo(0,0);
}
function closeModal(id){document.getElementById(id).classList.remove('active')}
function showNotification(msg){
  const n=document.createElement('div');
  n.className='notification';
  n.textContent=msg;
  document.body.appendChild(n);
  setTimeout(()=>n.remove(),2000);
}
function formatYear(y){return y<0?`公元前${Math.abs(y)}年`:`公元${y}年`}
function formatAge(a){return`${a}岁`}

// ==================== 开始新游戏 ====================
function startNewGame(){
  GS=newGameState();
  ERAS=buildEras();
  renderEraCards();
  showScreen('screen-era');
}

// ==================== 继续游戏 ====================
function loadAndContinue(){
  const d=localStorage.getItem('history_sim_save');
  if(!d)return;
  GS=JSON.parse(d);
  ERAS=buildEras();
  // 恢复scenario引用
  if(GS.eraId&&GS.scenarioId){
    const era=ERAS.find(e=>e.id===GS.eraId);
    if(era){
      GS.era=era;
      GS.scenario=era.scenarios.find(s=>s.id===GS.scenarioId);
    }
  }
  showScreen('screen-game');
  renderGameHeader();
  renderAttributes();
  advanceYear();
}

// ==================== 选择身份（完全重写：真实年龄时间线） ====================
function selectIdentity(id){
  const scenario=GS.scenario;
  const i=scenario.identities.find(x=>x.id===id);
  GS.identityId=id;
  GS.identity=i;
  Object.assign(GS.attributes,{...i.baseAttributes});

  // 真实年龄时间线：birthYear = scenario.yearStart - 10 - random(0,10)
  GS.birthYear=scenario.yearStart-10-Math.floor(Math.random()*11);
  GS.currentYear=GS.birthYear;
  GS.age=0;

  // 将故事节点映射到真实年龄时间线
  const sortedNodes=[...scenario.storyNodes].sort((a,b)=>a.year-b.year);
  GS.eraTimeline=sortedNodes.map(n=>{
    // targetAge = node.year - birthYear（真实年龄）
    const targetAge=n.year-GS.birthYear;
    return{...n,targetAge:targetAge,triggered:false};
  });

  // 映射年度事件用于填充节点间隙
  const sortedEvents=[...scenario.yearlyEvents].sort((a,b)=>a.year-b.year);
  GS.eraEventPool=sortedEvents.map(e=>({...e,used:false}));

  // 初始化天赋加成（来自scenario.talentBonuses）
  // 兼容两种格式：talentId为键 或 talentName为键
  GS.talentActiveBonuses=[];
  if(scenario.talentBonuses){
    for(let key in scenario.talentBonuses){
      // 查找匹配的天赋（先按ID匹配，再按名称匹配）
      let matchedTalent=GS.talents.find(t=>t.id===key);
      if(!matchedTalent)matchedTalent=GS.talents.find(t=>t.name===key);
      if(matchedTalent){
        GS.talentActiveBonuses.push({
          talentId:matchedTalent.id,
          talentName:matchedTalent.name,
          ...scenario.talentBonuses[key]
        });
      }
    }
  }

  showScreen('screen-talents');
  drawTalents();
  // 应用天赋被动加成（talentBonuses中的effects数组）
  if(GS.talentActiveBonuses.length>0){
    GS.talentActiveBonuses.forEach(bonus=>{
      if(bonus.effects){
        applyEffects(bonus.effects);
      }
    });
  }
}

// ==================== 抽取天赋 ====================
function drawTalents(){
  const area=document.getElementById('talent-area');
  area.innerHTML='<div class="drawing-text">正在抽取天赋...</div>';
  document.getElementById('talent-confirm').style.display='none';
  setTimeout(()=>{
    const shuffled=[...TALENTS].sort(()=>Math.random()-.5);
    const picked=shuffled.slice(0,3);
    GS.talents=picked;
    // 检查是否有天赋在当前剧本中激活加成
    const scenario=GS.scenario;
    const bonusMap=scenario.talentBonuses||{};
    area.innerHTML='<div class="talent-cards">'+picked.map(t=>{
      // 兼容两种格式：按ID或名称匹配天赋加成
      const bonus=bonusMap[t.id]||bonusMap[t.name];
      const bonusDesc=bonus?`<div style="font-size:.78rem;color:#9B59B6;margin-top:6px">${bonus.desc||bonus.description||''}</div>`:'';
      return`<div class="talent-card">
        <div class="talent-rarity rarity-${t.rarity}">${t.rarity==='common'?'普通':t.rarity==='rare'?'稀有':'史诗'}</div>
        <div class="talent-name">${t.name}</div>
        <div class="talent-desc">${t.desc}</div>
        ${bonusDesc}
      </div>`;
    }).join('')+'</div>';
    document.getElementById('talent-confirm').style.display='block';
  },800);
}

// ==================== 开始游戏 ====================
function startGame(){
  GS.talents.forEach(t=>{
    if(t.effect.minAll){
      for(let k of Object.keys(GS.attributes)){
        GS.attributes[k]=Math.max(GS.attributes[k],t.effect.minAll);
      }
    }else{
      for(let[k,v]of Object.entries(t.effect)){
        if(GS.attributes[k]!==undefined)GS.attributes[k]=Math.min(100,Math.max(0,GS.attributes[k]+v));
      }
    }
  });
  GS.age=5;
  GS.currentYear=GS.birthYear+GS.age;
  showScreen('screen-game');
  renderGameHeader();
  renderAttributes();
  showOpening();
  saveGame();
}

  // 使用 GS.scenario 获取时代信息
  const scenario=GS.scenario;
  const era=GS.era;
  const id=GS.identity;
  const histYear=formatYear(GS.birthYear);
  const content=document.getElementById('game-content');
  content.innerHTML=`
    <span class="event-year-label">${formatAge(GS.age)}（${histYear}）</span>
    <div class="event-text">你出生在${era.name}时代（${scenario.period}），${histYear}前后。你的家庭出身是${id.name}——${id.desc}。在这个风云变幻的大时代中，你将面临无数抉择，你的每一个选择都将影响命运的走向。</div>
  `;
  GS.yearlyLog.push({year:GS.currentYear,age:GS.age,text:'你出生在'+era.name+'时代',type:'major'});
  document.getElementById('options-area').innerHTML=`<button class="continue-btn" onclick="advanceYear()">开始人生</button>`;
}

// ==================== 渲染属性 ====================
function renderAttributes(){
  const b=document.getElementById('attrs-body');
  b.innerHTML='';
  for(let[k,v]of Object.entries(GS.attributes)){
    const pct=Math.max(0,Math.min(100,v));
    b.innerHTML+=`<div class="attr-row"><span class="attr-label">${ATTR_NAMES[k]}</span><div class="attr-bar-bg"><div class="attr-bar" style="width:${pct}%"></div></div><span class="attr-value">${Math.round(v)}</span></div>`;
  }
}
function toggleAttrs(){
  const t=document.getElementById('attrs-toggle');
  const b=document.getElementById('attrs-body');
  t.classList.toggle('open');
  b.classList.toggle('open');
}

// ==================== 修改属性 ====================
function modifyAttribute(key,delta){
  GS.attributes[key]=Math.max(0,Math.min(100,GS.attributes[key]+delta));
  renderAttributes();
}

// ==================== 应用效果 ====================
function applyEffects(effects){
  if(!effects)return;
  effects.forEach(e=>{
    if(e.type==='attribute')modifyAttribute(e.key,e.delta);
    if(e.type==='flag')GS.flags[e.key]=e.value;
  });
  saveGame();
}

// ==================== 应用素养加成 ====================
function applyLiteracy(bonus){
  if(!bonus)return;
  for(let[k,v]of Object.entries(bonus)){
    GS.literacyScores[k]=(GS.literacyScores[k]||0)+v;
  }
}

// ==================== 检查节点条件（增加天赋支持） ====================
function checkNodeCondition(cond){
  if(!cond||Object.keys(cond).length===0)return true;
  // flag条件
  if(cond.flag&&!GS.flags[cond.flag])return false;
  if(cond.no_flag&&GS.flags[cond.no_flag])return false;
  // noFlag条件（兼容旧写法）
  if(cond.noFlag&&GS.flags[cond.noFlag])return false;
  // attribute条件
  if(cond.attribute){
    for(let[k,v]of Object.entries(cond.attribute)){
      if(GS.attributes[k]<v)return false;
    }
  }
  // 天赋条件：talentRequired - 需要拥有指定天赋
  if(cond.talentRequired){
    const required=Array.isArray(cond.talentRequired)?cond.talentRequired:[cond.talentRequired];
    if(!required.some(tid=>GS.talents.some(t=>t.id===tid)))return false;
  }
  // 天赋条件：talentAny - 拥有任意一个即可
  if(cond.talentAny){
    const any=Array.isArray(cond.talentAny)?cond.talentAny:[cond.talentAny];
    if(!any.some(tid=>GS.talents.some(t=>t.id===tid)))return false;
  }
  return true;
}

// ==================== 注入天赋内容（新增） ====================
function injectTalentContent(node){
  if(!GS.talentActiveBonuses||GS.talentActiveBonuses.length===0)return;
  GS.talentActiveBonuses.forEach(bonus=>{
    // 方式一：通过options数组注入额外选项（格式：[{nodeId, optionText, effects, result}]）
    if(bonus.options){
      const matchOpt=bonus.options.find(o=>o.nodeId===node.id);
      if(matchOpt){
        const exists=node.options.some(o=>o.text===matchOpt.optionText);
        if(!exists){
          node.options.push({
            text:matchOpt.optionText+' [天赋：'+bonus.talentName+']',
            effects:matchOpt.effects||[],
            literacyBonus:matchOpt.literacyBonus||{},
            result:matchOpt.result||'',
            _isTalentOption:true,
            _talentId:bonus.talentId
          });
        }
      }
    }
    // 方式二：通过nodeAttrBonus自动应用属性加成（格式：{nodeId: {attr: delta}}）
    if(bonus.nodeAttrBonus&&bonus.nodeAttrBonus[node.id]){
      for(let[k,v]of Object.entries(bonus.nodeAttrBonus[node.id])){
        GS.attributes[k]=(GS.attributes[k]||0)+v;
      }
    }
    // 方式三：通过effects数组在所有节点中应用被动加成（格式：[F("intelligence",5)]）
    // 被动加成在selectIdentity时已通过applyEffects应用，此处不重复
  });
}

// ==================== 推进年份（适配真实年龄时间线） ====================
function advanceYear(){
  if(!GS.isAlive)return;
  const timeline=GS.eraTimeline;
  if(!timeline||timeline.length===0){triggerDeath('no_content');return}

  // 查找下一个未触发且满足条件的节点
  const nextNode=timeline.find(n=>!n.triggered&&checkNodeCondition(n.condition));
  if(nextNode){
    const gap=nextNode.targetAge-GS.age;
    if(gap>2){
      showFillerEvents(Math.min(gap-1,2),nextNode.targetAge);
      return;
    }
    // 跳转到节点目标年龄
    GS.age=nextNode.targetAge;
    GS.currentYear=GS.birthYear+GS.age;
    renderGameHeader();
    // 死亡检查：年龄>=75时，每增加5岁增加8%的死亡概率
    if(GS.age>=75&&Math.random()<0.08*(GS.age-75)/5){
      triggerDeath('old_age');
      return;
    }
    if(GS.attributes.constitution<=0){
      triggerDeath('illness');
      return;
    }
    nextNode.triggered=true;
    GS.triggeredNodes.push(nextNode.id);
    showChoiceNode(nextNode);
    return;
  }

  // 没有更多故事节点 - 显示剩余年度事件
  const unusedEvents=GS.eraEventPool.filter(e=>!e.used);
  if(unusedEvents.length>0){
    GS.age++;
    GS.currentYear=GS.birthYear+GS.age;
    renderGameHeader();
    if(GS.age>=75&&Math.random()<0.08*(GS.age-75)/5){
      triggerDeath('old_age');
      return;
    }
    if(GS.attributes.constitution<=0){
      triggerDeath('illness');
      return;
    }
    showYearlyEvent();
    return;
  }

  // 没有事件了
  if(GS.age>=75){
    triggerDeath('old_age');
    return;
  }
  if(GS.attributes.constitution<=0){
    triggerDeath('illness');
    return;
  }
  triggerDeath('natural');
}

// ==================== 显示填充事件（优先匹配当前历史年份） ====================
function showFillerEvents(count,targetAge){
  const unusedEvents=GS.eraEventPool.filter(e=>!e.used);
  const currentHistYear=GS.birthYear+GS.age+1; // 即将跳到的年份

  // 优先选择与当前历史年份接近的事件（5年内）
  let bestEvt=null;
  let bestIdx=0;
  let bestDist=Infinity;
  unusedEvents.forEach((e,idx)=>{
    const dist=Math.abs(e.year-currentHistYear);
    if(dist<=5&&dist<bestDist){
      bestDist=dist;
      bestEvt=e;
      bestIdx=idx;
    }
  });

  // 如果没有找到接近的，取第一个
  if(!bestEvt&&unusedEvents.length>0){
    bestEvt=unusedEvents[0];
  }

  if(!bestEvt){
    // 没有可用事件，直接跳到目标年龄
    GS.age=targetAge;
    GS.currentYear=GS.birthYear+GS.age;
    renderGameHeader();
    advanceYear();
    return;
  }

  bestEvt.used=true;
  GS.usedEvents.push(bestEvt.text);
  GS.age++;
  GS.currentYear=GS.birthYear+GS.age;
  renderGameHeader();

  // 死亡检查
  if(GS.age>=75&&Math.random()<0.08*(GS.age-75)/5){
    triggerDeath('old_age');
    return;
  }
  if(GS.attributes.constitution<=0){
    triggerDeath('illness');
    return;
  }

  const content=document.getElementById('game-content');
  const evtYear=bestEvt.year!==undefined?formatYear(bestEvt.year):'';
  content.innerHTML=`
    <span class="event-year-label">${formatAge(GS.age)}${evtYear?'（'+evtYear+'）':''}</span>
    <div class="event-text">${bestEvt.text}</div>
  `;
  GS.yearlyLog.push({year:GS.currentYear,age:GS.age,text:bestEvt.text,type:bestEvt.type||'minor'});
  document.getElementById('options-area').innerHTML=`<button class="continue-btn" onclick="advanceYear()">继续</button>`;
}

    }

// ==================== 检查结局（完全重写：优先级排序、minAge、requireNoLaterNodes） ====================
function checkEnding(){
  if(!GS.isAlive)return;
  const scenario=GS.scenario;
  if(!scenario||!scenario.endings)return;

  // 构建可触发的结局列表，带优先级评分
  const candidates=[];
  for(let ending of scenario.endings){
    const c=ending.condition;
    // 无条件结局（默认结局）始终作为候选
    if(!c||Object.keys(c).length===0){
      candidates.push({ending,priority:0});
      continue;
    }
    // 检查最低年龄要求
    if(ending.minAge&&GS.age<ending.minAge)continue;
    // 检查flag条件
    if(c.flag&&!GS.flags[c.flag])continue;
    if(c.no_flag&&GS.flags[c.no_flag])continue;
    if(c.noFlag&&GS.flags[c.noFlag])continue;
    // 检查attribute条件
    if(c.attribute){
      let ok=true;
      for(let[k,v]of Object.entries(c.attribute)){
        if(GS.attributes[k]<v){ok=false;break;}
      }
      if(!ok)continue;
    }
    // 检查requireNoLaterNodes：如果指定了后续节点ID，且该节点已被触发，则跳过此结局
    if(ending.requireNoLaterNodes){
      const blocked=ending.requireNoLaterNodes.some(nodeId=>GS.triggeredNodes.includes(nodeId));
      if(blocked)continue;
    }
    // 计算优先级：条件越多越具体，优先级越高
    let priority=1;
    if(c.flag)priority+=2;
    if(c.attribute)priority+=Object.keys(c.attribute).length;
    if(c.no_flag||c.noFlag)priority+=1;
    // rank越高优先级越高
    const rankOrder={S:10,A:8,B:6,C:4,D:2};
    priority+=(rankOrder[ending.rank]||0);
    candidates.push({ending,priority});
  }

  if(candidates.length===0)return;

  // 按优先级降序排序，取最高优先级的结局
  candidates.sort((a,b)=>b.priority-a.priority);
  const best=candidates[0];
  triggerEnding(best.ending);
}

// ==================== 触发死亡 ====================
function triggerDeath(reason){
  GS.isAlive=false;
  const scenario=GS.scenario;
  if(!scenario||!scenario.endings){
    triggerEnding({id:"death",title:"人生落幕",text:`你在${formatAge(GS.age)}时走完了人生的旅程。`,rank:"C",literacyBonus:{}});
    return;
  }

  if(reason==='illness'){
    const defaultEnding=scenario.endings.find(e=>!e.condition||Object.keys(e.condition).length===0);
    triggerEnding(defaultEnding||{id:"death_illness",title:"病逝",text:`你在${formatAge(GS.age)}时因体质衰弱而病逝。虽然生命短暂，但你在这个时代留下了自己的印记。`,rank:"D",literacyBonus:{}});
    return;
  }
  const defaultEnding=scenario.endings.find(e=>!e.condition||Object.keys(e.condition).length===0);
  triggerEnding(defaultEnding||{id:"death",title:"人生落幕",text:`你在${formatAge(GS.age)}时走完了人生的旅程。在这个风云变幻的时代，你经历了许多，也做出了自己的选择。`,rank:"C",literacyBonus:{}});
}

// ==================== 绘制雷达图 ====================
function drawRadarChart(){
  const canvas=document.getElementById('radar-canvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=280,H=280,cx=W/2,cy=H/2,R=100;
  const labels=Object.values(LITERACY_NAMES);
  const scores=GS.literacyScores;
  const vals=[scores.materialism||0,scores.spatiotemporal||0,scores.evidence||0,scores.interpretation||0,scores.patriotism||0];
  const maxVal=20;
  const n=5;
  ctx.clearRect(0,0,W,H);
  // 绘制网格
  for(let ring=1;ring<=4;ring++){
    const r=R*ring/4;
    ctx.beginPath();
    for(let i=0;i<=n;i++){
      const angle=-Math.PI/2+2*Math.PI*i/n;
      const x=cx+r*Math.cos(angle);
      const y=cy+r*Math.sin(angle);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.strokeStyle='rgba(212,197,169,0.6)';
    ctx.lineWidth=1;
    ctx.stroke();
  }
  // 绘制轴线
  for(let i=0;i<n;i++){
    const angle=-Math.PI/2+2*Math.PI*i/n;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+R*Math.cos(angle),cy+R*Math.sin(angle));
    ctx.strokeStyle='rgba(212,197,169,0.6)';
    ctx.stroke();
  }
  // 绘制数据区域
  ctx.beginPath();
  for(let i=0;i<=n;i++){
    const idx=i%n;
    const angle=-Math.PI/2+2*Math.PI*idx/n;
    const v=Math.min(vals[idx]/maxVal,1);
    const r=R*v;
    const x=cx+r*Math.cos(angle);
    const y=cy+r*Math.sin(angle);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.fillStyle='rgba(199,91,57,0.25)';
  ctx.fill();
  ctx.strokeStyle='rgba(199,91,57,0.8)';
  ctx.lineWidth=2;
  ctx.stroke();
  // 绘制数据点和标签
  for(let i=0;i<n;i++){
    const angle=-Math.PI/2+2*Math.PI*i/n;
    const v=Math.min(vals[i]/maxVal,1);
    const r=R*v;
    const x=cx+r*Math.cos(angle);
    const y=cy+r*Math.sin(angle);
    ctx.beginPath();
    ctx.arc(x,y,4,0,2*Math.PI);
    ctx.fillStyle='#C75B39';
    ctx.fill();
    const lx=cx+(R+22)*Math.cos(angle);
    const ly=cy+(R+22)*Math.sin(angle);
    ctx.fillStyle='#3C2415';
    ctx.font='12px system-ui, sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(labels[i],lx,ly);
    ctx.fillStyle='#8B7355';
    ctx.font='10px system-ui, sans-serif';
    ctx.fillText(vals[i],lx,ly+14);
  }
}

// ==================== 检查成就 ====================
function checkAchievements(){
  const unlocked=[];
  ACHIEVEMENTS.forEach(a=>{
    if(GS.achievements.includes(a.id))return;
    let met=false;
    if(a.id==='ach_source')met=GS.sourcesViewed>=5;
    else if(a.id==='ach_no_modern')met=GS.modernMindsetCount===0;
    else if(a.id==='ach_patriot')met=(GS.literacyScores.patriotism||0)>=10;
    else if(a.id==='ach_materialism')met=(GS.literacyScores.materialism||0)>=8;
    else if(a.id==='ach_long_life')met=GS.age>=70;
    else if(a.id==='ach_high_int')met=GS.attributes.intelligence>=90;
    else if(a.id==='ach_high_rep')met=GS.attributes.reputation>=90;
    else if(a.id==='ach_rich')met=GS.attributes.wealth>=90;
    else if(a.id==='ach_first')met=true;
    else if(a.id==='ach_s_rank')met=GS.endingRank==='S';
    if(met){
      unlocked.push(a);
      GS.achievements.push(a.id);
    }
  });
  if(unlocked.length>0)unlocked.forEach(a=>showNotification('解锁成就：'+a.icon+' '+a.name));
  return unlocked;
}

  let details=[];
  if((s.materialism||0)>=5)details.push('你善于从经济基础和阶级关系的角度分析历史，体现了唯物史观的思维方式。');
  if((s.spatiotemporal||0)>=5)details.push('你对历史事件的时间和空间背景有较好的把握，时空观念较强。');
  if((s.evidence||0)>=5)details.push('你注重查阅史料，善于从史料中提取有效信息，史料实证能力突出。');
  if((s.interpretation||0)>=5)details.push('你能对历史事件做出合理的分析和解释，历史解释能力较强。');
  if((s.patriotism||0)>=5)details.push('你在选择中展现出了强烈的家国情怀，关心国家和民族的命运。');
  if(details.length>0)comment+='<br><br><strong>亮点：</strong>'+details.join('');
  return`<div class="teacher-comment"><strong>教师评语</strong><br>${comment}</div>`;
}

// ==================== 保存游戏 ====================
function saveGame(){
  try{localStorage.setItem('history_sim_save',JSON.stringify(GS))}catch(e){}
}

// ==================== 检查存档 ====================
function hasSavedGame(){return!!localStorage.getItem('history_sim_save')}

// ==================== 重新开始同一时代（适配新流程） ====================
function restartSameEra(){
  const eraId=GS.eraId;
  const scenarioId=GS.scenarioId;
  const identityId=GS.identityId;
  GS=newGameState();
  ERAS=buildEras();
  GS.eraId=eraId;
  GS.era=ERAS.find(e=>e.id===eraId);
  GS.scenarioId=scenarioId;
  GS.scenario=GS.era.scenarios.find(s=>s.id===scenarioId);
  selectIdentity(identityId);
}

// ==================== 初始化 ====================
window.addEventListener('DOMContentLoaded',function(){
  if(hasSavedGame())document.getElementById('continue-area').style.display='block';
});
</script>
