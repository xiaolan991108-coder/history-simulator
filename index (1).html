<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>历史模拟器 - 穿越千年</title>
<style>
:root{--bg:#F5F0E8;--bg-dark:#3C2415;--accent:#C75B39;--green:#7BA08A;--text-muted:#8B7355;--card-bg:#EDE6D8;--border:#D4C5A9;--white:#FFFDF7}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;font-family:system-ui,-apple-system,"PingFang SC","Microsoft YaHei",serif;background:var(--bg);color:var(--bg-dark);overflow-x:hidden;-webkit-tap-highlight-color:transparent}
body{display:flex;justify-content:center}
#app{width:100%;max-width:480px;min-height:100vh;position:relative;background:var(--bg)}
.screen{display:none;width:100%;min-height:100vh;padding:20px 16px;padding-bottom:100px;animation:fadeIn .4s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.home-content{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90vh;text-align:center}
.home-title{font-size:2.2rem;font-weight:700;margin-bottom:8px;letter-spacing:4px}
.home-subtitle{font-size:1rem;color:var(--text-muted);margin-bottom:40px;letter-spacing:2px}
.home-divider{width:120px;height:2px;margin:0 auto 30px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.home-desc{font-size:.9rem;color:var(--text-muted);line-height:1.8;max-width:320px;margin-bottom:40px}
.btn{display:inline-block;padding:14px 40px;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .3s;letter-spacing:2px;font-family:inherit}
.btn-primary{background:var(--accent);color:var(--white);box-shadow:0 4px 12px rgba(199,91,57,.3)}
.btn-primary:active{transform:scale(.97)}
.btn-secondary{background:var(--card-bg);color:var(--bg-dark);border:1px solid var(--border)}
.btn-secondary:active{transform:scale(.97)}
.btn-small{padding:10px 24px;font-size:.85rem}
.btn-continue{margin-top:16px;background:var(--green);color:var(--white)}
.screen-title{text-align:center;font-size:1.4rem;font-weight:700;margin-bottom:6px;letter-spacing:2px}
.screen-desc{text-align:center;font-size:.85rem;color:var(--text-muted);margin-bottom:24px}
.era-grid,.identity-grid,.scenario-grid{display:flex;flex-direction:column;gap:12px}
.era-card,.identity-card,.scenario-card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .3s}
.era-card:active,.identity-card:active,.scenario-card:active{transform:scale(.98)}
.era-card-header{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.era-icon{font-size:1.8rem}.era-name{font-size:1.1rem;font-weight:700}.era-period{font-size:.8rem;color:var(--text-muted)}
.era-desc,.identity-desc,.scenario-desc{font-size:.82rem;color:var(--text-muted);line-height:1.6}
.era-tag,.scenario-tag{display:inline-block;font-size:.7rem;padding:2px 8px;border-radius:4px;background:rgba(199,91,57,.1);color:var(--accent);margin-top:8px}
.identity-name,.scenario-name{font-size:1.05rem;font-weight:700;margin-bottom:4px}
.identity-attrs{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.identity-attr-tag{font-size:.72rem;padding:2px 8px;border-radius:4px;background:rgba(123,160,138,.15);color:var(--green)}
.talent-cards{display:flex;flex-direction:column;gap:16px;align-items:center;margin:20px 0}
.talent-card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:20px;width:100%;max-width:320px;text-align:center;animation:slideUp .5s ease}
.talent-card:nth-child(2){animation-delay:.15s}.talent-card:nth-child(3){animation-delay:.3s}
.talent-rarity{font-size:.72rem;letter-spacing:2px;margin-bottom:8px}
.rarity-common{color:var(--text-muted)}.rarity-rare{color:#4A90D9}.rarity-epic{color:#9B59B6}
.talent-name{font-size:1.2rem;font-weight:700;margin-bottom:6px}.talent-desc{font-size:.85rem;color:var(--text-muted)}
.game-header{position:sticky;top:0;z-index:10;background:var(--bg);padding:12px 0;border-bottom:1px solid var(--border)}
.game-header-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.game-era-name{font-size:1rem;font-weight:700}.game-age{font-size:.85rem;color:var(--text-muted)}.game-year{font-size:.8rem;color:var(--text-muted)}
.game-content{padding:16px 0;min-height:40vh}
.event-text{font-size:.95rem;line-height:1.9;margin-bottom:16px}
.event-year-label{font-size:.82rem;color:var(--accent);font-weight:600;margin-bottom:8px;display:block}
.result-text{font-size:.9rem;line-height:1.8;color:var(--text-muted);padding:12px 16px;background:var(--card-bg);border-radius:8px;border-left:3px solid var(--green);margin:12px 0}
.source-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(199,91,57,.1);color:var(--accent);border:1px solid rgba(199,91,57,.2);border-radius:8px;font-size:.85rem;cursor:pointer;margin:8px 0;font-family:inherit}
.source-btn:active{background:rgba(199,91,57,.2)}
.attrs-panel{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin:12px 0}
.attrs-toggle{display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-size:.85rem;font-weight:600}
.attrs-toggle::after{content:"\25BC";font-size:.7rem;color:var(--text-muted);transition:transform .3s}
.attrs-toggle.open::after{transform:rotate(180deg)}
.attrs-body{display:none;margin-top:12px}.attrs-body.open{display:block}
.attr-row{display:flex;align-items:center;margin-bottom:8px;position:relative}
.attr-label{width:48px;font-size:.78rem;color:var(--text-muted);flex-shrink:0}
.attr-bar-bg{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin:0 8px}
.attr-bar{height:100%;border-radius:4px;transition:width .5s;background:linear-gradient(90deg,var(--green),var(--accent))}
.attr-value{width:32px;text-align:right;font-size:.78rem;font-weight:600}
.options-area{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));background:linear-gradient(transparent,var(--bg) 20%)}
.option-btn{display:block;width:100%;padding:14px 16px;background:var(--card-bg);border:1px solid var(--border);border-radius:10px;font-size:.9rem;color:var(--bg-dark);cursor:pointer;transition:all .2s;text-align:left;margin-bottom:8px;font-family:inherit;line-height:1.5}
.option-btn:active{background:var(--accent);color:var(--white);border-color:var(--accent);transform:scale(.98)}
.option-btn.talent-option{border-color:rgba(155,89,182,.4);background:rgba(155,89,182,.05)}
.option-btn.talent-option:active{background:#9B59B6;color:var(--white);border-color:#9B59B6}
.continue-btn{display:block;width:100%;padding:14px;background:var(--green);color:var(--white);border:none;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:1px}
.continue-btn:active{transform:scale(.97)}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(60,36,21,.6);z-index:100;justify-content:center;align-items:center;padding:20px}
.modal-overlay.active{display:flex}
.modal-card{background:var(--white);border-radius:16px;padding:24px;max-width:400px;width:100%;max-height:80vh;overflow-y:auto;animation:slideUp .3s;position:relative}
.modal-close{position:absolute;top:12px;right:16px;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--text-muted);padding:4px}
.modal-title{font-size:1.1rem;font-weight:700;margin-bottom:12px;padding-right:30px}
.source-quote{font-size:.9rem;line-height:1.8;padding:12px 16px;background:var(--card-bg);border-radius:8px;border-left:3px solid var(--accent);margin-bottom:12px;font-style:italic}
.source-from{font-size:.8rem;color:var(--text-muted);margin-bottom:12px;text-align:right}
.source-hint{font-size:.85rem;color:var(--accent);line-height:1.6;padding:10px;background:rgba(199,91,57,.05);border-radius:8px}
.ending-content{text-align:center;padding-top:20px}
.ending-rank{font-size:4rem;font-weight:900;margin:16px 0;animation:pulse 1.5s infinite}
.rank-S{color:#FFD700;text-shadow:0 0 20px rgba(255,215,0,.5)}.rank-A{color:var(--accent)}.rank-B{color:var(--green)}.rank-C{color:var(--text-muted)}.rank-D{color:#999}
.ending-title{font-size:1.4rem;font-weight:700;margin-bottom:8px}
.ending-text{font-size:.9rem;line-height:1.8;color:var(--text-muted);text-align:left;margin:16px 0;padding:16px;background:var(--card-bg);border-radius:12px}
.radar-canvas-wrap{display:flex;justify-content:center;margin:20px 0}
.section-title{font-size:1rem;font-weight:700;margin:20px 0 12px;text-align:left;letter-spacing:1px}
.choice-item{padding:10px 12px;background:var(--card-bg);border-radius:8px;margin-bottom:6px;font-size:.82rem;text-align:left}
.choice-item-year{color:var(--accent);font-weight:600;font-size:.78rem}
.choice-item-text{color:var(--bg-dark);font-size:.8rem;margin:4px 0;line-height:1.5}
.choice-item-chosen{color:var(--green);font-size:.78rem;margin-top:2px}
.achievement-list{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:12px 0}
.achievement-badge{padding:6px 12px;background:var(--card-bg);border:1px solid var(--border);border-radius:8px;font-size:.78rem}
.teacher-comment{padding:16px;background:var(--card-bg);border-radius:12px;text-align:left;font-size:.85rem;line-height:1.8;margin:12px 0}
.knowledge-points{text-align:left;font-size:.82rem;color:var(--text-muted);line-height:1.8;padding:12px;background:var(--card-bg);border-radius:8px}
.ending-buttons{display:flex;gap:12px;margin-top:24px;margin-bottom:40px}
.ending-buttons .btn{flex:1}
.ink-line{width:100%;height:1px;margin:20px 0;background:linear-gradient(90deg,transparent 0%,var(--border) 20%,var(--border) 80%,transparent 100%)}
.ink-line-short{width:60px;height:1px;margin:12px auto;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.notification{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--bg-dark);color:var(--white);padding:10px 20px;border-radius:8px;font-size:.85rem;z-index:200;animation:slideDown .3s;max-width:90%}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.timeline{text-align:left;margin:12px 0}
.timeline-item{padding:6px 0 6px 20px;border-left:2px solid var(--border);margin-left:8px;font-size:.8rem;line-height:1.5;color:var(--text-muted);position:relative}
.timeline-item::before{content:"";position:absolute;left:-5px;top:12px;width:8px;height:8px;border-radius:50%;background:var(--border)}
.timeline-item.major{border-left-color:var(--accent)}.timeline-item.major::before{background:var(--accent)}
.timeline-year{color:var(--accent);font-weight:600;font-size:.75rem}
.talent-draw-area{min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.drawing-text{font-size:1rem;color:var(--text-muted);margin-bottom:20px;animation:pulse 1s infinite}
</style>
</head>
<body>
<div id="app">
<div id="screen-home" class="screen active"><div class="home-content">
<div style="font-size:3rem;margin-bottom:16px">&#x1F3DB;</div>
<div class="home-title">历史模拟器</div>
<div class="home-subtitle">穿越千年 · 以史为鉴</div>
<div class="home-divider"></div>
<div class="home-desc">你将穿越到中国古代，随机获得一个身份，在历史洪流中做出关键抉择。你的每一个选择，都将影响命运的走向。准备好了吗？</div>
<button class="btn btn-primary" onclick="startNewGame()">开始穿越</button>
<div id="continue-area" style="margin-top:16px;display:none"><button class="btn btn-secondary btn-small btn-continue" onclick="loadAndContinue()">继续游戏</button></div>
<div class="ink-line-short" style="margin-top:30px"></div>
<div style="font-size:.75rem;color:var(--text-muted);margin-top:10px">培养历史学五大核心素养<br>唯物史观 · 时空观念 · 史料实证 · 历史解释 · 家国情怀</div>
</div></div>
<div id="screen-era" class="screen"><div class="screen-title">选择时代</div><div class="screen-desc">你想穿越到哪个时代？</div><div id="era-grid" class="era-grid"></div></div>
<!-- 新增：剧本选择界面 -->
<div id="screen-scenario" class="screen"><div class="screen-title" id="scenario-title">选择剧本</div><div class="screen-desc" id="scenario-desc"></div><div id="scenario-grid" class="scenario-grid"></div><div style="text-align:center;margin-top:20px"><button class="btn btn-secondary btn-small" onclick="showScreen('screen-era')">返回</button></div></div>
<div id="screen-identity" class="screen"><div class="screen-title" id="identity-title">选择身份</div><div class="screen-desc" id="identity-desc"></div><div id="identity-grid" class="identity-grid"></div><div style="text-align:center;margin-top:20px"><button class="btn btn-secondary btn-small" onclick="showScreen('screen-scenario')">返回</button></div></div>
<div id="screen-talents" class="screen"><div class="screen-title">天赋抽取</div><div class="screen-desc">命运赐予你三项天赋</div><div id="talent-area" class="talent-draw-area"><div class="drawing-text">正在抽取天赋...</div></div><div id="talent-confirm" style="text-align:center;display:none;margin-top:20px"><button class="btn btn-primary" onclick="startGame()">开始人生</button></div></div>
<div id="screen-game" class="screen" style="padding-bottom:200px"><div class="game-header"><div class="game-header-info"><span class="game-era-name" id="game-era-name"></span><span class="game-age" id="game-age"></span></div><div class="game-year" id="game-year"></div></div><div class="game-content" id="game-content"></div><div class="attrs-panel"><div class="attrs-toggle" id="attrs-toggle" onclick="toggleAttrs()">属性面板</div><div class="attrs-body" id="attrs-body"></div></div><div class="options-area" id="options-area"></div></div>
<div id="screen-ending" class="screen"><div class="ending-content" id="ending-content"></div></div>
<div class="modal-overlay" id="modal-source"><div class="modal-card"><button class="modal-close" onclick="closeModal('modal-source')">&times;</button><div class="modal-title" id="source-title">史料卡片</div><div id="source-body"></div></div></div>
</div>
<script>
// ==================== 常量定义 ====================
const TALENTS=[
{id:"t_bookworm",name:"博闻强记",desc:"智力+10",effect:{intelligence:10},rarity:"common"},
{id:"t_charm",name:"天生丽质",desc:"魅力+10",effect:{charisma:10},rarity:"common"},
{id:"t_strong",name:"体魄强健",desc:"体质+10",effect:{constitution:10},rarity:"common"},
{id:"t_rich",name:"家境殷实",desc:"财富+10",effect:{wealth:10},rarity:"common"},
{id:"t_leader",name:"天生的领袖",desc:"声望+15",effect:{reputation:15},rarity:"rare"},
{id:"t_genius",name:"过目不忘",desc:"智力+20",effect:{intelligence:20},rarity:"rare"},
{id:"t_resilient",name:"百折不挠",desc:"所有属性不低于30",effect:{minAll:30},rarity:"rare"},
{id:"t_destined",name:"天命所归",desc:"声望+20, 幸福+10",effect:{reputation:20,happiness:10},rarity:"epic"},
{id:"t_sage",name:"圣人之资",desc:"智力+15, 声望+10",effect:{intelligence:15,reputation:10},rarity:"epic"},
{id:"t_survivor",name:"乱世求生",desc:"体质+15, 幸福+10",effect:{constitution:15,happiness:10},rarity:"rare"},
{id:"t_merchant",name:"商贾血脉",desc:"财富+20",effect:{wealth:20},rarity:"rare"},
{id:"t_humble",name:"大智若愚",desc:"智力+5, 声望+10, 幸福+5",effect:{intelligence:5,reputation:10,happiness:5},rarity:"common"}
];
const ACHIEVEMENTS=[
{id:"ach_source",name:"史海拾贝",desc:"查阅5张以上史料卡片",icon:"\uD83D\uDCDC"},
{id:"ach_no_modern",name:"穿越者之戒",desc:"0次用现代思维做选择",icon:"\uD83D\uDCAD"},
{id:"ach_patriot",name:"天下兴亡",desc:"家国情怀评分10以上",icon:"\uD83C\uDFE8"},
{id:"ach_materialism",name:"见微知著",desc:"唯物史观评分8以上",icon:"\uD83D\uDD0D"},
{id:"ach_long_life",name:"寿比南山",desc:"活到70岁以上",icon:"\uD83C\uDF3B"},
{id:"ach_high_int",name:"学富五车",desc:"智力达到90以上",icon:"\uD83D\uDCD6"},
{id:"ach_high_rep",name:"名满天下",desc:"声望达到90以上",icon:"\u2B50"},
{id:"ach_rich",name:"富甲一方",desc:"财富达到90以上",icon:"\uD83D\uDCB0"},
{id:"ach_first",name:"初入史海",desc:"完成第一次游戏",icon:"\uD83C\uDF0A"},
{id:"ach_s_rank",name:"青史留名",desc:"获得S级评价",icon:"\uD83C\uDFC6"}
];
const ATTR_NAMES={intelligence:"智力",charisma:"魅力",constitution:"体质",wealth:"财富",reputation:"声望",happiness:"幸福"};
const LITERACY_NAMES={materialism:"唯物史观",spatiotemporal:"时空观念",evidence:"史料实证",interpretation:"历史解释",patriotism:"家国情怀"};

// ==================== 游戏状态 ====================
let GS=null;
function newGameState(){
  return{
    currentScreen:'home',
    era:null,
    eraId:null,
    scenario:null,        // 当前选中的剧本对象
    scenarioId:null,      // 当前选中的剧本ID
    identity:null,
    identityId:null,
    birthYear:0,
    currentYear:0,
    age:0,
    isAlive:true,
    timeSkip:1,
    attributes:{intelligence:50,charisma:50,constitution:50,wealth:50,reputation:50,happiness:50},
    talents:[],
    talentActiveBonuses:[],  // 当前激活的天赋加成（来自scenario.talentBonuses）
    flags:{},
    counters:{},
    inventory:[],
    choices:[],
    yearlyLog:[],
    achievements:[],
    sourcesViewed:0,
    modernMindsetCount:0,
    totalChoices:0,
    endingRank:null,
    literacyScores:{materialism:0,spatiotemporal:0,evidence:0,interpretation:0,patriotism:0},
    triggeredNodes:[],
    usedEvents:[],
    eraTimeline:[],
    eraEventPool:[]
  };
}

// ==================== 时代数据构建 ====================
let ERAS=null;

// 辅助函数（保持不变）
const S=(id,y,minA,maxA,text,opts,sc)=>{const n={id,year:y,minAge:minA,maxAge:maxA,text,options:opts};if(sc)n.sourceCard=sc;return n};
const O=(text,fx,lb,res)=>{return{text,effects:fx,literacyBonus:lb||{},result:res}};
const F=(k,d)=>({type:"attribute",key:k,delta:d});
const FL=(k,v)=>({type:"flag",key:k,value:v});
const SC=(q,s,h)=>({quote:q,source:s,hint:h});

/**
 * buildEras() - 构建所有时代和剧本数据
 *
 * 数据结构说明：
 * 每个时代(era)包含多个剧本(scenario)
 * 每个剧本(scenario)是一个独立的可玩内容，包含：
 *   - id: 剧本唯一标识
 *   - name: 剧本名称
 *   - period: 剧本时间段
 *   - yearStart: 剧本起始年份（用于计算真实年龄时间线）
 *   - yearEnd: 剧本结束年份
 *   - description: 剧本描述
 *   - identities: 可选身份列表
 *   - storyNodes: 故事节点列表
 *   - yearlyEvents: 年度事件列表
 *   - endings: 结局列表
 *   - sourceCards: 史料卡片列表
 *   - knowledgePoints: 教材知识点列表
 *   - talentBonuses: 天赋加成配置（可选）
 *     格式: { talentId: { desc: "描述", options: [ { nodeId: "目标节点ID", optionText: "选项文字", effects: [...], result: "结果文字" } ] } }
 */

// ==================== 数据规范化 ====================
(function(){
  var ATTR_MAP={wisdom:'intelligence',literacy:'intelligence',politics:'charisma',martial:'constitution',military:'constitution',health:'constitution',commerce:'wealth',craft:'wealth',trade:'wealth',morality:'happiness',will:'happiness',loyalty:'reputation'};
  function normKey(k){return ATTR_MAP[k]||k;}
  function normEffects(effects){
    if(!effects)return;
    effects.forEach(function(e){
      if(e.type==='flat')e.type='attribute';
      if(e.type==='literal')e.type='flag';
      if(e.type==='attribute'&&e.key)e.key=normKey(e.key);
    });
  }
  function normIdentity(ident){
    var attrs=ident.baseAttributes||ident.bonuses||ident.bonusStats||ident.talentBonus;
    if(attrs){
      var norm={};
      for(var k in attrs)norm[normKey(k)]=attrs[k];
      ident.baseAttributes=norm;
    }

      S("cqh_04",-676,23,31,"秦穆公即位，秦国开始崛起。秦穆公求贤若渴，从各国招揽人才。百里奚以五张羊皮的价格被赎回秦国，被穆公拜为大夫，号\"五羖大夫\"。",

         O("研究百里奚的治国理念",[F("intelligence",10),F("reputation",5)],3,"你深入研究了百里奚的治国理念，受益匪浅。"),

        SC("五羖大夫百里奚，相秦六七年而东伐郑。","《史记·秦本纪》","百里奚入秦")),
      S("cqh_05",-672,27,35,"秦穆公派兵偷袭郑国，秦军行至滑国时，郑国商人弦高正赶着牛群前往周都做买卖。弦高得知秦军偷袭的消息后，急中生智，假称自己是郑国使臣，以四张牛皮和十二头牛犒劳秦军，暗示郑国已有防备。秦将孟明视以为郑国已有准备，遂放弃偷袭计划。",
        [O("你就是弦高，冒充使臣犒劳秦军",[F("intelligence",12),F("reputation",10),FL("cqh_xiangao",true)],3,"你的机智救了郑国，成为千古佳话。"),

         O("你是郑国官员，收到弦高的消息后加强防御",[F("intelligence",8),F("constitution",5)],2,"你立即加强防御，使郑国转危为安。")],
        SC("弦高犒师——以四张牛皮、十二头牛智退秦军。","《左传·僖公三十三年》","弦高犒师")),
      S("cqh_06",-670,29,37,"秦军在撤退途中经过殽山，遭到晋军伏击，全军覆没。孟明视等三位秦将被俘。秦穆公非但没有处罚孟明视，反而继续重用他。",

         O("作为秦军将领被俘，在晋国度过囚徒生涯",[F("intelligence",5),F("constitution",-5)],1,"你被晋军俘虏，在晋国度过了艰难的岁月。"),
         O("记录殽之战的经过和教训",[F("intelligence",10),F("reputation",5)],3,"你详细记录了殽之战的经过。")],
        SC("秦伯素服郊次，乡师而哭曰：'孤违蹇叔，以辱二三子，孤之罪也。'","《左传·僖公三十三年》","秦穆公引咎自责")),
      S("cqh_07",-665,32,40,"烛之武退秦师！晋秦联军围攻郑国，郑国危在旦夕。老臣烛之武夜缒出城，只身前往秦军大营，以三寸不烂之舌说服秦穆公撤军。秦军撤退后，晋军也只好退兵。",

         O("协助烛之武准备说辞，收集情报",[F("intelligence",8),F("charisma",5)],2,"你帮助烛之武准备了充分的说辞和情报。"),
         O("在城墙上组织防御，为谈判争取时间",[F("constitution",8),F("charisma",5)],1,"你组织城防，为烛之武的谈判争取了宝贵的时间。")],
        SC("臣之壮也，犹不如人；今老矣，无能为也已。","《左传·僖公三十年》","烛之武自谦之词")),
      S("cqh_08",-660,35,43,"楚庄王即位初期不理朝政，日夜作乐，三年不鸣。大臣伍举以\"三年不飞，一飞冲天；三年不鸣，一鸣惊人\"的隐语进谏。楚庄王从此振作，罢淫乐，理朝政，任贤能。",
        [O("你就是进谏的大臣，用隐语劝谏楚庄王",[F("intelligence",10),F("charisma",10),F("reputation",8),FL("cqh_advise_chu",true)],3,"你的隐语打动了楚庄王，从此他振作起来。"),
         O("在楚庄王振作后投奔楚国效力",[F("intelligence",8),F("charisma",5)],2,"楚庄王振作后广招贤才，你前往投奔。"),

      S("cqh_09",-655,38,46,"楚庄王率军北上，陈兵于周王室边境，派人询问九鼎的轻重。九鼎是王权的象征，楚庄王问鼎，意在取周天子而代之。周大夫王孙满以\"在德不在鼎\"巧妙回应。",

         O("你是楚庄王的随从，记录问鼎的经过",[F("intelligence",8),F("reputation",5)],2,"你记录了这次问鼎的经过。"),
         O("建议楚庄王以德服人，不必急于取代周天子",[F("intelligence",8),F("charisma",5)],2,"你建议楚庄王先修德政，再图霸业。")],
        SC("在德不在鼎……周德虽衰，天命未改。鼎之轻重，未可问也。","《左传·宣公三年》","楚庄王问鼎")),
      S("cqh_10",-650,40,48,"晋楚争霸进入白热化阶段。两国在邲地展开大战。楚军采用诱敌深入的战术，大败晋军。楚庄王由此成为春秋第三位霸主。",
        [O("随楚军出征，在邲之战中立功",[F("constitution",10),F("reputation",8),FL("cqh_bi_hero",true)],1,"你在邲之战中表现出色，立下战功。"),
         O("作为晋军将领，分析战败原因",[F("intelligence",10),F("reputation",5)],2,"你详细分析了晋军战败的原因。"),
         O("在战场上救助伤员，不论敌我",[F("charisma",10),F("reputation",8)],2,"你在战场上救助了许多伤员，不分敌我。")],null),
      S("cqh_11",-645,42,50,"邲之战后，楚庄王饮马黄河，雄视北方。然而他并没有继续追击晋国，而是选择班师回国。楚庄王说：\"武有七德\"——禁暴、戢兵、保大、定功、安民、和众、丰财。",

        SC("夫文，止戈为武……夫武，禁暴、戢兵、保大、定功、安民、和众、丰财者也。","《左传·宣公十二年》","武有七德")),
      S("cqh_12",-640,45,53,"秦穆公独霸西戎，拓地千里。秦穆公任用百里奚、蹇叔等人，使秦国成为西方强国。然而秦国的东出之路被晋国牢牢封锁。",

    sourceCards: [
      SC("寡人虽亡国之余，不鼓不成列。","《左传·僖公二十二年》","宋襄公在泓水之战中坚持古礼，不肯趁楚军渡河时发动攻击。"),

    knowledgePoints: [
      {id:"kp_cqh_1",title:"春秋争霸的背景",content:"春秋时期，周天子权威衰落，一些较大的诸侯国为了争夺土地、人口和对其他诸侯国的支配权，不断进行兼并战争。强大的诸侯国打着\"尊王攘夷\"的旗号，积极争夺霸主地位。参见七年级上册第6课《动荡的春秋时期》。",competency:"唯物史观"},
      {id:"kp_cqh_2",title:"楚庄王问鼎",content:"公元前606年，楚庄王北上，陈兵周郊，向周使询问九鼎的轻重。九鼎是王权的象征，问鼎意在取周而代之。周大夫王孙满以\"在德不在鼎\"回应，楚庄王知难而退。这一事件反映了楚国实力的强大和周王室的衰微。",competency:"历史解释"},
      {id:"kp_cqh_3",title:"春秋时期的社会变化",content:"春秋时期，铁制农具和牛耕的出现促进了农业上的深耕细作，大大提高了生产力。私学的兴起打破了贵族对教育的垄断。各国的变法改革推动了社会制度的变革。这些变化为战国时期的社会大变革奠定了基础。参见七年级上册第7课《战国时期的社会变化》。",competency:"史料实证"}
    ],

      S("cqz_01",-597,14,22,"楚庄王称霸，邲之战大败晋军。然而霸业难久，各国之间的力量对比正在发生变化。吴国在南方崛起，越国也在积蓄力量。孔子即将出生，百家争鸣的序幕即将拉开。你正值少年，面对这个大变革的时代，将如何抉择？",

      SC("学而不思则罔，思而不学则殆。","《论语·为政》","孔子的教育思想——学习与思考必须相结合。"),
      SC("苦心人，天不负，卧薪尝胆，三千越甲可吞吴。","蒲松龄对联","勾践卧薪尝胆二十年的精神写照。"),
      SC("飞鸟尽，良弓藏；狡兔死，走狗烹。","《史记·越王勾践世家》","范蠡对文种的警告——功成之后要急流勇退。")
    ],
    knowledgePoints: [
      {id:"kp_cqz_1",title:"孔子与儒家思想",content:"孔子名丘，字仲尼，春秋末期鲁国人。他是伟大的思想家、教育家。孔子核心思想是\"仁\"，主张\"仁者爱人\"；政治上主张\"为政以德\"；教育上主张\"有教无类\"。孔子的弟子整理的《论语》记录了孔子的言行。参见七年级上册第8课《百家争鸣》。",competency:"历史解释"},
      {id:"kp_cqz_2",title:"老子与道家思想",content:"老子是春秋末期的伟大思想家，道家学派的创始人。他认为万物运行有其自然的法则，人们应顺应自然；政治上主张\"无为而治\"；他的学说记录在《道德经》中。参见七年级上册第8课《百家争鸣》。",competency:"唯物史观"},
      {id:"kp_cqz_3",title:"三家分晋",content:"春秋末期，晋国的实际权力被赵、魏、韩、智四家卿大夫控制。公元前453年，赵、魏、韩三家联合灭掉智氏，逐渐瓜分了晋国的土地。公元前403年，周天子正式承认赵、魏、韩三家为诸侯。三家分晋标志着春秋时代的结束和战国时代的开始。参见七年级上册第6课。",competency:"时空观念"}
    ],
    talentBonuses: {
      t_genius:{name:"天纵奇才",desc:"天赋异禀，过目不忘，在学习和谋略方面有极大优势。"},
      t_martial:{name:"武勇过人",desc:"力大无穷，精通射御，在战场上所向披靡。"},
      t_oratory:{name:"纵横之术",desc:"口才出众，善于游说诸侯，在外交场合如鱼得水。"},
      t_commerce:{name:"陶朱之术",desc:"精通经商之道，善于理财，在商业活动中获利丰厚。"},
      t_loyalty:{name:"忠义之士",desc:"忠诚正直，信守承诺，深受君主和百姓的信任。"}
    }
  },

  // ==================== 场景4: 战国变法 ====================
  {
    id: "pq_zhanguo_reform",
    name: "战国变法",
    period: "战国",
    yearStart: -400,
    yearEnd: -300,
    description: "战国时期，各国为了富国强兵，纷纷变法图强。魏国李悝变法首开先河，楚国吴起变法、齐国邹忌变法紧随其后。商鞅在秦国变法最为彻底——废井田、开阡陌、奖军功、建县制，使秦国迅速崛起为超级大国。苏秦合纵、张仪连横，纵横家在列国之间纵横捭阖。你将亲历这个变法图强、纵横捭阖的时代。",
    identities: [
      { id: "zgr_qin", name: "秦国变法派", description: "秦国新兴政治力量，支持商鞅变法，渴望帮助秦国富国强兵。", baseAttributes: { intelligence: 12, charisma: 8, constitution: 10, wealth: 5, reputation: 8, happiness: 8 } },
      { id: "zgr_zongheng", name: "纵横家", description: "游走于列国之间的纵横家，以三寸不烂之舌影响天下大势。", baseAttributes: { intelligence: 14, charisma: 14, constitution: 5, wealth: 5, reputation: 8, happiness: 5 } },
      { id: "zgr_qi", name: "齐国学者", description: "齐国稷下学宫的学者，在百家争鸣中探索治世之道。", baseAttributes: { intelligence: 15, charisma: 8, constitution: 5, wealth: 8, reputation: 10, happiness: 8 } },
      { id: "zgr_chu", name: "楚国贵族", description: "楚国旧贵族，对吴起变法心存疑虑，在改革与守旧之间挣扎。", baseAttributes: { intelligence: 8, charisma: 8, constitution: 10, wealth: 15, reputation: 10, happiness: 5 } }
    ],
    storyNodes: [
      S("zgr_01",-400,14,22,"战国初期，三家分晋已成定局，七雄并立的格局基本形成。魏国率先变法，李悝推行\"尽地力之教\"和\"法经\"，魏国国力大增。你正值少年，面对这个变法图强的时代，将如何抉择？",
        [O("前往魏国，学习李悝变法的经验",[F("intelligence",10),F("reputation",5)],3,"你前往魏国，学习李悝变法的经验。"),
         O("投奔秦国，准备参与变法大业",[F("intelligence",8),F("constitution",5)],2,"你前往秦国，准备参与变法。"),
         O("进入稷下学宫，研习百家之学",[F("intelligence",12),F("reputation",5)],3,"你进入齐国稷下学宫，研习各家学说。"),
         O("学习纵横之术，准备游说列国",[F("charisma",10),F("intelligence",5)],2,"你学习纵横之术，准备以口才影响天下。")],null),
      S("zgr_02",-390,24,32,"魏文侯任用李悝为相，推行变法。李悝的变法措施包括：废除世卿世禄制，按能力选拔官员；推行\"尽地力之教\"，鼓励农民精耕细作；颁布《法经》，以法治国。魏国迅速成为战国初期最强的国家。",
        [O("参与李悝变法的实施",[F("intelligence",10),F("reputation",5),FL("zgr_likui_reform",true)],3,"你参与了李悝变法的实施，积累了丰富的变法经验。"),
         O("研究《法经》的内容和意义",[F("intelligence",10),F("reputation",5)],3,"你深入研究了《法经》，对法治有了深刻理解。"),
         O("在魏国学习先进的治国经验",[F("intelligence",8),F("wealth",5)],2,"你在魏国学习了先进的治国经验。")],
        SC("治国不一道，便国不法古。","《商君书·更法》","变法的理论基础")),
      S("zgr_03",-385,29,37,"吴起在魏国创建\"武卒\"制度，选拔身体强壮、技能过硬的士兵组成精锐部队。魏武卒在吴起的训练下成为战国最强大的步兵。然而吴起遭到魏国贵族的排挤，被迫离开魏国，前往楚国。",
        [O("随吴起学习军事，成为武卒教官",[F("constitution",10),F("intelligence",5)],1,"你随吴起学习军事，成为出色的教官。"),
         O("跟随吴起前往楚国，参与楚国的变法",[F("intelligence",8),F("charisma",5),FL("zgr_follow_wuqi",true)],2,"你跟随吴起前往楚国。"),
         O("留在魏国，研究武卒制度的得失",[F("intelligence",10),F("reputation",5)],3,"你留在魏国，研究武卒制度。")],null),
      S("zgr_04",-382,32,40,"吴起在楚国推行变法：废除世卿世禄制，裁减冗官，强令贵族到边疆垦荒；统一法令，整顿吏治。楚国的国力迅速增强。然而吴起的变法触动了旧贵族的利益，遭到了强烈的反对。",
        [O("全力支持吴起变法，协助推行新法",[F("intelligence",10),F("charisma",5),FL("zgr_wuqi_reform",true)],3,"你全力支持吴起变法。"),
         O("劝吴起变法要循序渐进，不要操之过急",[F("intelligence",8),F("charisma",5)],2,"你劝吴起放慢变法步伐，但他认为时不我待。"),
         O("暗中保护吴起的安全",[F("intelligence",5),F("constitution",5)],1,"你暗中保护吴起，但危险无处不在。")],null),
      S("zgr_05",-381,33,41,"楚悼王去世，楚国旧贵族趁机发动叛乱，围攻吴起。吴起伏在楚悼王的尸体上被乱箭射死，但射中吴起的箭也射中了楚悼王的尸体。按照楚国法律，伤害王尸者灭族。吴起以自己的死为代价，为楚国清除了一批旧贵族。",
        [O("冒死保护吴起，试图救他脱险",[F("constitution",-8),F("charisma",10),F("reputation",8)],1,"你冒死试图救吴起，但最终未能成功。"),
         O("记录吴起之死和楚国的政治变局",[F("intelligence",10),F("reputation",5)],3,"你记录了吴起之死的经过。"),
         O("利用楚国的混乱，帮助楚国百姓避难",[F("charisma",8),F("intelligence",5)],2,"你帮助楚国百姓在混乱中避难。")],
        SC("吴起于是伏王尸而死者，射起而中王尸者，族诛。","《史记·孙子吴起列传》","吴起之死")),
      S("zgr_06",-375,38,46,"商鞅（卫国人公孙鞅）在魏国不受重用，听闻秦孝公求贤，遂西入秦国。商鞅以\"强国之术\"说动秦孝公，被任命为左庶长，开始推行变法。这是中国历史上最彻底、影响最深远的变法之一。",
        [O("随商鞅入秦，参与变法大业",[F("intelligence",10),F("charisma",5),FL("zgr_follow_shangyang",true)],3,"你随商鞅入秦，参与变法。"),
         O("研究商鞅变法的理论基础和实施方案",[F("intelligence",12),F("reputation",5)],3,"你深入研究了商鞅变法的理论。"),
         O("在秦国考察，了解秦国的国情",[F("intelligence",8),F("constitution",5)],2,"你考察了秦国的国情，为变法做准备。")],
        SC("治世不一道，便国不法古。法之不行，自上犯之。","《商君书》","商鞅变法的核心理念")),
      S("zgr_07",-370,42,50,"商鞅第一次变法：颁布法令，奖励耕织；实行军功爵制，按军功大小授予爵位，废除世卿世禄制；编制户籍，实行什伍连坐。变法之初，秦国百姓多有怨言，但看到新法确实有效后，纷纷拥护。",
        [O("参与变法的实施和监督",[F("intelligence",10),F("reputation",5)],2,"你参与了变法的实施工作。"),
         O("在民间宣传变法的好处，争取百姓支持",[F("charisma",10),F("reputation",5)],2,"你深入民间宣传变法的好处。"),
         O("记录变法过程中遇到的问题和解决方案",[F("intelligence",10),F("reputation",5)],3,"你记录了变法过程中的经验和教训。")],null),
      S("zgr_08",-368,44,52,"商鞅\"徙木立信\"！商鞅在国都南门立了一根三丈高的木头，悬赏五十金，谁能搬到北门就赏金五十。有人搬了木头，商鞅立刻兑现赏金。以此向百姓证明政府言出必行，取信于民。",
        [O("你就是那个搬木头的人",[F("wealth",10),F("reputation",10),FL("zgr_move_wood",true)],2,"你就是那个搬木头的人，获得了五十金的赏赐，也见证了商鞅取信于民的决心。"),
         O("协助商鞅策划\"徙木立信\"的行动",[F("intelligence",8),F("reputation",5)],2,"你协助策划了这一行动。"),
         O("在民间宣传\"徙木立信\"的意义",[F("charisma",8),F("intelligence",5)],2,"你向百姓解释了\"徙木立信\"的意义。")],
        SC("以徙木立信，示民以信。","《史记·商君列传》","商鞅徙木立信")),
      S("zgr_09",-365,46,54,"商鞅第二次变法：废井田，开阡陌，承认土地私有；推行县制，由国君直接委派官员管理；统一度量衡；制定秦律。秦国国力蒸蒸日上，一跃成为战国最强的国家。",
        [O("参与废井田、开阡陌的实施",[F("intelligence",10),F("wealth",5)],2,"你参与了土地制度的改革。"),
         O("参与县制的推行，担任地方官员",[F("intelligence",8),F("charisma",5)],2,"你被任命为地方官员，推行县制。"),
         O("研究统一度量衡对经济发展的意义",[F("intelligence",10),F("reputation",5)],3,"你研究了统一度量衡的意义。")],null),
      S("zgr_10",-360,48,56,"苏秦出身贫寒，师从鬼谷子学习纵横之术。他最初游说秦国失败，回家后遭受家人冷落。苏秦发愤读书，\"刺股悬梁\"，终于学成。此后他游说六国合纵抗秦，身佩六国相印，权倾天下。",
        [O("你就是苏秦，以合纵之术联合六国抗秦",[F("charisma",15),F("reputation",12),F("intelligence",8),FL("zgr_suqin_hezong",true)],3,"你以合纵之术联合六国，身佩六国相印。"),
         O("跟随苏秦学习纵横之术",[F("charisma",10),F("intelligence",8)],2,"你跟随苏秦学习纵横之术。"),
         O("研究合纵战略对天下格局的影响",[F("intelligence",10),F("reputation",5)],3,"你深入研究了合纵战略。")],
        SC("使我有洛阳二顷田，安能佩六国相印！","《史记·苏秦列传》","苏秦发愤图强")),
      S("zgr_11",-355,50,58,"张仪与苏秦同为鬼谷子的学生，但主张\"连横\"——劝说各国与秦国联合，打破合纵联盟。张仪以出色的口才和谋略，成功瓦解了苏秦的合纵联盟。",
        [O("你就是张仪，以连横之术瓦解合纵联盟",[F("charisma",15),F("intelligence",10),FL("zgr_zhangyi_lianheng",true)],3,"你以连横之术瓦解了合纵联盟。"),
         O("在苏秦和张仪之间保持中立",[F("intelligence",8),F("charisma",5)],2,"你选择在两大纵横家之间保持中立。"),
         O("研究纵横之术的精髓和局限",[F("intelligence",10),F("reputation",5)],3,"你深入研究了纵横之术的精髓。")],null),
      S("zgr_12",-350,52,60,"秦孝公去世，秦惠文王即位。旧贵族诬告商鞅谋反，商鞅被迫出逃。传说商鞅逃到边境想住旅店，但旅店主人不知道他是商鞅，说\"商君之法，留宿无凭证的人要受罚\"。商鞅叹道：\"为法之弊，一至此哉！\"最终商鞅被车裂处死，但新法并未被废除。",
        [O("冒死帮助商鞅逃亡",[F("constitution",-5),F("charisma",10),F("reputation",8)],1,"你冒死帮助商鞅逃亡，但最终未能救他。"),
         O("记录商鞅之死，分析变法者的命运",[F("intelligence",10),F("reputation",8)],3,"你记录了商鞅之死，深刻分析了变法者的悲剧命运。"),
         O("在秦国保护商鞅的变法成果不被废除",[F("intelligence",8),F("charisma",5)],2,"你努力保护商鞅的变法成果。")],
        SC("商君亡至关下，欲舍客舍，客人不知其是商君也，曰：'商君之法，舍人无验者坐之。'","《史记·商君列传》","作法自毙")),
      S("zgr_13",-345,55,63,"齐国稷下学宫达到鼎盛。孟子、荀子等大儒在此讲学，百家争鸣进入高潮。稷下学宫是战国时期最重要的学术中心，各国学者云集于此，自由辩论，互相切磋。",
        [O("在稷下学宫讲学，参与百家争鸣",[F("intelligence",12),F("reputation",10),FL("zgr_jixia_scholar",true)],3,"你在稷下学宫讲学，参与百家争鸣。"),
         O("拜孟子为师，学习仁政思想",[F("intelligence",10),F("charisma",8)],3,"你拜孟子为师，深入学习了仁政思想。"),
         O("研究各学派的思想，形成自己的见解",[F("intelligence",12),F("reputation",5)],3,"你广泛学习各学派的思想，形成了独到的见解。")],
        SC("民为贵，社稷次之，君为轻。","《孟子·尽心下》","孟子的民本思想")),
      S("zgr_14",-340,57,65,"孟子周游列国，推行\"仁政\"思想。他先后游说齐、魏、宋、滕等国，但各国君主都认为\"仁政\"太理想化，无法在兼并战争中取胜。孟子最终回到邹国，专心著述和教学。",
        [O("追随孟子周游列国",[F("intelligence",10),F("charisma",8),FL("zgr_follow_mencius",true)],3,"你追随孟子周游列国，亲耳聆听他的教诲。"),
         O("在各国推行\"仁政\"的实践",[F("charisma",8),F("intelligence",5)],2,"你尝试在各国的实践中推行\"仁政\"。"),
         O("研究\"仁政\"为何在战国时期难以推行",[F("intelligence",10),F("reputation",5)],3,"你深入分析了\"仁政\"难以推行的原因。")],null),
      S("zgr_15",-335,59,67,"回顾这段历史，从李悝变法到商鞅变法，从苏秦合纵到张仪连横，从吴起之死到百家争鸣，你亲历了战国变法最精彩的篇章。",
        [O("著书立说，记录战国变法的历史",[F("intelligence",12),F("reputation",10)],3,"你撰写了一部关于战国变法的史书。"),
         O("培养后学，传授治国之道",[F("charisma",8),F("intelligence",5)],2,"你培养了大批优秀学生。"),
         O("归隐田园，安度晚年",[F("happiness",8),F("constitution",5)],1,"你选择归隐，安享晚年。")],null),
      S("zgr_16",-395,19,27,"魏国西门豹治邺，破除\"河伯娶妇\"的迷信，开凿水渠灌溉农田。",
        [O("协助西门豹破除迷信",[F("intelligence",8),F("charisma",8)],2,"你协助西门豹破除了\"河伯娶妇\"的迷信。"),
         O("参与水渠的修建工作",[F("intelligence",8),F("constitution",5)],1,"你参与了水渠的修建。"),
         O("记录西门豹治邺的故事",[F("intelligence",8),F("reputation",5)],3,"你记录了西门豹治邺的故事。")],null),
      S("zgr_17",-388,26,34,"楚国地域辽阔，但政治腐败，贵族专权。你有机会了解楚国的国情。",
        [O("研究楚国的政治制度和社会问题",[F("intelligence",10),F("reputation",5)],3,"你深入研究了楚国的政治和社会问题。"),
         O("结交楚国贵族，了解他们的想法",[F("charisma",8),F("intelligence",5)],2,"你结交了楚国贵族，了解了他们的想法。"),

    knowledgePoints: [
      {id:"kp_zgr_1",title:"商鞅变法",content:"公元前356年，秦孝公任用商鞅主持变法。商鞅变法的主要措施：确立县制，由国君直接派官治理；废除贵族的世袭特权；改革户籍制度，严明法度，禁止私斗；统一度量衡；废除井田制，允许土地自由买卖；奖励耕战，生产粮食布帛多的人可免除徭役。商鞅变法使秦国的经济得到发展，军队战斗力不断增强，成为战国后期最强大的国家。参见七年级上册第7课《战国时期的社会变化》。",competency:"历史解释"},
      {id:"kp_zgr_2",title:"百家争鸣",content:"战国时期，社会急剧变化，许多思想家发表各自的主张，形成\"百家争鸣\"的局面。主要学派：儒家（孟子\"仁政\"）、墨家（墨子\"兼爱\"\"非攻\"）、道家（庄子\"顺应自然\"）、法家（韩非子\"以法治国\"）、兵家（孙膑）。百家争鸣促进了思想和文化的繁荣，是中国古代第一次思想文化发展的高峰。参见七年级上册第8课《百家争鸣》。",competency:"唯物史观"},
      {id:"kp_zgr_3",title:"合纵连横",content:"战国时期，秦国日益强大，对东方六国构成了严重威胁。苏秦倡导\"合纵\"——联合六国共同抗秦；张仪主张\"连横\"——劝说各国与秦国联合，打破合纵联盟。合纵连横是战国时期重要的外交策略，反映了各国之间复杂的政治博弈。",competency:"史料实证"}
    ],

    storyNodes: [
      S("zgu_01",-260,14,22,"长平之战爆发！秦赵两国在长平展开决战。秦将白起以诱敌之计，将赵军分割包围。赵括纸上谈兵，指挥失误，四十万赵军被秦军坑杀。赵国从此一蹶不振，秦国统一六国的步伐不可阻挡。你正值少年，面对这个血与火的时代，将如何抉择？",
        [O("投奔秦国，参与统一战争",[F("constitution",8),F("intelligence",5)],1,"你投奔秦国，准备参与统一战争。"),
         O("留在赵国，帮助赵国恢复国力",[F("intelligence",8),F("charisma",5)],2,"你留在赵国，试图帮助赵国从长平之战的惨败中恢复。"),
         O("周游列国，观察天下大势",[F("intelligence",10),F("charisma",5)],3,"你周游列国，观察天下大势。"),
         O("学习武艺，成为一名游侠",[F("constitution",10),F("charisma",5)],1,"你学习武艺，立志成为一名行侠仗义的游侠。")],null),
      S("zgu_02",-257,17,25,"长平之战后，秦军乘胜围攻赵国都城邯郸。赵国军民在平原君的带领下拼死抵抗。平原君散尽家财，招募敢死队。楚国和魏国派兵救援，秦军被迫撤退。这就是著名的\"邯郸之战\"。",
        [O("参与邯郸保卫战，在城墙上奋勇杀敌",[F("constitution",10),F("reputation",8),FL("zgu_handan_hero",true)],1,"你参与了邯郸保卫战，在城墙上奋勇杀敌。"),
         O("协助平原君组织城防和后勤",[F("intelligence",8),F("charisma",5)],2,"你协助平原君组织城防，为保卫战做出了贡献。"),
         O("出使楚国和魏国，请求援军",[F("charisma",10),F("intelligence",5)],2,"你出使楚国和魏国，成功争取到了援军。")],
        SC("毛遂自荐——平原君门客毛遂主动请缨，随平原君出使楚国，促成楚赵联盟。","《史记·平原君列传》","毛遂自荐")),
      S("zgu_03",-251,23,31,"秦国的吕不韦以商人身份入秦，成为秦庄襄王的相国。吕不韦招揽门客三千，编撰《吕氏春秋》，\"兼儒墨，合名法\"，试图为即将统一的帝国提供一套完整的治国理论。",
        [O("成为吕不韦的门客，参与编撰《吕氏春秋》",[F("intelligence",12),F("reputation",8),FL("zgu_lvyangwei_guest",true)],3,"你成为吕不韦的门客，参与了《吕氏春秋》的编撰。"),
         O("研究吕不韦的政治理念",[F("intelligence",10),F("reputation",5)],3,"你深入研究了吕不韦的政治理念。"),
         O("在秦国朝廷中任职，积累政治经验",[F("intelligence",8),F("charisma",5)],2,"你在秦国朝廷中任职，积累了丰富的政治经验。")],null),
      S("zgu_04",-247,27,35,"秦王嬴政即位，年仅十三岁。吕不韦以相邦身份辅政，被称为\"仲父\"。嬴政少年老成，胸怀大志，暗中积蓄力量，准备亲政。",
        [O("成为嬴政的侍读，陪伴少年秦王成长",[F("intelligence",8),F("charisma",8),FL("zgu_qin_shi_servant",true)],2,"你成为嬴政的侍读，亲眼见证了少年秦王的成长。"),
         O("在吕不韦门下继续效力",[F("intelligence",8),F("wealth",5)],1,"你继续在吕不韦门下效力。"),
         O("研究秦国统一六国的战略",[F("intelligence",10),F("reputation",5)],3,"你深入研究了秦国统一六国的战略。")],null),
      S("zgu_05",-241,33,41,"嫪毐之乱！嫪毐趁嬴政出巡之机发动叛乱，企图杀死嬴政。嬴政沉着应对，迅速平定叛乱，嫪毐被车裂处死。此事牵连到吕不韦，嬴政借此机会罢免了吕不韦的相邦之职。",
        [O("协助嬴政平定嫪毐之乱",[F("constitution",8),F("reputation",8),FL("zgu_suppress_laowu",true)],1,"你协助嬴政平定了嫪毐之乱。"),
         O("记录嫪毐之乱的经过和教训",[F("intelligence",10),F("reputation",5)],3,"你记录了嫪毐之乱的经过。"),
         O("劝嬴政善待吕不韦，念其旧功",[F("charisma",8),F("intelligence",5)],2,"你劝嬴政念及吕不韦的旧功，从轻处理。")],null),
      S("zgu_06",-238,36,44,"嬴政亲政后，开始大规模的统一战争。他采纳李斯的建议，确定了\"远交近攻\"的战略——先灭韩、赵，再灭魏、楚，最后灭燕、齐。秦军势如破竹，六国纷纷告急。",
        [O("参与制定\"远交近攻\"的战略",[F("intelligence",10),F("reputation",8),FL("zgu_strategy_maker",true)],3,"你参与了\"远交近攻\"战略的制定。"),
         O("随秦军出征，参与灭韩之战",[F("constitution",10),F("reputation",5)],1,"你随秦军出征，参与了灭韩之战。"),
         O("在秦国负责后勤保障",[F("intelligence",8),F("wealth",5)],2,"你在秦国负责后勤保障工作。")],
        SC("远交近攻，各个击破。","李斯对秦王嬴政的建议","统一六国的战略")),
      S("zgu_07",-235,39,47,"韩国灭亡！秦军内史腾率军攻韩，韩王安投降。韩国是六国中第一个被灭亡的国家。三晋之中，韩国最为弱小，它的灭亡只是时间问题。",
        [O("随秦军攻韩，亲历灭韩之战",[F("constitution",8),F("reputation",5)],1,"你随秦军攻韩，亲历了灭韩之战。"),
         O("研究韩国灭亡的原因和教训",[F("intelligence",10),F("reputation",5)],3,"你深入分析了韩国灭亡的原因。"),
         O("帮助韩国难民安置和善后",[F("charisma",8),F("intelligence",5)],2,"你帮助韩国难民安置和善后。")],null),
      S("zgu_08",-230,42,50,"赵国名将李牧是赵国最后的屏障。李牧曾北击匈奴，南拒强秦，是战国末期最杰出的将领之一。然而秦国的反间计奏效，赵王迁中了秦国的离间之计，冤杀了李牧。赵国失去了最后的屏障。",
        [O("试图阻止赵王冤杀李牧",[F("charisma",10),F("intelligence",5),FL("zgu_save_limu",true)],2,"你试图阻止赵王冤杀李牧，但未能成功。"),
         O("记录李牧的军事才能和冤死经过",[F("intelligence",10),F("reputation",8)],3,"你记录了李牧的军事才能和冤死的经过。"),
         O("在赵国灭亡前帮助百姓南迁避难",[F("charisma",8),F("intelligence",5)],2,"你帮助赵国百姓南迁避难。")],
        SC("李牧者，赵之北边良将也。","《史记·廉颇蔺相如列传》","李牧——战国末期最杰出的将领之一")),
      S("zgu_09",-228,44,52,"赵国灭亡！王翦率秦军攻破赵国都城邯郸，赵王迁投降。赵国公子嘉逃到代地，自立为代王，但已无力回天。赵国的灭亡标志着秦统一六国的进程已经不可逆转。",
        [O("随秦军攻破邯郸，亲历灭赵之战",[F("constitution",10),F("reputation",8),FL("zgu_destroy_zhao",true)],1,"你随秦军攻破邯郸，亲历了灭赵之战。"),
         O("保护赵国的文化遗产和典籍",[F("intelligence",8),F("reputation",8)],2,"你尽力保护了赵国的文化遗产和典籍。"),
         O("记录赵国灭亡的历史过程",[F("intelligence",10),F("reputation",5)],3,"你详细记录了赵国灭亡的历史过程。")],null),
      S("zgu_10",-225,47,55,"荆轲刺秦王！燕国太子丹畏惧秦国的进攻，派荆轲以献地图为名，行刺秦王。荆轲携樊於期之首级和督亢地图入秦，在展开地图时图穷匕见，但行刺失败，被秦王砍断左腿，最终被杀。",
        [O("你就是荆轲，慷慨赴秦行刺",[F("charisma",15),F("constitution",-10),F("reputation",15),FL("zgu_jingke_assassin",true)],3,"你如荆轲一般慷慨赴秦，虽然行刺失败，但你的壮烈精神永垂不朽。"),
         O("你是秦王身边的侍卫，参与制服荆轲",[F("constitution",10),F("reputation",5)],1,"你在混乱中帮助制服了荆轲。"),
         O("记录荆轲刺秦王的壮烈经过",[F("intelligence",10),F("reputation",8)],3,"你记录了荆轲刺秦王的壮烈经过。")],
        SC("风萧萧兮易水寒，壮士一去兮不复还。","《战国策·燕策三》","荆轲刺秦王前的悲壮告别")),
      S("zgu_11",-223,49,57,"魏国灭亡！秦将王贲率军引黄河、鸿沟之水灌大梁，大梁城破，魏王假投降。魏国是三晋之中第二个被灭亡的国家。",
        [O("参与灭魏之战",[F("constitution",8),F("reputation",5)],1,"你参与了灭魏之战。"),
         O("研究水攻大梁的战术",[F("intelligence",10),F("reputation",5)],3,"你研究了水攻大梁的战术。"),
         O("帮助魏国百姓安置和善后",[F("charisma",8),F("intelligence",5)],2,"你帮助魏国百姓安置和善后。")],null),
      S("zgu_12",-223,49,57,"楚国灭亡！秦将王翦率六十万大军伐楚。楚将项燕率军抵抗，但最终兵败被杀。楚国是六国中面积最大的国家，它的灭亡意味着秦统一六国已近尾声。",
        [O("随王翦伐楚，参与灭楚之战",[F("constitution",10),F("reputation",8),FL("zgu_destroy_chu",true)],1,"你随王翦伐楚，参与了灭楚之战。"),
         O("研究王翦以逸待劳的战术",[F("intelligence",10),F("reputation",5)],3,"你深入研究了王翦以逸待劳的战术。"),
         O("保护楚国的文化遗产",[F("intelligence",8),F("reputation",8)],2,"你尽力保护了楚国的文化遗产。")],null),
      S("zgu_13",-222,50,58,"燕国灭亡！秦军攻入燕国都城蓟，燕王喜逃往辽东。秦将李信追击，燕王喜杀太子丹求和，但最终仍被灭国。",
        [O("参与灭燕之战",[F("constitution",8),F("reputation",5)],1,"你参与了灭燕之战。"),
         O("记录燕国灭亡的历史过程",[F("intelligence",10),F("reputation",5)],3,"你记录了燕国灭亡的历史过程。"),
         O("帮助燕国百姓安置和善后",[F("charisma",8),F("intelligence",5)],2,"你帮助燕国百姓安置和善后。")],null),
      S("zgu_14",-221,51,59,"齐国灭亡！秦军兵临齐国都城临淄，齐王建不战而降。至此，六国全部灭亡，天下归秦。秦王嬴政建立了中国历史上第一个统一的中央集权国家——秦朝，自称\"始皇帝\"。",
        [O("亲历秦灭齐之战，见证天下统一",[F("reputation",15),F("intelligence",5),FL("zgu_witness_unify",true)],3,"你亲历了秦灭齐之战，见证了天下统一的历史性时刻。"),
         O("参与秦朝初期的制度建设",[F("intelligence",10),F("reputation",8),FL("zgu_qin_system",true)],3,"你参与了秦朝初期的制度建设。"),
         O("记录秦统一六国的完整历史",[F("intelligence",12),F("reputation",10)],3,"你详细记录了秦统一六国的完整历史。")],
        SC("秦王扫六合，虎视何雄哉！","李白《古风》","秦统一六国的气势")),
      S("zgu_15",-221,51,59,"秦始皇统一后，推行了一系列巩固统一的措施：统一文字（小篆）、统一货币（圆形方孔钱）、统一度量衡、修建驰道和直道、修筑万里长城。这些措施对中国历史产生了深远的影响。",
        [O("参与统一文字的工作",[F("intelligence",10),F("reputation",8)],3,"你参与了统一文字的工作。"),
         O("参与统一货币和度量衡的工作",[F("intelligence",8),F("wealth",5)],2,"你参与了统一货币和度量衡的工作。"),
         O("参与修建驰道和直道",[F("constitution",8),F("intelligence",5)],1,"你参与了驰道和直道的修建。")],null),
      S("zgu_16",-220,52,60,"秦始皇推行郡县制，废除分封制，由中央直接管理地方。全国分为三十六郡，郡下设县。这一制度开创了中国两千多年中央集权制度的先河。",
        [O("参与郡县制的推行",[F("intelligence",10),F("reputation",8),FL("zgu_junxian",true)],3,"你参与了郡县制的推行。"),
         O("研究郡县制与分封制的优劣",[F("intelligence",10),F("reputation",5)],3,"你深入研究了郡县制与分封制的优劣。"),
         O("担任地方郡守，治理一方",[F("intelligence",8),F("charisma",8)],2,"你被任命为地方郡守，治理一方。")],null),
      S("zgu_17",-215,57,65,"回顾这段波澜壮阔的历史，从长平之战到秦统一六国，你亲历了中国历史上最伟大的统一进程。你将如何总结自己的一生？",
        [O("著书立说，记录秦统一六国的历史",[F("intelligence",12),F("reputation",10)],3,"你撰写了一部关于秦统一六国的史书。"),
         O("参与秦朝的治理，为帝国的稳定贡献力量",[F("intelligence",8),F("charisma",5)],2,"你继续参与秦朝的治理工作。"),
         O("归隐山林，安度晚年",[F("happiness",8),F("constitution",5)],1,"你选择归隐，安享晚年。")],null),
      S("zgu_18",-255,25,33,"李斯向秦王嬴政上《谏逐客书》，劝阻嬴政驱逐六国客卿。嬴政被李斯的才华打动，取消了逐客令，任命李斯为廷尉。李斯成为秦国统一六国的重要谋士。",
        [O("你就是李斯，上《谏逐客书》劝阻逐客令",[F("intelligence",12),F("charisma",10),F("reputation",10),FL("zgu_jianzhu_keshu",true)],3,"你的《谏逐客书》文采斐然，嬴政被深深打动。"),
         O("协助李斯起草《谏逐客书》",[F("intelligence",8),F("reputation",5)],2,"你协助李斯起草了《谏逐客书》。"),
         O("研究《谏逐客书》的政治意义",[F("intelligence",10),F("reputation",5)],3,"你深入研究了《谏逐客书》的政治意义。")],
        SC("泰山不让土壤，故能成其大；河海不择细流，故能就其深。","李斯《谏逐客书》","李斯劝谏秦王不要驱逐客卿")),
      S("zgu_19",-243,31,39,"韩非入秦。韩非是法家思想的集大成者，他的著作被秦王嬴政读到后，嬴政感叹：\"嗟乎，寡人得见此人与之游，死不恨矣！\"然而韩非入秦后遭到李斯的嫉妒，最终被李斯毒死。",
        [O("试图保护韩非，阻止李斯的阴谋",[F("charisma",8),F("intelligence",5)],1,"你试图保护韩非，但未能成功。"),
         O("记录韩非的思想和冤死经过",[F("intelligence",10),F("reputation",8)],3,"你记录了韩非的思想和冤死的经过。"),
         O("研究韩非法家思想对秦国的影响",[F("intelligence",10),F("reputation",5)],3,"你深入研究了韩非思想对秦国的影响。")],null),
      S("zgu_20",-240,34,42,"秦王嬴政采纳韩非和李斯的法家思想，以法治国，奖励耕战。秦国的制度优势日益明显，统一六国只是时间问题。",
        [O("参与秦国法家思想的实践",[F("intelligence",8),F("reputation",5)],2,"你参与了秦国法家思想的实践。"),
         O("研究法家思想对统一战争的作用",[F("intelligence",10),F("reputation",5)],3,"你深入研究了法家思想对统一战争的作用。"),
         O("在秦国推行法治，维护社会秩序",[F("intelligence",8),F("charisma",5)],2,"你在秦国推行法治，维护社会秩序。")],null),
      S("zgu_21",-235,39,47,"秦国的间谍活动遍布六国。秦国用重金收买各国权臣，散布谣言，离间君臣关系。这些间谍活动为秦国的统一战争创造了有利条件。",
        [O("揭露秦国在赵国的间谍活动",[F("intelligence",8),F("charisma",5)],2,"你揭露了秦国在赵国的间谍活动。"),
         O("研究秦国间谍活动的策略和手段",[F("intelligence",10),F("reputation",5)],3,"你深入研究了秦国间谍活动的策略。"),
         O("利用间谍活动为秦国的统一服务",[F("intelligence",8),F("charisma",5)],1,"你利用间谍活动为秦国的统一服务。")],null),
      S("zgu_22",-230,42,50,"秦国的军工生产达到了古代世界的巅峰。秦弩的射程和精度远超六国，秦剑的长度和锋利度也是一流的。秦国的军事优势不仅来自制度，也来自先进的武器装备。",
        [O("参与秦国兵器的研发和改进",[F("intelligence",10),F("constitution",5)],2,"你参与了秦国兵器的研发和改进。"),
         O("研究秦国的军工生产体系",[F("intelligence",10),F("reputation",5)],3,"你深入研究了秦国的军工生产体系。"),
         O("在战场上使用秦国的新式武器",[F("constitution",8),F("intelligence",5)],1,"你在战场上使用了秦国的新式武器。")],null),
      S("zgu_23",-225,47,55,"秦灭六国的进程加速。韩、赵、魏相继灭亡，楚国和燕国也岌岌可危。六国虽然也曾尝试合纵抗秦，但由于各国之间的矛盾和猜忌，始终无法形成有效的抵抗。",
        [O("分析六国合纵失败的原因",[F("intelligence",10),F("reputation",5)],3,"你深入分析了六国合纵失败的原因。"),

      {id:"kp_zgu_1",title:"秦统一六国",content:"从公元前230年到公元前221年，秦王嬴政陆续灭掉韩、赵、魏、楚、燕、齐六国，完成了统一大业，建立了中国历史上第一个统一的中央集权国家——秦朝，定都咸阳。秦的统一顺应了历史发展的趋势，结束了春秋战国以来长期割据混战的局面。参见七年级上册第9课《秦统一中国》。",competency:"时空观念"},

      {id:"kp_zgu_3",title:"长平之战",content:"公元前260年，秦赵两国在长平展开决战。秦将白起以诱敌之计，将赵军分割包围。赵括纸上谈兵，指挥失误，四十万赵军被秦军坑杀。长平之战是战国时期规模最大、最惨烈的战役，赵国从此一蹶不振，秦国统一六国的步伐大大加快。",competency:"唯物史观"},
      {id:"kp_zgu_4",title:"荆轲刺秦王",content:"公元前227年，燕国太子丹派荆轲以献地图为名，行刺秦王嬴政。荆轲在展开地图时\"图穷匕见\"，但行刺失败，被杀。荆轲刺秦王虽然失败，但表现了不畏强暴的精神。参见七年级上册第9课。",competency:"史料实证"}

      S("qe_05",-222,22,30,"秦灭燕、齐，天下一统！秦王嬴政建立了中国历史上第一个统一的中央集权封建国家。嬴政自认为功过三皇五帝，自创\"皇帝\"称号，称\"始皇帝\"。",

      S("ch_10",-204,20,28,"韩信背水一战！在井陉之战中，韩信以三万汉军大破二十万赵军。此战展现了韩信高超的军事指挥艺术。",

      S("ch_14",-203,21,29,"刘邦与项羽在广武山对峙。项羽将刘邦的父亲太公绑在阵前，威胁要将太公煮了。刘邦却说：'我与你曾约为兄弟，我的父亲就是你的父亲，如果你一定要煮你的父亲，请分我一杯羹。'",
        [O("在广武山前线参与谈判",[F("charisma",8),F("intelligence",5)],2,"你参与了两军的谈判，见证了这场惊心动魄的对峙。"),

      S("ch_15",-203,21,29,"项羽同意与刘邦议和，以鸿沟为界，中分天下。鸿沟以西归汉，以东归楚。项羽随后率军东归。",

         O("认为应该遵守和约，休养生息",[F("intelligence",5),F("charisma",3)],1,"你建议遵守和约，但被张良和陈平否决。"),

      S("ch_16",-202,22,30,"垓下之战！刘邦联合韩信、彭越、英布等诸侯，以六十万大军将项羽十万楚军包围在垓下。夜间汉军四面唱起楚歌，项羽以为楚地已尽失汉军之手。",

        SC("夜闻汉军四面皆楚歌，项王乃大惊曰：'汉皆已得楚乎？是何楚人之多也！'","《史记·项羽本纪》","四面楚歌")),
      S("ch_17",-202,22,30,"项羽突围至乌江边，乌江亭长备船请项羽渡江。项羽说：'我率江东子弟八千人渡江而西，今无一人还，纵江东父兄怜而王我，我何面目见之？'遂自刎而死。楚汉之争以刘邦的胜利告终。",

        SC("天之亡我，我何渡为！且籍与江东子弟八千人渡江而西，今无一人还。","《史记·项羽本纪》","乌江自刎")),

  // ==================== 场景3: 文景之治 ====================
  {
    id: "qh_wenjing",
    name: "文景之治",
    period: "西汉初期",
    yearStart: -180,
    yearEnd: -141,
    description: "汉文帝刘恒和汉景帝刘启在位期间，推行轻徭薄赋、与民休息的政策，开创了中国历史上第一个治世——文景之治。废除肉刑、减轻赋税、鼓励农业生产，社会经济得到恢复和发展。然而景帝时期的七国之乱也暴露了诸侯王势力的威胁。你将亲历这个休养生息、积蓄国力的太平盛世。",
    identities: [
      { id: "wj_official", name: "朝廷官员", description: "汉朝廷中的文官，参与国家大政方针的制定，推行仁政。", baseAttributes: { intelligence: 12, charisma: 8, constitution: 6, wealth: 8, reputation: 10, happiness: 8 } },
      { id: "wj_farmer", name: "关中农民", description: "关中地区的自耕农，在文景之治中享受了轻徭薄赋的好处。", baseAttributes: { intelligence: 6, charisma: 5, constitution: 12, wealth: 8, reputation: 3, happiness: 10 } },
      { id: "wj_merchant", name: "长安商人", description: "长安城中的富商，利用太平盛世发展商业。", baseAttributes: { intelligence: 8, charisma: 8, constitution: 6, wealth: 15, reputation: 5, happiness: 8 } },
      { id: "wj_scholar", name: "儒学之士", description: "研习儒学的学者，在黄老之学盛行的时代默默传承儒家文化。", baseAttributes: { intelligence: 14, charisma: 6, constitution: 5, wealth: 5, reputation: 8, happiness: 5 } }
    ],
    storyNodes: [
      S("wj_01",-180,14,22,"汉文帝刘恒即位。文帝以仁孝著称，即位后立即废除连坐法和诽谤妖言罪，广开言路，与民休息。你正值少年，将如何抉择？",
        [O("研习经史，准备入仕为官",[F("intelligence",10),F("reputation",5)],3,"你研习经史子集，为将来入仕做准备。"),
         O("回乡务农，响应朝廷号召",[F("wealth",8),F("constitution",5)],0,"你回乡务农，享受文帝轻徭薄赋的好处。"),
         O("在长安经商，积累财富",[F("wealth",10),F("intelligence",3)],0,"你利用太平盛世的机会经商致富。"),
         O("学习法律，为将来从政做准备",[F("intelligence",8),F("reputation",5)],2,"你研习汉律，为将来从政做准备。")],null),
      S("wj_02",-178,16,24,"汉文帝下令减轻田租，从十五税一减为三十税一。同时废除肉刑，以笞刑代替。这是中国法制史上的一次重大进步。",
        [O("上书支持文帝减轻田租的政策",[F("reputation",8),F("charisma",5)],1,"你上书支持文帝的政策，得到了朝廷的嘉奖。"),
         O("研究减轻赋税对国家经济的影响",[F("intelligence",10),F("reputation",5)],3,"你深入研究了减轻赋税对经济的积极影响。"),
         O("利用减税政策发展农业生产",[F("wealth",10),F("constitution",5)],0,"你利用减税政策扩大耕种面积，粮食产量大增。")],
        SC("农，天下之大本也，民所恃以生也。","汉文帝诏书","重农政策")),
      S("wj_03",-176,18,26,"缇萦救父！齐太仓令淳于意因罪当受肉刑，其女缇萦上书文帝，愿没入官府为奴以赎父罪。文帝深受感动，下令废除肉刑。",
        [O("你就是缇萦，上书救父",[F("reputation",12),F("charisma",10),FL("wj_tiying",true)],3,"你的孝心和勇气感动了文帝，不仅救了父亲，还推动了废除肉刑的改革。"),
         O("支持废除肉刑的改革",[F("intelligence",5),F("reputation",5)],2,"你公开支持废除肉刑，认为这是仁政的体现。"),
         O("研究废除肉刑后的法律改革",[F("intelligence",10),F("reputation",5)],3,"你研究了废除肉刑后的法律改革方案。")],
        SC("妾愿没入为官婢，以赎父刑罪，使得改行自新也。","缇萦上书","缇萦救父")),
      S("wj_04",-174,20,28,"汉文帝提倡节俭，在位二十三年，宫室苑囿、车骑服御无所增益。他身穿粗丝衣服，宠妃也不许穿拖地的长裙。",
        [O("以文帝为榜样，厉行节俭",[F("wealth",5),F("reputation",8),FL("wj_frugal",true)],2,"你以文帝为榜样，生活节俭，赢得了百姓的称赞。"),
         O("记录文帝节俭的言行，传之后世",[F("intelligence",10),F("reputation",8)],3,"你记录了文帝节俭的言行，为后世树立了榜样。"),
         O("利用节约的资源发展生产",[F("wealth",8),F("intelligence",3)],0,"你利用节约的资源发展生产。")],null),
      S("wj_05",-170,24,32,"匈奴冒顿单于屡次入侵汉朝边境。文帝采取和亲政策，将公主嫁给匈奴单于，并每年赠送大量丝绸和粮食。朝中对此议论纷纷。",
        [O("支持文帝的和亲政策，认为应先休养生息",[F("intelligence",8),F("charisma",5)],2,"你支持文帝的决策，认为汉朝需要时间恢复国力。"),
         O("上书主张加强边防，抵御匈奴",[F("constitution",8),F("reputation",5)],1,"你主张加强边防，不能一味退让。"),
         O("研究匈奴的军事战术和游牧文化",[F("intelligence",10),F("reputation",3)],3,"你深入研究了匈奴的军事和文化。")],
        SC("和亲之策，实乃权宜之计。待国力充盈，再图北伐。","朝臣议和亲","和亲政策")),
      S("wj_06",-168,26,34,"贾谊上《治安策》和《过秦论》，分析汉朝面临的内外危机，提出削弱诸侯王势力、加强中央集权的建议。文帝虽然赞赏贾谊的才华，但未能完全采纳。",
        [O("支持贾谊的建议，上书附议",[F("intelligence",8),F("reputation",5),FL("wj_support_jia",true)],2,"你上书支持贾谊的建议，但文帝碍于诸侯王的压力，未能采纳。"),
         O("与贾谊讨论治国之道",[F("intelligence",10),F("reputation",5)],3,"你与贾谊深入讨论治国之道，受益匪浅。"),
         O("研究贾谊《过秦论》中的历史教训",[F("intelligence",10),F("reputation",5)],3,"你深入研究了《过秦论》中关于秦朝灭亡的教训。")],
        SC("仁义不施而攻守之势异也。","贾谊《过秦论》","秦亡的教训")),
      S("wj_07",-165,29,37,"汉文帝下令开放皇家苑囿给百姓耕种，鼓励开垦荒地。同时在全国推行借田制度，皇帝亲自耕种籍田，以示重农。",
        [O("参与籍田仪式，学习农耕技术",[F("intelligence",5),F("wealth",5)],1,"你参与了籍田仪式，学习了先进的农耕技术。"),

      S("wj_08",-164,30,38,"汉文帝驾崩，汉景帝刘启即位。景帝继续推行文帝的政策，轻徭薄赋，与民休息。文景之治进入鼎盛时期。",

      S("wj_09",-162,32,40,"晁错上《削藩策》，建议景帝削夺诸侯王的封地，以加强中央集权。景帝采纳了晁错的建议，开始削藩。此举引起了诸侯王的强烈不满。",

         O("劝景帝谨慎行事，不要操之过急",[F("intelligence",8),F("charisma",5)],2,"你劝景帝循序渐进，但景帝急于求成。"),
         O("暗中联络诸侯王，了解他们的反应",[F("intelligence",5),F("charisma",5)],1,"你暗中联络诸侯王，了解他们的态度。")],
        SC("削之亦反，不削亦反。削之，其反亟，祸小；不削之，其反迟，祸大。","晁错《削藩策》","削藩的理由")),
      S("wj_10",-157,37,45,"七国之乱爆发！吴王刘濞联合楚、赵、胶西、胶东、淄川、济南六国，以\"清君侧、诛晁错\"为名起兵叛乱。景帝大惊，杀晁错以谢诸侯，但叛军并未退兵。",
        [O("参与平叛战争，随周亚夫出征",[F("constitution",10),F("reputation",8),FL("wj_qiguo_war",true)],1,"你随太尉周亚夫出征，参与平叛战争。"),

        SC("斩晁错以谢天下……七国不罢兵。","《史记·袁盎晁错列传》","晁错之死")),
      S("wj_11",-154,40,48,"周亚夫以坚壁清野之策，三个月平定七国之乱。七国诸侯王或被杀或自杀，诸侯王的势力遭到沉重打击。中央集权得到加强。",

         O("研究周亚夫的军事战略",[F("intelligence",8),F("constitution",5)],3,"你深入研究了周亚夫的军事战略。")],
        SC("太尉既会兵荥阳，吴方攻梁，梁急，请救于太尉。","《史记·绛侯周勃世家》","周亚夫平叛")),
      S("wj_12",-152,42,50,"七国之乱平定后，景帝乘机改革诸侯王制度，规定诸侯王只能收取封地的租税，不得参与政事。中央集权进一步巩固。",

      S("wj_13",-150,44,52,"文景之治进入鼎盛时期。社会安定，经济繁荣，百姓安居乐业。国库充盈，粮食堆积如山，钱串的绳子都腐烂了。",

      S("wj_14",-148,46,54,"汉景帝晚年，太子刘彻（即后来的汉武帝）出生。王美人精心培养刘彻，为他日后成为一代雄主打下了基础。",

      S("wj_15",-141,53,61,"汉景帝驾崩，太子刘彻即位，是为汉武帝。文景之治四十年的休养生息，为汉武帝的开疆拓土打下了坚实的国力基础。你回顾这段太平盛世，感慨万千。",

    S("sanguo_wei_study", 224, 14, 20, "黄初五年，曹丕下令复兴太学。你在太学中刻苦攻读《诗》《书》《礼》《易》《春秋》五经，同时关注天下局势。此时曹丕两次伐吴均无功而返，蜀汉诸葛亮正在积极准备北伐。一位同窗好友邀你一同参加朝廷策试。", [

    S("sanguo_zhuge_north", 227, 17, 23, "建兴五年，诸葛亮上《出师表》，率军北伐曹魏。蜀军声势浩大，天水、南安、安定三郡响应归降。然而马谡失守街亭，北伐功亏一篑。你作为随军人员，亲历了这场大战。", [

    S("sanguo_zhuge_2nd", 228, 18, 24, "建兴六年冬，诸葛亮再次北伐，出散关围陈仓。陈仓守将郝昭以千余兵力死守二十余日，蜀军粮尽退兵。次年春，诸葛亮第三次北伐，攻取武都、阴平二郡。你跟随蜀军征战，见证了诸葛亮用兵的精妙。", [

    S("sanguo_sima_rise", 239, 20, 26, "景初三年，魏明帝曹叡驾崩，年仅八岁的曹芳继位。大将军曹爽与太尉司马懿共同辅政。曹爽专权跋扈，排挤司马懿。朝中暗流涌动，一场权力风暴即将来临。你身处朝堂之上，面临重大抉择。", [

    S("sanguo_gaoping_coup", 249, 22, 28, "正始十年正月，司马懿趁曹爽陪小皇帝扫墓之际，发动高平陵之变。司马懿以太后令关闭洛阳城门，控制京师，并派人劝说曹爽交出兵权。曹爽犹豫不决，最终投降，随后被夷三族。这场政变彻底改变了魏国的政治格局。", [

    S("sanguo_zhuge_death", 234, 19, 25, "建兴十二年八月，诸葛亮在第五次北伐中病逝于五丈原，享年五十四岁。蜀军按照诸葛亮遗命撤退，司马懿追击不及。蜀汉失去了一代名相，北伐大业遭受重大打击。你亲历了这一历史时刻。", [

    S("sanguo_wu_develop", 230, 15, 21, "黄武年间，孙权在江东大力发展经济。他派遣卫温、诸葛直率水军一万到达夷洲（今台湾），加强了大陆与台湾的联系。东吴造船业发达，青瓷制造业也蓬勃发展。你在江东见证了这个南方政权的繁荣。", [

    S("sanguo_sima_2nd_coup", 254, 26, 32, "嘉平六年，司马师废黜魏帝曹芳，另立曹髦为帝。朝野震动，但无人敢公开反对。司马氏的权力已不可动摇。你作为朝中官员，面临着忠诚与生存的抉择。", [

    S("sanguo_cao_mao_death", 260, 28, 34, "甘露五年，魏帝曹髦不堪忍受司马昭的专权，率宫中侍卫讨伐司马昭，在街头被成济所杀。曹髦死后，司马昭另立曹奂为帝。'司马昭之心，路人皆知'，篡魏之势已不可逆转。", [

    S("sanguo_shu_decline", 263, 30, 36, "景耀六年，司马昭派邓艾、钟会率十八万大军伐蜀。邓艾偷渡阴平小道，直逼成都。蜀主刘禅开城投降，蜀汉灭亡。你亲历了这个立国四十三年的政权的落幕。", [

    S("sanguo_jiangwei_revolt", 264, 31, 37, "蜀汉灭亡后，姜维假意投降钟会，策动钟会反叛司马昭，企图恢复蜀汉。然而计划败露，钟会、姜维俱死于乱军之中。这场最后的挣扎宣告失败，三国归一的步伐已不可阻挡。", [

    S("sanguo_wu_sunhao", 264, 30, 36, "永安七年，孙休去世，孙皓继位为吴帝。孙皓初即位时尚能恤民，不久便变得暴虐荒淫，大杀宗室大臣，东吴国势日衰。你在建业目睹了东吴最后的岁月。", [

    S("sanguo_jin_found", 265, 32, 38, "咸熙二年，司马昭之子司马炎逼迫魏帝曹奂禅让，建立晋朝，定都洛阳，史称西晋。魏国灭亡，天下由三国变为晋、吴两国对峙。你见证了又一个朝代的更替。", [

    S("sanguo_wu_fall", 280, 40, 50, "太康元年，晋武帝司马炎派六路大军伐吴。晋将王濬率水军顺江而下，吴军望风而降。孙皓出城投降，东吴灭亡。自黄巾起义以来近百年的大分裂局面暂时结束，天下归于一统。", [

    S("sanguo_talent_literati", 225, 15, 21, "正始年间，以何晏、王弼为代表的玄学思潮兴起，士人崇尚清谈，讨论老庄之学。竹林七贤——嵇康、阮籍、山涛、向秀、刘伶、阮咸、王戎——在山阳竹林中饮酒赋诗，不拘礼法。你有机会接触到这些名士。", [

    S("sanguo_medicine", 235, 18, 24, "三国时期，医学有了重要发展。张仲景的《伤寒杂病论》系统总结了中医临床理论和治疗方法，华佗发明了麻醉药'麻沸散'，开创了外科手术的先河。你对医学产生了浓厚兴趣。", [

    S("sanguo_wei_culture", 230, 15, 21, "曹魏时期，文学艺术蓬勃发展。曹操父子——曹操、曹丕、曹植——都是杰出的文学家。建安七子（孔融、陈琳、王粲、徐干、阮瑀、应玚、刘桢）的诗歌慷慨悲凉，反映了乱世的苦难与人民的愿望。", [

    S("xijin_bawang_end", 306, 30, 36, "光熙元年，东海王司马越毒死惠帝，另立怀帝司马炽。八王之乱历时十六年，参战诸王相继败亡。这场内乱使西晋元气大伤，数十万人丧生，经济遭到严重破坏。更可怕的是，内乱为五胡乱华打开了大门。", [

    S("xijin_yongjia", 311, 33, 39, "永嘉五年，匈奴汉国刘聪派刘曜、王弥攻陷洛阳，俘虏晋怀帝，杀王公士民三万余人。史称'永嘉之祸'。洛阳城化为废墟，宫殿、寺庙、民居被焚毁殆尽。中原百姓纷纷南逃，史称'衣冠南渡'。你亲历了这场浩劫。", [

      O("沿途救助南逃的百姓", [F("charisma", 2), F("wisdom", 1)], 1, "你在南逃途中救助了许多难民，成为流民中的领袖。")

    S("xijin_min_yue", 313, 35, 41, "永嘉七年，匈奴汉军攻陷长安，晋愍帝被俘，西晋灭亡。从280年统一到316年灭亡，西晋仅存在了三十六年。中原大地陷入五胡十六国的混战之中。你站在江南的土地上，回望北方故土，心中充满了悲凉。", [

    S("xijin_shi_le", 310, 32, 38, "羯族首领石勒在北方建立了后赵政权。石勒虽然出身奴隶，但善于用人，重视汉族士人。他建立了较为完善的政治制度，使后赵成为北方最强大的政权之一。你有机会与石勒的政权打交道。", [

    S("xijin_buddhism", 300, 25, 31, "西晋时期，佛教在中国迅速传播。洛阳城中寺庙林立，僧侣众多。佛教的因果报应、轮回转世等思想给苦难中的人们带来了精神慰藉。你对佛教产生了兴趣。", [

    S("xijin_nine_ranks", 295, 25, 31, "九品中正制在西晋时期已经完全被世家大族所把持。'上品无寒门，下品无世族'成为社会常态。出身决定了一切，寒门子弟无论多么有才华，都难以进入上层社会。你对这种制度深感不满。", [

      O("私下教授寒门子弟，帮助他们成才", [F("charisma", 2), F("literacy", 1)], 1, "你开办私学，培养了许多优秀的寒门子弟。"),

    S("xijin_wudi_luxury", 288, 18, 24, "太康年间，在天下太平的表象下，统治阶层日益奢靡。晋武帝司马炎后宫妃嫔近万人，每天不知该宠幸谁，便坐羊车随意而行。王恺与石崇斗富，用蜡当柴烧、用锦缎铺路，奢侈至极。你看到了繁华背后的隐忧。", [

    S("xijin_refugee_crisis", 298, 27, 33, "八王之乱和少数民族起义导致大量百姓流离失所。流民潮席卷中原，数十万人背井离乡，向南方逃亡。沿途饿殍遍野，惨不忍睹。你亲眼目睹了这场人道主义灾难。", [

    S("xijin_qianyan_rise", 337, 40, 46, "虽然你已身在南方，但北方的消息不断传来。鲜卑慕容氏建立前燕，石勒建立后赵，北方陷入了十六国的混战。各政权之间征伐不休，百姓苦不堪言。你虽然身在江南，但心系北方故土。", [

      O("暗中与隋朝联络，寻求和平解决", [F("charisma", 1), F("wisdom", 2)], 1, "你尝试通过外交手段避免战争，但未能成功。"),
      O("做好最坏打算，准备保护百姓", [F("charisma", 2), F("wisdom", 1)], 1, "你开始组织百姓做好战时准备。")
    ]),

    S("liangchen_chen_fall", 589, 70, 76, "开皇九年，隋文帝派晋王杨广率五十万大军南下灭陈。隋军分八路渡江，陈朝军队望风而溃。陈后主陈叔宝与张丽华藏身于胭脂井中，被隋军俘获。陈朝灭亡，南朝结束。自三国以来近三百年的南北分裂局面终于结束，天下归于一统。", [
      O("在最后关头组织抵抗", [F("military", 2), F("charisma", 1)], 0, "你在最后关头英勇抵抗，但大势已去。"),
      O("保护陈朝典籍和文物南迁", [F("literacy", 2), F("wisdom", 1)], 1, "你抢救了大量珍贵典籍，为保存南朝文化做出了贡献。"),
      O("协助隋军维持秩序，保护百姓", [F("charisma", 2), F("wisdom", 1)], 1, "你帮助隋军维持秩序，避免了大规模的屠杀和破坏。")
    ], SC("商女不知亡国恨，隔江犹唱后庭花。", "杜牧《泊秦淮》", "思考：陈朝为什么会灭亡？")),

    S("liangchen_conditional_wisdom", 520, 28, 34, "北魏孝文帝改革后，北方经济文化迅速发展。你到洛阳游学，亲眼看到了北方的变化。你开始思考南北统一的可能性。", [
      O("撰写关于南北统一的策论", [F("wisdom", 3), F("literacy", 1)], 2, "你的策论深刻分析了南北统一的条件和时机。"),
      O("研究南北制度的优劣", [F("wisdom", 2), F("politics", 1)], 1, "你的比较研究为后世的政治制度设计提供了参考。"),
      O("促进南北学术交流", [F("wisdom", 2), F("charisma", 1)], 1, "你组织了南北学者的交流活动，促进了学术融合。")
    ], null, { talent: "wisdom", min: 5 }),

    S("liangchen_conditional_military", 548, 46, 52, "侯景叛乱时，你作为梁朝的将领，负责守卫一段城墙。侯景军队攻势凶猛，你的部队伤亡惨重。你需要做出决断。", [
      O("坚守阵地，誓与城池共存亡", [F("military", 3), F("charisma", 1)], 0, "你坚守阵地数日，直到城池陷落才突围而出。"),
      O("组织突围，保存有生力量", [F("military", 2), F("wisdom", 1)], 0, "你带领残余部队成功突围。"),
      O("掩护百姓撤退", [F("charisma", 2), F("military", 1)], 1, "你冒着生命危险掩护百姓安全撤离。")
    ], null, { talent: "military", min: 5 }),

    S("liangchen_conditional_literacy", 530, 32, 38, "梁朝时期，文学艺术继续发展。昭明太子萧统编纂了《文选》（即《昭明文选》），是中国现存最早的诗文总集。钟嵘的《诗品》和刘勰的《文心雕龙》是重要的文学理论著作。你作为一位有才华的文人，在文坛上崭露头角。", [
      O("参与《文选》的编纂工作", [F("literacy", 3), F("wisdom", 1)], 2, "你参与了这部伟大文学总集的编纂，为保存古代文学做出了贡献。"),
      O("研读《文心雕龙》，深入研究文学理论", [F("literacy", 2), F("wisdom", 2)], 2, "你对文学理论有了系统深入的理解。"),
      O("创作诗歌散文，成为文坛名家", [F("literacy", 3)], 2, "你的文学作品在梁朝文坛广受好评。")
    ], null, { talent: "literacy", min: 5 }),

    S("liangchen_conditional_charisma", 549, 47, 53, "侯景之乱后，江南一片废墟，百姓流离失所。你作为有影响力的人物，承担起了重建家园的重任。", [
      O("组织百姓重建家园", [F("charisma", 3), F("politics", 1)], 1, "你带领百姓重建家园，恢复了社会秩序。"),
      O("向陈霸先建议减轻赋税", [F("charisma", 2), F("politics", 1)], 1, "你的建议被采纳，百姓的负担得到了一定程度的减轻。"),
      O("设立义仓，救济灾民", [F("charisma", 2), F("wealth", -1)], 1, "你捐出大量粮食设立义仓，救助了大量灾民。")
    ], null, { talent: "charisma", min: 5 }),

    S("liangchen_northern_split", 534, 36, 42, "北魏在孝文帝改革后逐渐衰落。534年，北魏分裂为东魏（高欢控制）和西魏（宇文泰控制）。后来东魏演变为北齐，西魏演变为北周。北方再次陷入分裂和对峙。你密切关注着北方的局势变化。", [
      O("研究北魏分裂的原因", [F("wisdom", 2), F("literacy", 1)], 1, "你深入分析了北魏分裂的深层原因。"),
      O("与北齐、北周的使节交流", [F("charisma", 2), F("wisdom", 1)], 1, "你与南北双方的使节交流，了解北方的政治格局。"),
      O("利用北方分裂的机会加强南方防务", [F("military", 1), F("wisdom", 2)], 1, "你建议趁北方分裂之机加强南方的防御。")
    ]),

    S("liangchen_zhou_wu_di", 577, 56, 62, "北周武帝宇文邕是一位英明的君主。他灭佛以充实国力，于577年灭北齐，统一了北方。北周的国力空前强大，对南方的陈朝构成了巨大威胁。你意识到南北统一的趋势已不可逆转。", [
      O("建议陈朝与北周修好，争取时间", [F("charisma", 1), F("wisdom", 2)], 1, "你的外交建议为陈朝争取了短暂的和平。"),
      O("研究北周强大的原因", [F("wisdom", 2), F("politics", 1)], 1, "你分析了北周强大的原因，认为关键在于改革和务实。"),
      O("做好南朝可能灭亡的准备", [F("wisdom", 2), F("charisma", 1)], 1, "你开始为可能到来的巨变做准备。")
    ]),

    S("liangchen_chen_houzhu", 583, 68, 74, "陈后主陈叔宝荒淫无道，不理朝政。他终日与张丽华等妃嫔饮酒作乐，创作艳词。'商女不知亡国恨，隔江犹唱后庭花'——陈朝的灭亡已经不可避免。你作为老臣，对国家的命运深感忧虑。", [
      O("冒死上书劝谏陈后主", [F("politics", 1), F("charisma", 1), FL("reputation", "loyal")], 1, "你的劝谏虽然被无视，但赢得了忠臣的名声。"),
      O("暗中组织防御力量", [F("military", 1), F("wisdom", 2)], 1, "你秘密组织了一些防御力量，为可能的战争做准备。"),
      O("保护重要典籍和人才", [F("literacy", 2), F("charisma", 1)], 1, "你尽力保护了南朝的文化遗产和人才。")
    ]),

    S("liangchen_zhaoming_wenxuan", 530, 32, 38, "昭明太子萧统编纂了《文选》（即《昭明文选》），这是中国现存最早的诗文总集，收录了从先秦到梁朝的七百余篇优秀作品。你有机会参与这部伟大文献的编纂工作。", [
      O("参与《文选》的编纂工作", [F("literacy", 3), F("wisdom", 1)], 2, "你参与了这部伟大文学总集的编纂，为保存古代文学做出了贡献。"),
      O("研读《文选》中收录的作品", [F("literacy", 2), F("wisdom", 1)], 1, "你深入研读了《文选》中的经典作品，文学素养大为提高。"),
      O("为《文选》撰写注释", [F("literacy", 2), F("wisdom", 1)], 1, "你为《文选》撰写的注释精当准确，受到学者们的赞誉。")
    ]),

    S("liangchen_wenxin_diaolong", 520, 28, 34, "刘勰的《文心雕龙》是中国文学理论史上最伟大的著作之一。全书分为五十篇，系统论述了文学的本质、文体、创作方法和批评标准。你有幸研读这部巨著。", [
      O("向刘勰请教文学理论", [F("literacy", 3), F("wisdom", 1)], 2, "你与刘勰深入交流，对文学理论有了系统深入的理解。"),
      O("研究《文心雕龙》的理论体系", [F("wisdom", 2), F("literacy", 1)], 1, "你系统研究了《文心雕龙》的理论体系。"),
      O("将《文心雕龙》的理论应用于创作", [F("literacy", 2), F("wisdom", 1)], 1, "你将文学理论应用于实践，创作水平大为提高。")
    ]),

    S("liangchen_jiangnan_buddhism_art", 535, 33, 39, "梁朝时期，佛教艺术达到了极高的水平。建康附近的栖霞山石窟、新昌的宝相寺石窟等都是这一时期的杰作。佛教造像融合了印度和中国的艺术风格，形成了独特的艺术风貌。你有机会欣赏和研究这些艺术瑰宝。", [
      O("参观栖霞山石窟，研究佛教造像", [F("literacy", 2), F("wisdom", 1)], 1, "你对佛教艺术有了深入的理解。"),
      O("参与石窟的开凿和装饰", [F("literacy", 1), F("wealth", 1)], 0, "你捐资参与了石窟的开凿，为佛教艺术做出了贡献。"),
      O("研究佛教艺术对中国绘画的影响", [F("wisdom", 2), F("literacy", 1)], 1, "你系统研究了佛教艺术对中国绘画的深远影响。")
    ]),

    S("liangchen_chen_qian_di", 560, 55, 61, "陈文帝陈蒨即位后，励精图治，整顿吏治，发展经济。他在位期间，陈朝政治清明，社会安定，国力有所恢复。你有机会在陈文帝治下效力。", [

      O("参与陈朝的军事改革", [F("military", 1), F("politics", 1)], 0, "你参与了陈朝的军事改革，提高了军队的战斗力。"),
      O("在江南推广农业技术", [F("wisdom", 1), F("charisma", 1)], 1, "你推广了新的农业技术，促进了陈朝的经济发展。")
    ]),

    S("liangchen_chen_xuan_di", 573, 60, 66, "陈宣帝陈顼即位后，趁北齐内乱之机发动太建北伐。初期取得了一些胜利，收复了淮南大片土地。但后来在吕梁被北周击败，所收复的土地得而复失。你亲历了这次北伐。", [

      O("分析北伐失败的原因", [F("wisdom", 2), F("military", 1)], 1, "你深刻分析了北伐失败的原因，为后世提供了借鉴。")
    ]),

    S("liangchen_sui_preparation", 585, 72, 78, "隋朝在灭陈之前做了充分的准备。隋文帝在长江上游建造了大量战船，训练水军。同时，隋朝采用高频度的间谍活动，散布谣言，瓦解陈朝的士气。你察觉到了隋朝的企图。", [

      O("加强长江防务", [F("military", 2), F("wisdom", 1)], 0, "你加强了长江防务，在局部地区成功抵御了隋军的进攻。"),
      O("做好最坏打算，保护文化遗产", [F("literacy", 2), F("charisma", 1)], 1, "你尽力保护了南朝的文化遗产。")

    S("liangchen_north_south_culture_exchange", 545, 43, 49, "梁朝时期，南北虽然政治对立，但文化交流十分活跃。北方学者颜之推来到南方，后来写下了著名的《颜氏家训》。南方的文学艺术也传播到北方。你参与了南北文化交流。", [

      O("将南方的文学艺术传播到北方", [F("literacy", 2), F("charisma", 1)], 1, "你为南北文化交流做出了贡献。"),
      O("研究南北文化的异同", [F("wisdom", 2), F("literacy", 1)], 1, "你系统比较了南北文化的异同，见解独到。")
    ]),

    S("liangchen_end_reflect", 589, 70, 80, "隋灭陈，天下归一。自220年曹丕建魏以来，近三百七十年的大分裂局面终于结束。你亲历了梁陈两朝的兴衰，见证了南北统一的伟大时刻。回首往事，你感慨万千。在这个风云变幻的时代中，你留下了自己的印记。", [

      {id:"kp_zg_1",title:"贞观之治",content:"唐太宗在位期间，政治比较清明，经济得到恢复和发展，国力增强，被誉为\"贞观之治\"。太宗注意吸取隋亡的教训，勤于政事，虚心纳谏，从善如流。他广纳贤才，知人善任；减轻赋税和劳役，促进了社会经济的发展。",competency:"唯物史观"},
      {id:"kp_zg_2",title:"唐蕃和亲",content:"唐太宗时，将文成公主嫁给吐蕃赞普松赞干布。文成公主入藏时，带去了大量的蔬菜种子、茶叶、丝绸以及工匠和书籍，促进了吐蕃经济文化的发展，也增进了汉藏两族的友好关系。",competency:"家国情怀"},
      {id:"kp_zg_3",title:"天可汗",content:"630年，唐太宗派兵大举反击突厥，俘获东突厥可汗。东突厥灭亡后，唐太宗被西北各族首领尊称为\"天可汗\"，意为各族共同的君主。这反映了唐朝前期强大的国力和开放包容的民族政策。",competency:"时空观念"}

  storyNodes: [
    S("sy_sl_001", 1060, 10, 18, "仁宗驾崩，英宗即位。英宗身体多病，在位仅四年。朝中关于变法的呼声越来越高，'三冗'问题日益严重。你此时正值少年，对未来充满期待。", [
      O("听说朝廷积弊甚深，我将来一定要入仕改革，振兴国家。", [F("politics", 5), F("literacy", 3)], 2, "你立志成为改革者。"),
      O("祖宗之法行之有效，何必轻言改革？稳定才是最重要的。", [F("literacy", 5), F("politics", 3)], 2, "你倾向于保守立场。"),

    S("sy_sl_002", 1063, 13, 21, "英宗即位后引发'濮议'之争——英宗该如何称呼自己的生父？朝臣分为两派激烈争论。这场争论看似是礼仪问题，实则反映了朝中深层的政治分歧。", [

      O("朝中争论不休，边防却日益松懈，本末倒置！", [F("military", 4), F("martial", 3)], 0, "你更关心边防问题。"),
      O("这些大事与我无关，我只管做好自己的事。", [F("craft", 3), F("wealth", 2)], 1, "你继续过着自己的生活。")

    S("sy_sl_003", 1067, 17, 25, "英宗驾崩，年仅二十岁的神宗赵顼即位。神宗锐意进取，渴望改变宋朝积贫积弱的局面。他召见了王安石，一场轰轰烈烈的变法运动即将开始。", [
      O("神宗年轻有为，王安石才高志大，变法一定能够成功！", [F("politics", 6), F("literacy", 4)], 2, "你对变法充满期待。"),

      O("变法若能强兵，对边防有利，我支持。", [F("military", 4), F("politics", 3)], 0, "你从军事角度支持变法。"),

    S("sy_sl_004", 1069, 19, 27, "神宗任命王安石为参知政事，开始推行新法。第一批新法包括均输法和青苗法。均输法改革物资调配制度，青苗法在青黄不接时向农民贷款。", [

    S("sy_sl_007", 1072, 22, 30, "王安石推行方田均税法，重新丈量土地，按实有土地面积征税。这触动了大地主隐瞒土地的利益，遭到强烈抵制。同时，市易法设立市易司，由官府管理市场物价。", [

    S("sy_sl_012", 1085, 35, 43, "神宗驾崩，年仅十岁的哲宗即位，高太后垂帘听政。高太后反对新法，任命司马光为宰相，全面废除新法，史称'元祐更化'。", [

      O("新法中有不少好政策也被废除了，这是因噎废食！", [F("politics", 5), F("literacy", 3)], 2, "你对全面废除新法不满。"),
      O("朝政反复无常，对军队士气影响很大。", [F("military", 3), F("politics", 2)], 0, "你对政策反复感到忧虑。"),
      O("不管谁当权，我只希望政策稳定，让百姓能安心生活。", [F("wealth", 3), F("craft", 2)], 1, "你渴望稳定的生活。")

    S("sy_sl_013", 1093, 40, 48, "高太后去世，哲宗亲政。哲宗对新法被废除心怀不满，重新起用变法派，恢复部分新法。朝中新旧党争再起，被称为'绍圣绍述'。", [
      O("政策反复折腾，朝令夕改，受害的最终还是百姓。", [F("politics", 5), F("literacy", 3)], 2, "你对党争深恶痛绝。"),
      O("哲宗恢复新法是正确的，新法有其合理之处。", [F("politics", 4), F("reputation", 2)], 2, "你支持恢复新法。"),
      O("党争消耗了国家元气，不如让我去边疆效力。", [F("military", 4), F("martial", 3)], 0, "你选择远离朝堂。"),

    S("sy_sl_014", 1100, 45, 53, "哲宗驾崩，无子嗣。向太后与朝臣商议后，立端王赵佶为帝，即宋徽宗。徽宗是杰出的艺术家，但在治国方面却令人担忧。", [
      O("徽宗书画造诣极高，但治国需要的是政治才能，而非艺术天赋。", [F("literacy", 4), F("politics", 4)], 2, "你对新皇帝感到担忧。"),
      O("新帝即位，也许会带来新的气象。", [F("politics", 3), F("reputation", 2)], 1, "你对未来抱有希望。"),
      O("皇帝的艺术品味会影响整个社会的文化风气，这对文化发展是好事。", [F("literacy", 5), F("craft", 3)], 3, "你期待文化繁荣。"),
      O("我只关心新帝是否会增加税收，影响百姓生活。", [F("wealth", 2), F("craft", 2)], 1, "你关心民生问题。")
    ], null),

    S("sy_sl_015", 1102, 47, 55, "徽宗任用蔡京为宰相。蔡京打着恢复新法的旗号，实际上大肆搜刮民脂民膏。他设立'西城括田所'，大量兼并民田。朝政日益腐败。", [
      O("蔡京打着新法的旗号行苟且之事，是对王安石变法的亵渎！", [F("politics", 5), F("literacy", 4), F("reputation", 3)], 2, "你愤怒地揭露蔡京的真面目。"),
      O("蔡京祸国殃民，必须被弹劾！", [F("literacy", 4), F("politics", 4), F("reputation", 3)], 2, "你上书弹劾蔡京。"),
      O("蔡京的搜刮让百姓苦不堪言，民怨沸腾。", [F("wealth", -5), F("politics", 3)], 1, "你深受其害。"),
      O("蔡京搜刮的财富流向何处？花石纲、书画古玩……穷奢极欲！", [F("literacy", 3), F("politics", 4)], 2, "你揭露了朝廷的奢靡。")
    ], "sc_sl_015"),

    S("sy_sl_016", 1105, 50, 58, "蔡京推行'花石纲'，从江南搜罗奇花异石运往东京，供徽宗赏玩。沿途百姓深受其害，许多人倾家荡产。同时，蔡京将反对派定为'元祐党人'，刻石立碑，予以打击。", [
      O("花石纲劳民伤财，元祐党人碑迫害忠良，蔡京之罪罄竹难书！", [F("literacy", 5), F("politics", 5), F("reputation", 4)], 3, "你冒着风险记录了蔡京的罪行。"),
      O("百姓被花石纲逼得走投无路，这样下去迟早要出大乱子。", [F("wealth", -5), F("politics", 4)], 1, "你预感到社会危机。"),
      O("元祐党人中有很多正直之士，被迫害令人痛心。", [F("literacy", 4), F("reputation", 3)], 2, "你同情被迫害的忠臣。"),
      O("花石纲经过我的家乡，乡亲们苦不堪言。我必须想办法帮助他们。", [F("reputation", 4), F("wealth", -3)], 1, "你帮助乡亲们应对花石纲。")
    ], null),

    S("sy_sl_017", 1110, 55, 63, "宋朝与金国（女真）达成'海上之盟'，约定联合灭辽。宋朝企图借金国之力收复燕云十六州。朝中有人支持，有人反对。", [
      O("联金灭辽是战略错误！辽国是宋朝的屏障，灭了辽国，金国直接威胁宋朝。", [F("politics", 8), F("military", 4), F("reputation", 4)], 2, "你极力反对海上之盟。"),
      O("收复燕云十六州是百年夙愿，机不可失！", [F("military", 5), F("politics", 3)], 0, "你支持联金灭辽。"),
      O("与虎谋皮，金国比辽国更危险。宋朝的外交策略太天真了。", [F("politics", 6), F("literacy", 3)], 2, "你对外交策略深感忧虑。"),
      O("战争会影响商业，我要提前做好应对准备。", [F("wealth", 3), F("commerce", 3)], 1, "你开始囤积物资。")

    S("sy_sl_018", 1115, 58, 66, "完颜阿骨打统一女真各部，建立金国，国力强盛。金军连续大败辽军，辽国岌岌可危。宋朝按约出兵攻辽，但宋军战斗力低下，被辽军击败。", [
      O("宋军腐败无能，连已经衰弱的辽军都打不过，如何抵御金国？", [F("military", 5), F("politics", 4)], 0, "你对宋军的战斗力深感绝望。"),
      O("这就是重文轻武的后果！百年和平让军队丧失了战斗力。", [F("martial", 5), F("military", 4), F("politics", 3)], 0, "你痛心疾首。"),
      O("当务之急是加强军备，改革军事制度，而不是寄希望于外交。", [F("military", 5), F("politics", 4)], 1, "你呼吁军事改革。"),
      O("金国灭辽后必然南下，我们必须做好最坏的打算。", [F("politics", 5), F("military", 3), F("wealth", -3)], 1, "你开始为战乱做准备。")
    ], null),

    S("sy_sl_019", 1120, 62, 70, "方腊在浙江睦州发动起义，自称'圣公'，建立政权。起义军迅速发展到上百万人，攻占六州五十二县。朝廷被迫从北方调兵镇压。", [
      O("方腊起义是花石纲和苛政逼迫的结果，百姓被逼到了绝路。", [F("politics", 6), F("literacy", 4)], 2, "你理解起义的原因。"),
      O("起义虽然事出有因，但暴力破坏社会秩序，终非正途。", [F("literacy", 4), F("politics", 3)], 2, "你反对暴力起义。"),
      O("方腊起义分散了朝廷的军事力量，给了金国可乘之机！", [F("military", 5), F("politics", 4)], 0, "你担心起义对国防的影响。"),

    S("sy_sl_020", 1122, 63, 71, "金军攻破辽国中京，辽天祚帝西逃。宋朝趁机派童贯率军北伐，试图收复燕京，但再次惨败。最终只能花钱从金国手中'赎回'燕京。", [
      O("花钱赎城，奇耻大辱！宋军的无能暴露无遗。", [F("military", 4), F("politics", 4), F("reputation", 3)], 0, "你对朝廷的无能感到愤怒。"),
      O("燕京虽得，但已是空城。金国看穿了宋朝的虚弱。", [F("politics", 5), F("military", 3)], 1, "你分析着局势。"),
      O("赎城的费用最终还是要百姓来承担，民不聊生啊。", [F("wealth", -4), F("politics", 3)], 1, "你为百姓的负担感到痛心。"),

    S("sy_sl_021", 1125, 65, 73, "金军分两路大举南下，势如破竹。徽宗惊恐之下传位给太子赵桓（即钦宗），自己逃往南方。东京危在旦夕。", [
      O("徽宗逃跑，把烂摊子丢给钦宗，太不负责任了！但钦宗必须守住东京。", [F("politics", 5), F("military", 4)], 1, "你留在了东京。"),

      O("金军南下，百姓恐慌，我要帮助维持秩序。", [F("reputation", 4), F("politics", 3)], 1, "你帮助稳定民心。"),
      O("东京恐怕守不住了，我应该带着家人南迁。", [F("wealth", -3), F("reputation", 2)], 1, "你决定南迁避难。")

    S("sy_sl_022", 1126, 66, 74, "钦宗在主战派李纲的坚持下坚守东京，金军第一次围城未能攻破，退兵。但钦宗随后罢免李纲，向金国求和。金军很快再次南下。", [

      O("钦宗优柔寡断，既想求和又想抗战，两头落空。", [F("politics", 5), F("literacy", 3)], 2, "你批评钦宗的决策。"),

    S("sy_sl_023", 1127, 67, 75, "靖康元年冬，金军攻破东京。徽宗、钦宗及后妃、皇子、宗室、大臣三千余人被掳往北方。金银财宝、典籍文物被洗劫一空。北宋灭亡，史称'靖康之耻'。", [

      O("岳飞虽死，但他的精神永存。'精忠报国'四个字将激励后人。", [F("literacy", 6), F("reputation", 6)], 3, "你决心传承岳飞精神。"),
      O("和议之后，南北贸易恢复，商业将迎来新的发展。", [F("commerce", 4), F("wealth", 4)], 1, "你看到了和平带来的商机。")
    ], "sc_sse_010"),

    S("sy_sse_011", 1145, 28, 36, "绍兴和议后，南宋进入相对和平的时期。临安日益繁华，经济恢复发展。但岳飞之冤始终是天下人心中的痛。", [
      O("和平来之不易，但岳飞之冤不雪，我心中难安。", [F("literacy", 4), F("reputation", 3)], 3, "你继续为岳飞鸣冤。"),
      O("利用和平时期发展经济，增强国力，为将来北伐做准备。", [F("commerce", 5), F("wealth", 5)], 1, "你致力于经济发展。"),
      O("和平时期应该加强军事训练，不能松懈。", [F("martial", 4), F("military", 4)], 0, "你坚持训练，不忘北伐。"),
      O("和平有利于学术研究，我要深入研究理学。", [F("literacy", 5), F("craft", 3)], 2, "你专注于学术。")
    ], null),

    S("sy_sse_012", 1150, 33, 41, "朱熹在福建建阳创办考亭书院，开始系统讲授理学。他综合了周敦颐、程颢、程颐等人的思想，形成了完整的理学体系。", [
      O("朱熹的理学博大精深，'格物致知'、'存天理灭人欲'是修身治国的根本。我要拜师学习。", [F("literacy", 8), F("politics", 5), F("reputation", 4)], 3, "你成为了朱熹的学生。"),
      O("理学强调道德修养和社会秩序，对治国理政有重要指导意义。", [F("politics", 5), F("literacy", 5)], 3, "你从政治角度研究理学。"),
      O("理学虽然深奥，但与我的日常生活关系不大。", [F("commerce", 3), F("wealth", 2)], 1, "你对理学兴趣不大。"),
      O("朱熹的学问影响深远，他的著作值得刊印传播。", [F("literacy", 5), F("craft", 4)], 2, "你参与刊印朱熹的著作。")
    ], "sc_sse_012"),

    S("sy_sse_013", 1155, 38, 46, "泉州港成为世界最大的港口之一。阿拉伯、波斯、印度、东南亚的商船云集于此。瓷器、丝绸、茶叶从这里运往世界各地，香料、珠宝从海外运来。", [
      O("泉州港的繁荣是海上丝绸之路鼎盛的标志，大宋的海上贸易冠绝天下！", [F("commerce", 8), F("wealth", 6), F("reputation", 4)], 1, "你的海外贸易生意兴隆。"),
      O("海上贸易带来的不仅是财富，还有文化交流。各国商人在泉州和睦相处。", [F("literacy", 4), F("commerce", 4), F("reputation", 3)], 2, "你见证了多元文化的交融。"),
      O("泉州港的繁荣说明南宋的经济实力不容小觑，这是北伐的物质基础。", [F("military", 3), F("politics", 4)], 0, "你从战略角度看待泉州港。"),
      O("海外贸易需要完善的港口管理和航海技术，这是国家实力的体现。", [F("politics", 4), F("commerce", 4)], 3, "你关注港口管理制度。")
    ], "sc_sse_013"),

    S("sy_sse_014", 1158, 41, 49, "南宋发明了'指南针'用于航海，大大提高了远洋航行的安全性。同时，造船技术也取得了重大进步，可以建造大型远洋船只。", [
      O("指南针用于航海是伟大的技术进步，它将改变世界的贸易格局。", [F("craft", 6), F("commerce", 5), F("literacy", 3)], 2, "你积极推广航海技术。"),
      O("有了指南针，我可以航行到更远的地方，开拓新的贸易路线。", [F("commerce", 7), F("wealth", 6)], 1, "你扩大了贸易范围。"),
      O("航海技术的进步有利于加强海防，抵御外敌从海上入侵。", [F("military", 4), F("politics", 3)], 0, "你关注航海技术的军事价值。"),
      O("指南针、印刷术、火药、造纸术——四大发明改变世界。", [F("literacy", 5), F("craft", 4), F("reputation", 3)], 3, "你感慨中国科技的伟大。")
    ], null),

    S("sy_sse_015", 1160, 43, 51, "金主完颜亮率六十万大军南侵，企图一举灭宋。南宋朝廷震动，有人主张迁都避祸。", [
      O("完颜亮来势汹汹，但金国内部并不稳定。我们应该坚守抵抗，等待时机。", [F("military", 5), F("politics", 4)], 0, "你主张坚决抵抗。"),
      O("金军虽多，但远道而来，后勤补给困难。以逸待劳，可以取胜。", [F("military", 5), F("martial", 4)], 0, "你分析了敌我形势。"),
      O("战争会影响海外贸易，我要提前做好应对准备。", [F("commerce", 3), F("wealth", 3)], 1, "你为战争做好了准备。"),
      O("国难当头，理学强调的'忠义'精神正是此时最需要的。", [F("literacy", 4), F("politics", 3), F("reputation", 3)], 3, "你以理学精神鼓舞人心。")
    ], null),

    S("sy_sse_016", 1161, 44, 52, "采石之战中，南宋文臣虞允文以一万八千兵力击败金军主力。完颜亮在军中被部下杀死，金军撤退。南宋转危为安。", [
      O("虞允文以文臣身份指挥作战，大败金军，真乃千古奇才！", [F("military", 5), F("politics", 5), F("reputation", 5)], 1, "你深受虞允文鼓舞。"),
      O("采石大捷证明金军并非不可战胜，南宋有能力保卫自己。", [F("martial", 5), F("military", 4), F("reputation", 4)], 0, "你信心大增。"),
      O("虞允文的事迹说明，文臣也可以在军事上有所作为。", [F("literacy", 4), F("politics", 4)], 3, "你重新审视了文武关系。"),
      O("战争结束，商路恢复，贸易将迎来新一轮繁荣。", [F("commerce", 5), F("wealth", 4)], 1, "你的生意迅速恢复。")
    ], "sc_sse_016"),

    S("sy_sse_017", 1162, 45, 53, "高宗退位，孝宗即位。孝宗是南宋最有作为的皇帝，他即位后立即为岳飞平反昭雪，恢复岳飞名誉，并任用张浚主持北伐。", [
      O("岳将军终于沉冤得雪！孝宗英明！我等了二十年，终于等到了这一天！", [F("reputation", 8), F("martial", 5), F("military", 4)], 0, "你激动万分。"),
      O("孝宗为岳飞平反，表明了北伐的决心。这是振奋人心的好消息。", [F("politics", 6), F("literacy", 4), F("reputation", 5)], 3, "你对孝宗充满期待。"),
      O("岳飞平反后，他的精神将更加广泛地传播，激励后人。", [F("literacy", 5), F("reputation", 5)], 3, "你开始整理岳飞的事迹。"),
      O("孝宗是明君，在他的治理下，国家一定会越来越好。", [F("politics", 4), F("wealth", 3)], 1, "你对未来充满信心。")
    ], "sc_sse_017"),

    S("sy_sse_018", 1163, 46, 54, "张浚主持隆兴北伐，但初期进展不顺，在符离之战中惨败。朝中主和派再次抬头，孝宗被迫与金签订隆兴和议。", [
      O("符离之败说明北伐需要更充分的准备，不能急于求成。", [F("military", 4), F("politics", 4)], 0, "你总结了北伐失败的教训。"),
      O("隆兴和议虽然不如人意，但比绍兴和议有所改善——不再称臣，改称侄国。", [F("politics", 5), F("literacy", 3)], 2, "你客观评价了和议。"),
      O("北伐失败，主战派受挫。但收复中原的志向不能放弃。", [F("martial", 4), F("reputation", 3)], 0, "你坚持北伐信念。"),
      O("和议之后，社会稳定，有利于经济发展和文化繁荣。", [F("commerce", 4), F("wealth", 4)], 1, "你看到了和平的好处。")
    ], null),

    S("sy_sse_019", 1170, 53, 61, "孝宗推行'乾道之治'，整顿吏治，发展经济，轻徭薄赋。南宋进入政治清明、经济繁荣的时期。朱熹的理学也在这一时期广泛传播。", [
      O("乾道之治是南宋最好的时期，孝宗不愧为南宋最英明的皇帝。", [F("politics", 5), F("literacy", 3)], 3, "你对孝宗的治理赞不绝口。"),
      O("理学在乾道年间广泛传播，朱熹的思想影响越来越大。", [F("literacy", 6), F("reputation", 4)], 3, "你深入研究了朱熹的学说。"),
      O("政治清明，经济繁荣，海外贸易蓬勃发展。", [F("commerce", 5), F("wealth", 5)], 1, "你的生意达到了巅峰。"),
      O("国力增强，是再次北伐的好时机。", [F("military", 4), F("martial", 3)], 0, "你期待再次北伐。")
    ], null),

    S("sy_sse_020", 1175, 58, 66, "朱熹与陆九渊在江西鹅湖举行'鹅湖之会'，就'尊德性'与'道问学'的问题展开辩论。这是中国思想史上著名的学术论战。", [
      O("朱熹强调'格物致知'，陆九渊强调'心即理'，两者各有道理。", [F("literacy", 7), F("politics", 4)], 3, "你深入思考了两种学说的优劣。"),
      O("鹅湖之会促进了理学的发展，学术自由辩论是文化繁荣的标志。", [F("literacy", 5), F("reputation", 4)], 3, "你赞赏学术自由的风气。"),
      O("这些哲学讨论虽然深奥，但与百姓的生活有什么关系呢？", [F("commerce", 3), F("wealth", 2)], 1, "你更关心实际问题。"),
      O("鹅湖之会的精神值得记录和传播，这是中国学术史上的重要事件。", [F("literacy", 5), F("craft", 4), F("reputation", 3)], 3, "你记录了鹅湖之会的经过。")
    ], "sc_sse_020"),

    S("sy_sse_021", 1180, 60, 68, "南宋经济达到鼎盛。临安人口超过百万，泉州港年贸易额巨大。纸币'会子'广泛流通，商业信用体系日趋完善。", [
      O("南宋的经济实力令人惊叹，虽然领土只有北宋的三分之二，但经济总量却超过了北宋。", [F("commerce", 6), F("wealth", 5), F("politics", 3)], 1, "你为南宋的经济成就感到自豪。"),
      O("经济繁荣是好事，但不能因此忘记了北伐的大业。", [F("martial", 4), F("military", 3)], 0, "你提醒自己不忘收复之志。"),
      O("会子的广泛流通说明南宋的金融体系已经相当成熟。", [F("commerce", 5), F("politics", 4)], 2, "你研究了南宋的货币制度。"),
      O("经济繁荣有利于文化发展，朱熹的理学著作得以广泛刊印。", [F("literacy", 5), F("craft", 4)], 3, "你参与了理学著作的刊印。")
    ], null),

    S("sy_sse_022", 1187, 65, 73, "高宗驾崩，享年八十一岁。孝宗悲痛之余，决定禅位给太子赵惇（光宗），自己退位为太上皇。", [
      O("高宗虽然偏安一隅，但他在位期间维持了南宋的稳定。功过参半吧。", [F("politics", 4), F("literacy", 3)], 2, "你客观评价了高宗。"),
      O("孝宗是南宋最好的皇帝，他的退位是国家的损失。", [F("politics", 5), F("literacy", 3)], 3, "你对孝宗的退位感到惋惜。"),
      O("光宗能否继承孝宗的遗志？我对此表示担忧。", [F("politics", 4), F("literacy", 2)], 2, "你对新皇帝持观望态度。"),
      O("朝代更替是自然规律，我只希望国家继续保持稳定繁荣。", [F("wealth", 3), F("commerce", 3)], 1, "你希望维持现状。")
    ], null),

    S("sy_sse_023", 1190, 67, 75, "光宗与太上皇孝宗关系恶化，朝政荒废。朱熹被召入朝担任侍讲，但他直言进谏，得罪了权臣韩侂胄，仅四十六天就被罢官。理学被定为'伪学'，遭到禁止。", [
      O("朱熹被罢官，理学被禁，这是文化专制！韩侂胄祸国殃民！", [F("literacy", 6), F("politics", 5), F("reputation", 4)], 3, "你愤怒地抗议。"),
      O("朱熹的学说不会因为被禁而消失，真理终将战胜强权。", [F("literacy", 6), F("reputation", 5)], 3, "你坚信朱熹学说的价值。"),
      O("朝政混乱，对商业环境不利。我需要做好风险防范。", [F("commerce", 3), F("wealth", 2)], 1, "你开始保守经营。"),
      O("政治黑暗时期，更要坚持学术研究，保存文化的火种。", [F("literacy", 5), F("craft", 4)], 3, "你在逆境中坚持学术。")
    ], "sc_sse_023"),

    S("sy_sse_024", 1195, 70, 78, "韩侂胄发动政变，逼迫光宗退位，拥立宁宗。韩侂胄独揽大权，继续打压理学，同时酝酿北伐。", [
      O("韩侂胄虽然专权，但他主张北伐，这一点值得支持。", [F("military", 4), F("politics", 3)], 0, "你对韩侂胄的北伐主张表示支持。"),
      O("韩侂胄打压理学是不可原谅的，但北伐是正义的事业。", [F("literacy", 4), F("politics", 4)], 2, "你对韩侂胄持复杂态度。"),
      O("政变导致朝局动荡，对商业不利。", [F("wealth", -2), F("commerce", 2)], 1, "你的生意受到了影响。"),
      O("无论谁当权，学术自由都不应被侵犯。", [F("literacy", 5), F("reputation", 4)], 3, "你坚持学术独立。")
    ], null),

    S("sy_sse_025", 1198, 72, 80, "朱熹在福建建阳病逝，享年七十一岁。临终前仍在修改《大学章句》。尽管理学被禁，但前来送葬的学者仍有数千人。", [
      O("朱熹一生致力于学术，虽遭政治打压，但其思想将影响千年。先生千古！", [F("literacy", 8), F("reputation", 6)], 4, "你悲痛地送别朱熹。"),
      O("朱熹的理学体系是中国思想史上的里程碑，'四书'成为后世科举的标准教材。", [F("literacy", 7), F("politics", 4)], 3, "你高度评价朱熹的学术贡献。"),
      O("朱熹虽去，但他的著作和思想将通过书籍永远流传。", [F("literacy", 5), F("craft", 4), F("reputation", 4)], 3, "你参与刊印了朱熹的遗著。"),
      O("朱熹的一生告诉我们：坚持真理，即使暂时被打压，历史终将给予公正的评价。", [F("literacy", 6), F("reputation", 5)], 3, "你从朱熹的一生中获得了启示。")
    ], "sc_sse_025"),

    S("sy_sse_026", 1200, 73, 81, "你已至暮年，回顾在南宋的这一生。从建炎南渡到理学兴盛，从岳飞北伐到泉州港繁荣，你亲历了这段悲壮而辉煌的历史。", [
      O("岳飞的冤死是我一生中最大的痛，但他的精神激励了无数后人。精忠报国，永世不忘！", [F("martial", 5), F("reputation", 6)], 0, "你将岳飞精神传承下去。"),
      O("朱熹的理学是中华民族宝贵的精神财富，它教导我们如何做人、如何治国。", [F("literacy", 6), F("reputation", 5)], 3, "你将理学精神传承下去。"),
      O("泉州港的繁荣证明了中国古代海上贸易的辉煌成就，这是中华民族的骄傲。", [F("commerce", 5), F("wealth", 4), F("reputation", 4)], 1, "你为中国古代航海成就感到自豪。"),
      O("我这一生虽经历了许多苦难，但也见证了中华民族不屈不挠的精神。", [F("literacy", 4), F("reputation", 4)], 2, "你平静地回顾了自己的一生。")
    ], null),

    // 条件/天赋节点
    S("sy_sse_t01", 1135, 18, 26, "[天赋·武勇] 你在岳家军中表现突出，被岳飞亲自接见，委以重任。", [
      O("誓死追随岳将军，北伐中原，收复失地！", [F("martial", 10), F("military", 8), F("reputation", 8)], 0, "你成为了岳家军的骨干。"),
      O("在军中不仅要勇猛，还要有谋略。我要学习兵法，成为智勇双全的将领。", [F("military", 6), F("politics", 4), F("literacy", 4)], 1, "你成长为一名儒将。")
    ], null, { talent: "martial" }),

    S("sy_sse_t02", 1148, 30, 38, "[天赋·文才] 你写了一篇纪念岳飞的文章，文情并茂，感动了无数人，在江南广为流传。", [
      O("继续写文章纪念岳飞，传播他的精神。", [F("literacy", 8), F("reputation", 8)], 3, "你成为了传播岳飞精神的重要人物。"),
      O("将岳飞的事迹编成书籍刊印，让更多人了解真相。", [F("literacy", 6), F("craft", 5), F("reputation", 6)], 3, "你刊印了岳飞的传记。")
    ], null, { talent: "literature" }),

    S("sy_sse_t03", 1155, 35, 43, "[天赋·经商] 你的商船队完成了从泉州到阿拉伯的远航，带回了大量香料和宝石，获利丰厚。", [
      O("扩大船队规模，开辟更多航线。", [F("commerce", 10), F("wealth", 10), F("reputation", 5)], 1, "你成为了泉州首富。"),
      O("将利润用于资助抗金事业和学术研究。", [F("reputation", 8), F("literacy", 4), F("military", 4)], 2, "你以财富报效国家。")
    ], null, { talent: "commerce" }),

    S("sy_sse_t04", 1175, 55, 63, "[天赋·政治] 你在朝中担任要职，参与了乾道之治的诸多决策，深受孝宗信任。", [
      O("辅佐孝宗继续推行改革，为北伐做准备。", [F("politics", 8), F("military", 5), F("reputation", 6)], 3, "你成为了孝宗的得力助手。"),
      O("利用自己的影响力保护朱熹和理学学者，维护学术自由。", [F("politics", 6), F("literacy", 6), F("reputation", 8)], 3, "你成为了学术自由的守护者。")
    ], null, { talent: "politics" })
  ],

      O("北伐消耗了大量物资，经济受到影响。", [F("wealth", -3), F("commerce", 2)], 1, "你的生意受到了影响。"),
      O("成吉思汗之死是蒙古的重大变故，南宋应该利用这个机会加强防御。", [F("politics", 5), F("military", 3)], 2, "你主张抓住时机。")
    ], null),

    S("sy_sle_007", 1230, 37, 45, "蒙古对南宋发动全面进攻。蒙古军队分多路南下，四川、两湖、两淮同时告急。南宋军民奋起抵抗，战争进入胶着状态。", [

    S("sy_sle_008", 1234, 40, 48, "南宋与蒙古联合灭金。金国灭亡后，南宋仅收复了部分失地，而蒙古占据了中原大部分地区。南宋的北方屏障彻底消失。", [

      O("金国灭亡后，南北贸易格局将发生重大变化。", [F("commerce", 4), F("wealth", 3)], 1, "你重新评估了贸易形势。"),

    S("sy_sle_009", 1240, 45, 53, "蒙古对南宋的战争进入相持阶段。南宋名将孟珙在襄阳、荆州一带成功抵御了蒙古的进攻。同时，四川的钓鱼城成为抵抗蒙古的坚固堡垒。", [

      O("相持阶段消耗巨大，朝廷财政日益困难。", [F("wealth", -3), F("politics", 3)], 1, "你感受到了战争的经济压力。"),
      O("南宋能够抵抗蒙古这么多年，说明我们的城防和水战有优势。", [F("military", 4), F("politics", 3)], 1, "你分析了南宋的防御优势。")

    S("sy_sle_010", 1245, 48, 56, "蒙古大汗窝阔台去世后，蒙古内部因汗位继承问题发生内讧，对南宋的攻势暂时减缓。南宋获得了一段宝贵的喘息时间。", [
      O("蒙古内讧是天赐良机！南宋应该抓紧时间加强军备，改革内政。", [F("military", 5), F("politics", 5)], 0, "你呼吁抓紧备战。"),
      O("和平时期应该发展经济，为持久战积累物资。", [F("commerce", 5), F("wealth", 4)], 1, "你致力于经济恢复。"),
      O("蒙古内讧不会持续太久，一旦解决内部问题，必将再次南下。", [F("politics", 5), F("military", 4)], 2, "你保持着清醒的认识。"),
      O("利用这段时间整理典籍，传承文化，为后世留下精神财富。", [F("literacy", 5), F("craft", 4)], 3, "你专注于文化事业。")

    S("sy_sle_011", 1250, 52, 60, "蒙古新大汗蒙哥即位，重新发动对南宋的大规模进攻。蒙古军分三路南下：西路攻四川，中路攻襄阳，东路攻两淮。", [
      O("蒙哥汗亲征，蒙古来势汹汹。但南宋已经做好了准备。", [F("military", 5), F("martial", 4)], 0, "你信心坚定。"),
      O("三路进攻，兵力分散，我们可以集中兵力各个击破。", [F("military", 5), F("politics", 4)], 1, "你提出了作战策略。"),
      O("战争再次爆发，商路又会被切断。", [F("wealth", -3), F("commerce", 2)], 1, "你的生意再次受到影响。"),
      O("国难当头，我辈当挺身而出。", [F("reputation", 4), F("martial", 3)], 0, "你准备奔赴前线。")
    ], null),

    S("sy_sle_012", 1258, 58, 66, "蒙哥汗亲率蒙古主力围攻四川钓鱼城。守将王坚率领守军和百姓顽强抵抗，蒙古军屡攻不下。蒙哥汗在攻城时受伤，不久后去世。", [
      O("钓鱼城之战是南宋抗蒙战争的最大胜利！蒙哥汗之死改变了世界历史！", [F("military", 8), F("reputation", 8), F("martial", 5)], 0, "你在钓鱼城之战中英勇作战。"),
      O("蒙哥之死导致蒙古内部分裂，南宋获得了宝贵的喘息之机。", [F("politics", 6), F("military", 4)], 2, "你分析了蒙哥之死的战略意义。"),
      O("钓鱼城的坚守证明，只要团结一心，蒙古并非不可战胜。", [F("reputation", 5), F("military", 3)], 1, "你深受鼓舞。"),
      O("蒙哥之死虽然暂时缓解了南宋的压力，但蒙古迟早会卷土重来。", [F("politics", 5), F("literacy", 3)], 2, "你保持着清醒。")

    S("sy_sle_013", 1260, 60, 68, "忽必烈在开平（今内蒙古正蓝旗）即位，建立元朝。忽必烈采取'汉化'政策，重用汉臣，学习中原制度。与此同时，他继续推行对南宋的包围战略。", [
      O("忽必烈汉化说明他志在中原，南宋的处境更加危险了。", [F("politics", 6), F("military", 4)], 2, "你分析了忽必烈的战略。"),
      O("忽必烈重用汉臣，说明他善于治理。南宋需要更有能力的领导者。", [F("politics", 5), F("literacy", 3)], 2, "你对南宋的领导层感到不满。"),
      O("元朝建立后，可能会开放贸易，这对商业有利。", [F("commerce", 3), F("wealth", 2)], 1, "你看到了新的可能性。"),

    S("sy_sle_014", 1267, 65, 73, "忽必烈下令围攻襄阳。襄阳是南宋的北大门，战略地位极其重要。蒙古军采用回回炮（巨型投石机）攻城，襄阳陷入重重包围。", [
      O("襄阳是南宋的命脉，必须死守！我要去襄阳参战！", [F("martial", 6), F("military", 6), F("reputation", 5)], 0, "你前往襄阳参战。"),
      O("朝廷必须尽快派援军解襄阳之围，否则后果不堪设想。", [F("politics", 6), F("military", 4)], 2, "你上书请求增援。"),

    S("sy_sle_015", 1273, 68, 76, "襄阳守军坚守六年之后，终于弹尽粮绝，被迫投降。襄阳的陷落标志着南宋防御体系的崩溃，蒙古军可以长驱直入江南。", [
      O("襄阳陷落，南宋大势已去……但只要还有一口气，我就要继续战斗！", [F("martial", 5), F("military", 5), F("reputation", 5)], 0, "你悲愤交加，继续抵抗。"),
      O("襄阳坚守六年，守军已经尽力了。朝廷无能，援军迟迟不到。", [F("politics", 5), F("literacy", 4), F("reputation", 4)], 2, "你痛斥朝廷的无能。"),
      O("襄阳陷落后，江南将直接面对蒙古铁骑，百姓要遭殃了。", [F("wealth", -5), F("reputation", 3)], 1, "你为百姓的命运担忧。"),

    S("sy_sle_016", 1275, 70, 78, "蒙古军攻破建康（今南京），直逼临安。南宋朝廷上下一片混乱，宰相贾似道在前线战败后被杀。文天祥在赣州起兵勤王。", [

      O("临安即将陷落，我必须带着家人和财产尽快转移。", [F("wealth", -3), F("commerce", 3)], 1, "你紧急安排转移。"),

    S("sy_sle_017", 1276, 71, 79, "蒙古军攻破临安。五岁的小皇帝赵显被俘北上。南宋朝廷投降。但文天祥、陆秀夫、张世杰等人拒绝投降，继续在南方坚持抗元。", [

      O("南宋灭亡了，但中华文化不会灭亡。我要保护重要的典籍和文物。", [F("literacy", 5), F("craft", 4), F("reputation", 5)], 3, "你保护了文化遗产。"),

    S("sy_sle_018", 1277, 72, 80, "文天祥在江西、广东一带继续抗元，一度收复了一些失地。但最终兵败被俘。他被押送北上，途中写下了不朽名篇《过零丁洋》。", [

    S("sy_sle_020", 1279, 74, 82, "崖山海战爆发。元军大举进攻，南宋水军全军覆没。陆秀夫背着小皇帝赵昺跳海殉国，张世杰也随后殉难。南宋彻底灭亡。", [

    { year: 1232, text: "蒙古围攻金国都城汴京，金朝灭亡在即。南宋出兵配合蒙古灭金。", effects: [F("military", 3)] },
    { year: 1235, text: "蒙古开始全面进攻南宋，四川、两湖、两淮同时告急。", effects: [F("military", 3), F("wealth", -2)] },
    { year: 1237, text: "蒙古军攻陷南宋军事重镇襄阳外围，襄阳形势危急。", effects: [F("military", -2), F("politics", -2)] },
    { year: 1242, text: "余玠主持四川防务，修建钓鱼城等山城防御体系。", effects: [F("military", 4)] },
    { year: 1246, text: "南宋名相史嵩之主持朝政，推行改革，加强军备。", effects: [F("politics", 3), F("military", 2)] },
    { year: 1252, text: "忽必烈率蒙古军远征大理（云南），对南宋形成战略包围。", effects: [F("military", -3), F("politics", -2)] },
    { year: 1256, text: "文天祥高中状元，成为南宋末年最杰出的士大夫。", effects: [F("literacy", 4), F("reputation", 3)] },
    { year: 1262, text: "南宋将领刘整叛降蒙古，向蒙古献上了攻打襄阳的策略。", effects: [F("military", -4), F("politics", -3)] },
    { year: 1268, text: "蒙古军开始长期围困襄阳，使用回回炮（巨型投石机）攻城。", effects: [F("military", -3), F("wealth", -2)] },

    { year: 1274, text: "文天祥被任命为知赣州，开始组织抗元力量。", effects: [F("military", 3), F("reputation", 3)] },
    { year: 1277, text: "文天祥在江西收复部分地区，但最终兵败被俘。", effects: [F("military", -3), F("reputation", 4)] }

  sourceCards: [
    SC("人生自古谁无死，留取丹心照汗青。", "文天祥《过零丁洋》", "文天祥是南宋末年最著名的民族英雄，他在被俘后坚贞不屈，最终英勇就义，其精神成为中华民族的宝贵财富。"),
    SC("崖山之后无中国，我闻此语泪沾衣。", "后世感慨", "崖山海战标志着南宋的彻底灭亡，也标志着中国历史上一个重要时代的终结。"),
    SC("钓鱼城之战，蒙哥汗死于城下，蒙古帝国由此分裂。", "《元史·宪宗本纪》", "钓鱼城之战是世界军事史上的奇迹，一座小城改变了世界历史的走向。"),

    SC("陆秀夫负帝蹈海，后宫诸臣从死者十余万人。", "《宋史·陆秀夫传》", "崖山海战是中国历史上最悲壮的事件之一，十余万人蹈海殉国，展现了南宋军民不屈的精神。")

{
